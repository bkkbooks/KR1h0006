body:
  text: 欽定四庫全書經部八論語集解義疏四書類提要臣等謹案論語集解義疏十卷魏何晏解梁皇侃疏晉書載鄭沖與孫邕何晏曹羲荀顗等共集論語諸家訓詁之善者義有不安輒改易之名集解今本乃獨稱何晏考陸徳明經典釋文於學而第一下題集解二字註曰一本作何晏集解是獨題何晏名其來久矣殆晏以親貴總領其事歟侃梁書作偘葢字異文呉郡人青州刺史皇象九世孫武帝時官國子助教尋拜散騎侍郎兼助教如故大同十一年卒事迹具梁書儒林傳傳稱所撰禮記義五十卷論語義十卷禮記義久佚此書宋國史志中興書目晁公武讀書志尤袤遂初堂書目皆尚著録迨乾淳以後遂無復稱引之者而陳氏書録解題亦遂不著録知其佚在南宋時矣惟唐時舊本流傳存於海外康熈九年日本國山井鼎等作七經孟子考文自稱其國有是書然中國無得其本者故朱彝尊經義考註曰未見今恭逢我皇上右文稽古經籍道昌乃發其光於鯨波鮫室之中藉汎舶而登秘閣殆若有神物撝訶存漢晉經學之一綫俾待聖世而復顯者其應運而來信有非偶然者矣其經文與今本亦多異同如舉一隅句下有而示之三字頗為冗贅然與文獻通考所引石經論語合夫子言性與天道不可得而聞也下有已矣二字亦與錢曽讀書敏求記所引髙麗古本合其疏文與余蕭客古經解鈎沈所引雖字句或有小異而大㫖悉合知其確為古本不出依託也至臨之以莊則敬作臨民之以莊則敬七經孟子考文亦疑其民字為誤衍然謹守古本而不敢改知彼國遞相傳寫偶然訛舛或有之亦未嘗有所竄易矣何氏集解異同尤夥雖其中以包氏為苞氏以陳恒為陳桓之類不可據者有之而勝於明刻監本者亦復不少尤可以旁資考證也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀論語集解義疏序梁皇侃撰論語通曰論語者是孔子没後七十弟子之門徒共所撰録也夫聖人應世事跡多端隨感而起故為教不一或負扆御衆服龍衮於廟堂之上或南面聚徒衣縫掖於黌校之中但聖師孔子苻應頽周生魯長宋遊歴諸國以魯哀公十一年冬從衛反魯刪詩定禮於洙泗之間門徒三千人達者七十有二但聖人雖異人者神明而同人者五情五情既同則朽没之期亦等故歎發吾衰悲因逝水託夢兩楹寄歌頽壊至哀公十六年哲人其萎徂背之後過隙叵駐門人痛大山長毁哀梁木永摧隠几非昔離索行淚微言一絶景行莫書於是弟子僉陳往訓各記舊聞撰為此書成而實録上以尊仰聖師下則垂䡄萬代既方為世典不可無名然名書之法必據體以立稱猶如以孝為體者則謂之孝經以莊敬為體者則謂之為禮記然此書之體適㑹多途皆夫子平生應機作教事無常凖或與時君抗厲或共弟子抑揚或自顯示物或混迹齊凡問同荅異言近意深詩書互錯綜典誥相紛紜義既不定於一方名故難求乎諸類因題論語兩字以為此書之名也但先儒後學解釋不同凡通此論字大判有三途第一捨字制音呼之為倫一捨音依字而號曰論一云倫論二稱義無異也第一捨字從音為倫説者乃衆的可見者不出四家一云倫者次也言此書事義相生首末相次也二云倫者理也言此書之中藴含萬理也三云倫者綸也言此書經綸今古也四云倫者輪也言此書義㫖周備圓轉無窮如車之輪也第二捨音依字為論者言此書出自門徒必先詳論人人僉允然後乃記記必已論故曰論也第三云倫論無異者葢是楚夏音殊南北語異耳南人呼倫事為論事北士呼論事為倫事音字雖不同而義趣猶一也侃案三途之説皆有道理但南北語異如何似未詳師説不取今亦捨之而從音依字二途并録以㑹成一義何者今字作論者明此書之出不專一人妙通深遠非論不暢而音作倫者明此書義含妙理經綸今古自首臻末輪環不窮依字則證事立文取音則據理為義義文兩立理事雙該圓通之教如或應示故蔡公為此書為圓通之喻云物有大而不普小而兼通者譬如巨鏡百尋所照必偏明珠一寸鑒色六合以蔡公斯喻故言論語小而圓通有如明珠諸典大而偏用譬若巨鏡誠哉是言也語者論難荅述之謂也毛詩傳云直言曰言論難曰語鄭注周禮云發端曰言荅述為語今按此書既是論難荅述之事宜以論為其名故名為論語也然此語是孔子在時所説而論是孔子沒後方論論在語後應曰語論而今不曰語論而云論語者其義有二一則恐後有穿鑿之嫌故以語在論下急標論在上示非率爾故也二則欲現此語非徒然之説萬代之繩凖所以先論已以備有圓周之理理在於事前故以論居語先也又此書遭焚燼至漢時合壁所得及口以傳授遂有三本一曰古論二曰齊論三曰魯論既有三本而篇章亦異古論分堯曰下章子張問更為一篇合二十一篇篇次以鄉黨為第二篇雍也為第三篇内倒錯不可具説齊論題目與魯論大體不殊而長有問王知道二篇合二十二篇篇内亦微有異魯論有二十篇即今日所講者是也尋當昔撰録之時豈有三本之别將是編簡缺落口傳不同耳故劉向别録云魯人所學謂之魯論齊人所學謂之齊論合壁所得謂之古論而古論為孔安國所注無其傳學者齊論為瑯琊王卿等所學魯論為太子太傅夏侯勝及前將軍蕭望之少傅夏侯建等所學以此教授於侯王也晚有安昌侯張禹就建學魯論兼講齊説擇善而從之號曰張侯論為世所貴至漢順帝時有南郡太守扶風馬融字季長建安中大司農北海鄭𤣥字康成又就魯論篇章考齊驗古為之注解漢鴻臚卿吳郡苞咸字子良又有周氏不悉其名至魏司空穎川陳羣字長文太常東海王肅字子雍博士燉煌周生烈皆為義説魏末吏部尚書南陽何晏字平叔因魯論集季長等七家又採古論孔注又自下已意即世所重者今日所講即是魯論為張侯所學何晏所集者也晉太保河東衛瓘字伯玉晉中書令蘭陵繆播字宣則晉廣陵太守高平欒肇字永初晉黄門郎頴川郭象字子𤣥晉司徒濟陽蔡謨字道明晉江夏太守陳國袁宏字叔度晉著作郎濟陽江淳字思俊晉撫軍長史蔡系字子叔晉中書郎江夏李充字𢎞度晉廷尉太原孫綽字興公晉㪚騎常侍陳留周壊字道夷晉中書令穎陽范甯字武子晉中書令瑯琊王珉字季瑛右十三家為江熙字太和所集侃今之講先通何集若江集中諸人有可採者亦附而申之其又别有通儒解釋於何集無好者亦引取為説以示廣聞也然論語之書包於五代二帝三王自堯至周凡一百四十人而孔子弟子不在其數孔子弟子有二十七人見於論語也而古史考則云三十人謂林放澹臺滅明陽虎亦是弟子數也論語集解義疏叙魏何晏撰梁皇侃疏叙曰漢中壘校尉劉向言魯論語二十篇皆孔子弟子記諸善言也疏劉向者辟彊之孫德之子前漢時為中壘校尉之官若今皇城使也其人博學經史孔子没後而弟子共論而記之初為魯人所學故謂魯論也太子太傅夏侯勝前將軍蕭望之丞相韋賢及子𤣥成等傳之疏夏侯蕭及韋賢父子凡四人初傳魯論於世也齊論語二十二篇其二十篇中章句頗多於魯論疏猶是弟子所記而為齊人所學故謂為齊論也既傳之異代又經昏亂遂長有二篇也其二十篇雖與魯舊篇同而篇中細章文句亦多於魯論也瑯琊王卿及膠東庸生昌邑中尉王吉皆以教授之疏此三人傳齊論亦以教授於世也故有魯論有齊論疏夏侯等四人傳魯王等三人傳齊竝行於世故有魯齊二論雙立也魯恭王時嘗欲以孔子宅為宫壊得古文論語疏漢景帝之子名餘封魯故謂魯恭王也好治宫室壞孔子舊宅以廣其宫於壁中得古文論語皆科斗文字也齊論有問王知道多於魯論二篇疏既有三論文皆不同齊論長有二篇一曰問王二曰知道是多魯論二篇也古論亦無此二篇疏齊非唯長魯論二篇亦長於古論古論故亦無此問王知道二篇也分堯曰下章子張問以為一篇疏古論雖無問王知道二篇而分堯曰後子張問於孔子曰如何斯可以從政矣又别題為一篇也有兩子張疏一是子張曰士見危致命為一篇又一是子張問孔子從政為一篇故凡論中有兩子張篇也凡二十一篇疏古論既分長一子張故凡成二十一篇也篇次不與齊魯論同疏古論篇次既不同齊又不同魯故云不與齊魯論同也安昌侯張禹本受魯論兼講齊説善者從之號曰張侯論疏禹初學魯論又雜講齊論於二論之中擇善者抄集别為一論名之曰張侯論也為世所貴疏此論既擇齊魯之善合以為一論故世之學者皆貴重於張侯論也苞氏周氏章句出焉疏苞氏苞咸也周氏不悉其名也章句者注解因為分斷之名也苞周二人注張侯魯論而為之分斷章句也古論唯博士孔安國為之訓説疏訓亦注也唯孔安國一人注解於古論也而世不傳疏世人不傳孔注古文之論也至順帝之時南郡太守馬融亦為之訓説疏漢有馬氏亦注張禹魯論也漢末大司農鄭𤣥就魯論篇章考之齊古以為之注疏鄭康成又就魯論篇章及考校齊古二論亦注於張論也近故司空陳羣太常王肅博士周生烈皆為之義説疏此三人共魏人也亦皆為張論作注説也前世傳受師説雖有異同不為之訓解疏自張侯之前乃相傳帥受不同而不為注説也中間為之訓解至于今多矣疏中間謂苞孔周馬之徒至于今謂至魏末何平叔時也多矣言注者非一家也所見不同互有得失疏既注者多聞故得失互不同也今集諸家之善説記其姓名疏此平叔用意也叔言多注解家互有得失而已今集取録善者之姓名著於集注中也有不安者頗為改易疏若先儒注非何意所安者則何偏為改易下已意也頗猶偏也名曰論語集解疏既集用諸注以解此書故名為論語集解也光禄大夫闗内侯臣孫邕光禄大夫臣鄭冲㪚騎常侍中領軍安鄉亭侯臣曹羲侍中臣荀顗尚書駙馬都尉闗内侯臣何晏等上疏此記孫邕等四人同於何晏共上此集解之論也
