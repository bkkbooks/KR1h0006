body:
  text: 欽定四庫全書論語集解義疏卷六魏何晏集解梁皇侃義疏論語先進第十一疏先進者此篇明弟子進受業者先後也所以次前者既還教鄉黨則進受業者宜有先後故先進次鄉黨也子曰先進於禮樂野人也後進於禮樂君子也注先進後進謂士先後輩也禮樂因世損益後進與禮樂俱得時之中斯君子矣先進有古風斯野人也如用之則吾從先進注苞氏曰將移風易俗歸之純素先進猶近古風故從之疏子曰至先進云先進云云者此孔子將欲還淳反素重古賤今故稱禮樂有君子野人之異也先進後進者謂先後輩人也先輩謂五帝以上也後輩謂三王以還也進於禮樂者謂其時輩人進行於禮樂者也野人質朴之稱也君子會時之目也孔子言以今人文觀古古質而今文文則能隨時之中此故為當世之君子也質則朴素而違俗是故為當世之野人也云如用云云者如猶若也若比方先後二時而用為教則我從先進者也所以然者古為純素故可從式注先進至人也云先進云云者時淳則禮樂損時澆則禮樂益若以益觀損損則為野人若以損行益益則為君子也云後進云云者此謂以益行益俱得時中故謂為君子也云先進云云者以今觀昔則有古風以古比今故為野人注苞氏曰至從之先進比三王乃為古比結繩則為今故云近古也子曰從我於陳蔡者皆不及門者也注鄭玄曰言弟子之從我而厄於陳蔡者皆不反仕進之門而失其所也疏子曰至者也孔子言時世亂離非唯我道不行只我門徒雖從我在陳蔡者亦失于時不復及仕進門也張憑曰道之不行命也唯聖人安時而處從故不期於通塞然從我於陳蔡者何能不以窮逹為心耶故感於天地將聞君子道消而恨二三子不及開泰之門也德行顏淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子遊子夏疏德行至子夏此章初無子曰者是記者所書並從孔子印可而録在論中也云德行云云者孔子門徒三千而唯有此以下十人名為四科四科者德行也言語也政事也文學也德行為人生之本故為第一以冠初也而顔閔及二冉合其名矣王弼曰此四科者各舉其才長也顔淵德行之俊尤兼之矣范寧曰德行謂百行之美也四子俱雖在德行之目而顔子為其冠云言語宰我子貢者第二科也宰我及端木二人合其目也范寧曰言語謂賓主相對之辭也云政事冉有季路者第三科也冉仲二人合其目也范寧曰政事謂治國之政也云文學子遊子夏者第四科也言偃及卜商二人合其目也范寧曰文學謂善先王典文王弼曰弟子才不徒十蓋舉其美者以表業分名其餘則各以所長從四科之品也侃案四科次第立德行為首乃為可解而言語為次者言語君子樞機為德行之急故次德行也而政事是人事之别比言語為緩故次言語也文學指博學古文故比三事為泰故最後也子曰回也非助我者也於吾言無所不説注孔安國曰助猶益也言回聞言即解無可發起增益於己也疏子曰至不説聖人為教須賢啓發遊參之徒聞言輒問是助益於我以增曉導而顔淵默識聞言説解不嘗口咨於我教化無益故云非助我者於吾言無所不説也孫綽曰所以每説吾言理自玄同耳非為助我也言此欲以曉衆且明理也子曰孝哉閔子騫人不間於其父母昆弟之言注陳群曰言閔子騫為人上事父母下順兄弟動靜盡善故人不得有非間之言也疏子曰呈之言間猶非也昆兄也謂兄為昆昆明也尊而言之也言子騫至孝事父母兄弟盡於美善故凡人物論無有非間之言於子騫者也故顔延之云言之無間謂盡美也南容三復白圭注孔安國曰詩云白圭之玷尚可磨也斯言之玷不可為也南容讀詩至此三反覆之是其心慎言也孔子以其兄之子妻之疏南容至妻之云南容三復白圭者復猶反也詩云白圭之玷尚可磨也斯言之玷不可為也是白玉有玷缺尚可磨治令其全好若人言忽有瑕玷則駟馬不及故云不可為也南容慎言語讀詩至白圭之句乃三過反覆修玩無己之意也云孔子云云者重明南容蒙孔子之姻其善非一故更記之也苞述云南容深味白圭擬志無玷豈與縲紲非罪同其流致猶夫子之情實深天屬崇義𢎞教必自親始觀二女攸歸見夫子之讓心也侃已有釋在公冶長篇中也季康子問弟子孰為好學孔子對曰有顔回者好學不幸短命死矣今也則亡未聞好學者疏季康子至學者孫綽曰不應生而生為幸不應死而死曰不幸侃謂此與哀公問同而答異者舊有二通一云緣哀公有遷怒二過之事故孔子因答以針之也康子無此事故不煩言也又一云哀公是君之尊故須具答而康子是臣為卑故略以相酬也故江熙曰此與哀公問同哀公雖無以賞要以極對至於康子則可量其所及而答也顔淵死顔路請子之車以為之槨注孔安國曰顔路顔淵之父也家貧故欲請孔子之車賣以作槨子曰才不才亦各言其子也鯉也死有棺而無槨吾不可徒行以為之槨以吾從大夫之後吾以不可徒行注孔安國曰鯉孔子之子伯魚也孔子時為大夫故言吾從大夫之後不可以徒行是謙之辭也疏顔淵死至徒行云顔淵死云云者顔路顔淵父也淵家貧死無槨故其父就孔子請車賣以營槨也繆協曰顔路之家貧無以備禮而顔淵之德美稱於聖師喪豫之感痛之愈深二三子之徒將厚其禮路卒情而行恐有未允而未審制義之輕重故託請車以求聖教也云子曰云云者孔子將不以車與之故先説此以匱之才謂顔淵也不才謂鯉也言才與不才誠當有異若各本天屬於其父則同是其子也云鯉也云云者既天屬各深昔我子死我自有車尚不賣之營槨今汝子死寧欲請我之車耶繆協曰子雖才不可貧求備雖不才而豐儉亦各有禮制之由父故鯉死也而無槨也云吾不云云者又解所以不為鯉作槨之由也徒猶步也言我不賣車而步行為子作槨也云以吾云云者又解不步行之意也言大夫位爵已尊不可步行故也然實為大夫而云從大夫後者孔子謙也猶今人為府國官而云在府末國末也江熙曰不可徒行距之辭也可則與故仍脫左驂賻舊館人不可則距故不許路請也鯉也無槨將以之且塞厚葬也顔淵死子曰噫注苞氏曰噫痛傷之聲也天喪豫天喪豫注天喪豫者若喪已再言之者痛惜之甚也疏顔淵死至喪豫云顔淵死子曰噫者噫痛傷之聲也淵死遣使報孔子孔子傷痛之故云噫也云天喪豫者喪猶亡也豫我也夫聖人出世必須賢輔如天將降雨必先山澤出雲淵未死則孔道猶可冀縱不為君則亦得為教化今淵既死是孔道亦亡故云天喪我也劉歆曰顔是亞聖人之偶然則顔孔自然之對物一氣之别形玄妙所以藏寄既道旨所由讚明斂顔淵死則夫子體缺故曰天喪豫噫諒卒實之情非過痛之辭將求聖賢之域宜自此覺之也繆播曰夫投竿測深安知江海之有懸也何者俱不究其極也是以西河之人疑子夏為夫子武叔賢子貢於仲尼斯非其類耶顔回盡形形外者神故知孔子理在回知淵亦唯孔子也顔淵死子哭之慟注馬融曰慟哀過也從者曰子慟矣子曰有慟乎注孔安國曰不自知己之悲哀過也非夫人之為慟而誰為慟疏顔淵死至為慟云顔淵死子哭之慟者謂顔淵死孔子往顔家哭之也慟謂哀甚也既如喪已所以慟也郭象曰人哭亦哭人慟亦慟蓋無情者與物化也繆協曰聖人體無哀樂而能以哀樂為體不失過也云從者曰子慟矣者從者謂諸弟子也隨孔子往顔淵家有見孔子哀甚故云子慟矣云子曰有慟乎者孔子不自知慟故問之有慟乎云非夫人之為慟而誰為慟者初既不自知又向諸弟子明所以慟意也夫人指顔淵也言若不為顔淵哀慟而應為誰缺慟事也顔淵死門人欲厚葬之子曰不可注禮貧富各有宜顔淵家貧而門人欲厚葬之故不聽也門人厚葬之子曰回也視豫猶父也豫不得視猶子也非我也夫二三子也注馬融曰言回自有父父意欲聽門人厚葬之我不得制止也非其厚葬故云爾也疏顔淵死至子也云顔淵死門人欲厚葬之者顔淵之門徒見師貧而已欲厚葬之也一云是孔子門人欲厚葬朋友也云子曰不可者孔子止門人之厚葬故云不可也王弼曰有財死則有禮無財則已焉既而備禮則近厚葬矣故云孔子不聽也云門人厚葬之者不從孔子言也范寧曰厚葬非禮故不許也門人欲厚葬何也緣回父有厚葬之意故欲遂門人之深情也云子曰云云者回事我在三如一故云視豫猶父也我葬鯉無槨而不能止回無槨是視回不得猶子也云非我也夫二三子也者言此貧而過禮厚葬非是我意也故是夫二三子意也二三子則顔路亦在其中也范寧曰言回雖以父事我我不得以子遇回雖曰師徙義輕天屬今父欲厚葬豈得制止言厚葬非我之教出乎門人之意耳此以抑門人而救世弊也注非其厚葬非猶鄙薄季路問事鬼神子曰未能事人焉能事鬼曰敢問死曰未知生焉知死注陳群曰鬼神及死事難明語之無益故不答也疏季路問至知死云季路問事鬼神者外教無三世之義見乎此句也周孔之教唯説現在不明過去未來而子路此問事鬼神政言鬼神在幽冥之中其法云何也此是問過去也云子曰云云者孔子言人事易汝尚未能則何敢問幽冥之中乎故云焉能事鬼云曰敢問死者此又問當來之事也言問今日以後死事復云何也云曰未知生焉知死者亦不答之也言汝尚未知即見生之事難明又焉能豫問知死沒也顧歡曰夫從生可以善死盡人可以應神雖幽顯路殊而誠恆一苟未能此問之無益何處問彼耶閔子騫侍側誾誾如也子路行行如也冉有子貢侃侃如也子樂注鄭玄曰樂各盡其性也行行剛強之貌也曰若由也不得其死然注孔安國曰不得以壽終也疏閔子騫至死然云閔子騫侍側誾誾如也者卑者在尊者之側曰侍此明子騫侍於孔子座側也誾誾中正也子騫性中正也云子路行行如也者亦侍孔子座側也行行剛強貌也子路性剛強也云冉有子貢侃侃如也者此二人亦侍側也侃侃和樂也二子並和樂也云子樂者孔子見四子之各極其性無所隱情故我亦歡樂也云曰若由也不得其死然者孔子見子路獨剛強故發此言也由子路名也不得其死然謂必不得夀終也後果死衛亂也袁氏曰道直時邪自然速禍也魯人為長府閔子騫曰仍舊貫如之何何必改作注鄭玄曰長府藏名也藏財貨曰府仍因也貫事也因舊事則可何乃復更改作也子曰夫人不言言必有中注王肅曰言必有中善其不欲勞民更改作也疏魯人至有中云魯人為長府者魯人魯君臣為政者為作也長府藏名也魯人為政更造作長府也云閔子騫曰云云者子騫譏魯人也仍因也貫事也言為政之道因舊事自是如之何何必須臾有所改作耶如之何猶奈何也云子曰云云者夫人指子騫也言子騫性少言語言語必中於事理也注藏財貨曰府財貨錢帛也藏錢帛曰府藏兵甲曰庫也子曰由之鼓瑟奚為於丘之門注馬融曰言子路鼓瑟不合雅頌也門人不敬子路子曰由也升堂矣未入於室也注馬融曰升我堂矣未入室耳門人不解謂孔子言為賤子路故復解之也疏子曰至室也云子曰云云者子路性剛其鼓琴瑟亦有壯氣孔子知其必不得以壽終故每抑之汝鼓瑟得在於我門我門文雅非用武之處也故自稱名以抑之也奚何也侃謂此門非謂孔子所住之門故是聖德深奧之門也故子貢答武叔曰得其門者或寡也云門人不敬子路者門人見孔子譏瑟便不復敬子路也云子曰云云者孔子見門人不敬子路故又為解之也古人當屋栜下隔斷為忩户之外曰堂忩户之內曰室孔子言子路為弟子才德已大雖未親入我室亦已登升我堂未易可輕慢也若近而言之既以屋之堂室為喻若推而廣之亦謂聖人妙處為室粗處為堂故子路得堂顔子入室故下章説善人云亦不入於室是也所以此前言入於門而門人不敬為其不敬故引之於堂也注馬融曰至解之也孔子譏瑟本非謂子路可輕政在於行耳而門人不逹斯意承而慢之孔子解説之也子貢問曰師與商也孰賢乎子曰師也過商也不及注孔安國曰言俱不得中也曰然則師愈與子曰過猶不及也注愈猶勝也疏子貢問至及也云子貢問云云者師子張商子夏也孰誰也子貢問孔子欲辨師商誰為賢勝也云子曰師也過者過謂子張性繁冗為事好在僻過而不止也云商也不及者言子夏性疏闊行事好不及而止也云曰然則師愈與者愈勝也子貢又問若師為事好過好過則為勝耶云子曰過猶不及者答言既俱不得中則過與不及無異也故云過猶不及也江熙云聖人動為物軌人之勝否未易輕言兩既俱未得中是不明其優劣以貽於來者也季氏富於周公注孔安國曰周公天子之宰卿士也而求也為之聚斂而附益也注孔安國曰冉求為季氏宰為之急賦稅也子曰非吾徒也小子鳴鼓攻之可也注鄭玄曰小子門人也鳴鼓聲其罪以責也疏季氏至可也云季氏富於周公者季氏魯臣也周公天子臣食采於周爵為公故謂為周公也蓋周公旦之後也天子之臣地廣祿大故周公宜富諸侯之臣地狹祿小季氏宜貧而今僭濫遂勝天子臣故云季氏富於周公也云而求也云云者求冉求也季氏已富而求時仕季氏為季氏邑宰又助斂聚急賦稅以附益季氏之富也云子曰非吾徒也者徒門徒也孔子言冉求昔雖是我門徒而我門徒皆尚仁義今冉求遂為季氏急聚斂則非復吾門徒也故禮云孟獻子曰百乘之家不畜聚斂之臣與其畜聚斂之臣寧有盜臣言盜臣乃傷財而聚斂之臣則傷仁義傷財不如傷仁義云小子云云者小子門徒諸弟子也政治也求既為季氏聚斂故孔子先云非復我門徒又使諸弟子鳴鼓治之也所以鳴鼓者若直爾而治不言其過則聞之者局故鳴鼓而且言之則聞者衆也繆協云季氏不能納諫故求也莫得匡救匡救不存其義屈故曰非吾徒也致譏於求所以深疾季氏子然問明其義也注孔安國曰至士也天子之宰即謂冢宰也冢宰是有事之職故云卿士也注孔安國曰至稅也急賦稅謂斂民下財帛也柴也愚注弟子高柴也字子羔愚愚直之愚也參也魯注孔安國曰魯鈍也會子遲鈍也師也僻注馬融曰子張才過人失在邪僻文過也由也唁注鄭玄曰子路之行失於吸唁也子曰回也其庶乎屢空賜不受命而貨殖焉憶則屢中注言回庶幾聖道雖數空匱而樂在其中矣賜不受教命唯財貨是殖憶度是非蓋美回所以勵賜也一曰屢猶每也空猶虛中也以聖人之善道教數子之庶幾猶不至於知道者各內有此害其於庶幾每能虛中者唯回懷道深遠不虛心不能知道子貢無數子病然亦不知道者雖不窮理而幸中雖非天命而偶富亦所以不虛心也疏柴也至屢中云柴也愚者此以下評數子各有纍也柴弟子也其纍在於愚也王弼云愚好仁過也云參也魯者參曾參也魯遲鈍也言曾子性遲鈍也王弼云魯質勝文也云師也僻者師子張也子張好文其過故云僻也王弼云僻飾過差也云由也唁者由子路也子路性剛失在唁也王弼云唁剛猛也云子曰回也其庶乎屢空者記者上列四子病重於先自此以下引孔子更舉顔子精能於後解此義者凡有二通一云庶庶幾也屢每也空窮匱也顔子庶慕於幾故遺忽財利所以家每空貧而簞瓢陋巷也故王弼云庶幾慕聖忽忘財業而數空匱也又一通云空猶虛也言聖人體寂而心恆虛無纍故幾動即見而賢人不能體無故不見幾但庶幾慕聖而心或時而虛故曰屢空其虛非一故屢名生焉故顔特進云空非回所體故庶而數得故顧歡云夫無欲於無欲者聖人之常也有欲於無欲者聖人之分也二欲同無故全空以目聖一有一無故每虛以稱賢賢人自有觀之則無欲於有欲自無觀之則有欲於無欲虛而未盡非屢如何大史叔明申之云顔子上賢體具而微則精也故無進退之事就義上以立屢名按其遺仁義忘禮樂墮支體黜聰明坐忘大通此忘有之義也忘有頓盡非空如何若以聖人驗之聖人忘忘大賢不能忘忘不能忘忘心復為未盡一未一空故屢名生也焉云賜不受命而貨殖焉者此孔子又評子貢纍也亦有二通一云不受命者謂子貢性動不能信天任命是不受命也而貨殖者財物曰貨種藝曰殖子貢家富不能清素所以為惡也又一通云殷仲堪云不受矯君命江熙云賜不榮濁世之祿亦幾庶道者也雖然有貨殖之業恬愈不足所以不敢望回耳亦曰不受命者謂子貢不受孔子教命故云不受命也云憶則屢中者此亦有二通一云憶謂心憶度事宜也言子貢性好憶度是非而屢幸中亦是失也故君子不憶不信也又一通云雖不虛心如顔而憶度事理必亦能屢中也故左傳邾隱公朝魯執玉高其容仰魯定公受玉卑其容俯子貢曰以禮觀之二君皆有死亡君為主其先亡乎是嵗定公卒仲尼曰賜不幸而言中是使賜多言者也此憶中之類也王弼曰命爵命也憶憶度也子貢雖不受爵命而能富雖不窮理而幸中蓋不逮顔之庶幾輕四子所病故稱子曰以異之也注言回至心也云言回云云勵賜也者此注與前通並會云一曰屢猶每也空猶虛中也者此以下並是後解也中猶心也謂虛心也禮曰虛中以治之云以聖人之善道者謂孔子也云教數子定庶幾者柴參之屬也並被孔子教於庶幾之事也云猶不云云此害者道謂庶幾之道也緣其各有愚魯僻唁之害故不能至知庶幾之事云其於云云深逺者唯回一人能懷道深逺故庶幾虛心云不虛心不能知道者更明所以須虛心之義也庶幾之道深逺也欲知庶幾者虛心乃知其道也云子貢無數子病者無愚魯僻唁之病也云然亦不知道者既無病應能庶幾何亦不能乎云雖不窮理而幸中者解其不知之由也申先解憶則屢中也言子貢不能虛心心好憶度雖不能窮理如顔而有時幸中幸中故不能知大道也云雖非天命而偶富者此釋不受命而貨殖焉也雖非天命者謂雖非受當時天子之命也偶富者謂家自偶富非祿位所得也然雖非時祿而富之亦非清虛之士故亦不知大道云亦所以不虛心也者憶事幸中及家富榮心所以並不虛心也子張問善人之道子曰不踐迹亦不入於室注孔安國曰踐循也言善人不但循追舊迹而已亦多少能創業然亦不能入於聖人之奧室也子曰論篤是與君子者乎色莊者乎注論篤者謂口無擇言君子者謂身無鄙行也色莊者不惡而嚴以逺小人者也言此三者皆可以為善人也疏子張問至者乎云子張問善人之道者此問善人非聖人也問其道云何而可謂為善人也云子曰不踐迹者答善人之法也踐循也迹舊迹也言善人之道亦當别宜創建善事不得唯依循前人舊迹而已云亦不入於室者又雖有創立而未必使能入聖人奧室也能入室者顔子而已云子曰云云者此亦答善人之道也當是異時之問故更稱子曰俱是答善故共在一章也篤厚也言善人有所論説必出篤厚謹敬之辭也故云論篤是與也又能行君子之行故云君子者乎又須顔色莊嚴故云色莊者乎注孔安國曰至室也創業謂創仁義之業也聖人之奧室即前云子路升堂矣未入於室是也注論篤至人也云論篤者謂口無擇言者擇者除粗取好之謂也論篤是言語并善故復無可擇之言也云君子者云云者所行皆善故無鄙惡也然此注亦與上互也云色莊者云云者威而不猛是也云言此云云者三者言行色也云必備三皆可為善人明若能有一則亦可為善人不必備三也殷仲堪云夫善者淳穆之性體之自然雖不擬步往迹不能入窺奧室論篤質正有君子之一致焉子路問聞斯行諸注苞氏曰賑窮救乏之事也子曰有父兄在如之何其聞斯行之也注孔安國曰當白父兄不可得自專也冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問注孔安國曰惑其問同而答異也子曰求也退故進之由也兼人故退之注鄭玄曰言冉有性謙退子路務在勝尚人各因其人之失而正之疏子路問至退之云子路問聞斯行諸者斯此也此此於賑窮救乏之事諸之也子路問孔子若聞有周窮救乏事便得行之不乎云子曰有父兄在者人子無私假與故若有事必先啓告父兄也云如之何其聞斯行之者既由父兄故已如何聞而行乎言不可也云冉有問聞斯行諸者與子路問同也云子曰聞斯行之者此答異也言聞而即行之也云公西華云云者公西華疑二人問同而答異故先領二人之問答也此領子路問答也云求也云云者此領冉有之問答也求冉有名也云赤也惑者惑疑惑也二人問同而孔子答異故已生疑惑赤公西華名也云敢問者敢果敢也既惑其深故果敢而問之云子曰求也退故進之者答所以答異義也言冉求謙退故引之令進所以不云先白父兄也云由也兼人故退之者言子路性行行兼人好在率爾故抑退之必令白父兄也或問曰禮若必咨父兄則子路非抑若必不咨則冉求非引今夫子云進退請問其旨或答曰夫賑施之理事有大小大者車馬小或一餐若其大者必咨小可專行而由施無大小悉並不咨求大小悉咨今故抑由之不咨欲令其並咨引冉之必咨令其並不咨也但子路性進雖抑而不患其退冉求性退雖引不嫌其過也子畏於匡顔淵後注孔安國曰言與孔子相失故在後也子曰吾以汝為死矣曰子在回何敢死注苞氏曰言夫子在已無所敢死也疏子畏至敢死云子畏於匡顔淵後者猶是前被匡人誤圍時顔淵與孔子俱為匡圍孔子先得出還至家而顔淵後乃得出還至也云子曰吾以汝為死矣者淵後至而孔子云汝不還我言汝當死於匡難中云曰子在回何敢死者顔淵之答其有以也夫聖賢影響如天降時雨山澤必先為出雲孔子既在世則顔回理不得死死則孔道便絶故淵死而孔云天喪子也庾翼云顔子未能盡窮理之妙妙有不盡則不可以涉險津理有未窮則不可以冒屯路故賢不遭聖運否則必隱聖不值賢微言不顯是以夫子因畏匡而發問顔子體其旨而仰酬稱入室為指南啓門徒以出處豈非聖賢之誠言互相與為起豫者也李充云聖無虛慮之悔賢無失理之患而斯言何興乎將以世道交喪利義相蒙或殉名以輕死或昧利以苟生苟生非存理輕死非明節故發顔子之死對以定死生之命也注孔安國曰至後也於圍中相失也季子然問仲由冉求可謂大臣與注孔安國曰季子然季氏之子弟也自多得臣此二子故問之也子曰吾以子為異之問曽由與求之問注孔安國曰謂子問異事耳則此二人之問安足為大臣乎所謂大臣者以道事君不可則止今由與求也可謂具臣矣注孔安國曰言備臣數而已也曰然則從之者與注孔安國曰問為臣皆當從君所欲耶子曰弒父與君亦不從也注孔安國曰二子雖從其主亦不與為大逆也疏季子然問至從也云季子然問云云者季子然季氏家之子弟也時仲由冉求仕季氏家季子然自夸己家能得此二賢為臣故問孔子以謂此二人可謂大臣不也云子曰云云者此因答而拒之也子指子然也言子今所問是異事也所以是異事之問者由求非大臣而汝云可謂大臣故謂汝為異事之問也云曽由與求之問者此是舉異問也曽猶則也言汝問所以是異者則問由與求是異問也云所謂云云者此明大臣之事也以道事君謂君有惡名必諫也不可則止謂三諌不從則越境而去者也云今由云云者言今由求二人亦不諫諫若不從則亦不去不可名此為大臣乃可名為備具之臣而已也云曰然則從之者與者子然聞孔子云二人不為大臣故更云既不以道及不可則不止若如此者其君有惡事則二人皆從君為之不乎云子曰云云者答言雖不諫不止若君有弒上之事則二人亦所不從也孫綽云二子者皆政事之良也而不出具臣之流所免者唯弒之事其罪亦豈少哉夫抑揚之教不由乎理將以深激子然以重季氏之責也繆協稱中正曰所以假言二子之不能盡諌者以説季氏雖知貴其人而不能敬其言也注孔安國曰至問之也自多猶言己有豪勢能得臣此二人為多也注孔安國曰謂子問異事耳謂汝所問為異事之問也子路使子羔為費宰子曰賊夫人之子注苞氏曰子羔學未熟習而使為政所以賊害人也子路曰有民人焉有社稷焉何必讀書然後為學注孔安國曰言治民事神於是而習亦學也子曰是故惡夫佞者注孔安國曰疾其以口給應遂已非而不知窮者也疏子路至佞者云子路使子羔為費宰者費季氏采邑也季氏邑宰叛而子路欲使子羔為季氏邑宰也云子曰賊夫人之子者賊猶害也夫人之子指子羔也孔子言子羔習學未習熟若使其為政則必乖僻乖僻則為罪纍所及故云賊夫人之子也張憑云季氏不臣由不能正而使子羔為其邑宰直道而事人焉往不致弊枉道而事人不亦賊夫人之子乎云子路曰云云者子路云既邑有民人社稷今為其宰則是習治民事神此即是學亦何必在於讀書然後方謂為學乎云子曰云云者孔子以此語罵子路也佞口才也我言子羔學未習熟所以不欲使之為政而汝仍云有民神亦是學何必讀書此是佞辨之辭故古人所以惡之也繆協云子路以子羔為學藝可仕矣而孔子猶曰不可者欲令愈精愈究也而子時有以佞才惑世竊位要名交不以道仕不由學以之宰牧徒有民人社稷比之子羔則長短相形子路舉兹以對者所以深疾當時非美之也夫子善其來旨故曰是故惡夫佞者此乃斥時豈譏由乎子路曾晳注孔安國曰曾晳曾參父也名點也冉有公西華侍坐子曰以吾一日長乎爾無吾以也注孔安國曰言我問汝汝無以我長故難對也居則曰不吾知也注孔安國曰汝常居云人不知己也如或知爾則何以哉注孔安國曰如有用汝者則何以為治乎子路卒爾而對注卒爾先三人對也曰千乘之國攝乎大國之間加之以師旅因之以飢饉注苞氏曰攝攝迫乎大國之間也由也為之比及三年可使有勇且知方也注方義方也夫子哂之注馬融曰哂笑也求爾何如對曰方六七十如五六十注求性謙退言欲得方六七十如五六十里小國治之而已也求也為之比及三年可使足民也如其禮樂以俟君子注孔安國曰求自云能足民而己謂衣食足也若禮樂之化當以待君子謙之辭也赤爾何如對曰非曰能之願學焉宗廟之事如會同端章甫願為小相焉注鄭玄曰我非自言能也願學為之宗廟之事謂祭祀也諸侯時見曰會殷見曰同端玄端也衣玄端冠章甫諸侯日視朝服也小相謂相君禮者點爾何如鼓瑟希注孔安國曰思所以對故其音希也鏗爾舍瑟而作對曰異乎三子者之撰注孔安國曰置瑟起對也撰具也為政之具也鏗爾者投瑟之聲也子曰何傷乎亦各言其志也注孔安國曰各言己志於義無傷之曰暮春者春服既成得冠者五六人童子六七人浴乎沂風乎舞雩詠而歸注苞氏曰暮春者季春三月也春服既成者衣單夾之時也我欲得冠者五六人童子六七人浴於沂水之上風涼於舞雩之下歌詠先王之道歸夫子之門也夫子喟然歎曰吾與點也注周生烈曰善點之獨知時也三子者出曾晳後曾晳曰夫三子者之言何如子曰亦各言其志也已矣曰吾子何哂由也子曰為國以禮其言不讓是故哂之注苞氏曰為國以禮禮道貴讓子路言不讓故笑之也唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟會同非諸侯如之何注孔安國曰明皆諸侯之事與子路同徒笑子路不讓也赤也為之小相孰能為之大相注孔安國曰赤謙言小相耳孰能為大相者也疏子路至大相云子路云云者此四弟子侍孔子坐也云子曰云云者孔子將欲令四子言志故先説此言以勸引之也爾汝也言吾今一日年齒長大於汝耳汝等無以言吾年長而不敢言已志也云居則曰不吾知也者居謂弟子常居時也吾弟子自謂也言汝等常居之日則皆自云無知吾者也云如或云云者言汝或有人欲知用汝等汝等則志各欲何為治哉云子路卒爾而對者禮侍坐於君子君子問更端則起而對及宜顧望而對而子路不起又不顧望故云卒爾對也卒爾謂無禮儀也云曰千乘之國攝乎大國之間者此子路言志也千乘大國也攝迫也大國又大於千乘者也言己願得治於大國而此大國又有迫近他大國之間所謂他大國挾己國於中也云加之以師旅者言他大國以師旅兵刃加陵於己所治之國也云因之以飢饉者乏穀為飢乏菜為饉言已國既被四方大國兵陵又自國中因大荒餓也云由也為之者為猶治也言己國以為他兵所加又荒飢日久由願得此國治之云比及云云者比至也言由治此國於三年而使民人皆勇健又皆知識義方也云夫子哂之者哂笑也孔子聞子路之言而笑之也云求爾何如者哂由既竟而餘三人無言故孔子又問冉求汝志何如也云對曰方六七十者求答言志也言願得國地方六七十里者而已治之也云如五六十者意又自嫌向所言方六七十為大故又退言如方五六十里者也一云願六七十者如五六十大者已欲得其小也云求也云云者言己願治此小國若至三年則能使民人足也云如其禮樂以俟君子者又謙也言已乃能足民而已若教民之禮樂則己所不能故請俟君子為之也云赤爾何如者求答已竟故更問公西華也云對曰云云者赤答也非曰猶非謂也答曰己非謂自能願從此而後學為之也云宗廟之事如會同者此以下並言願所學之事也宗廟之事謂人君祭祀之事如會同諸侯有會同之事時也云端章甫願為小相焉者端玄端之服也章甫謂章甫之冠也言願君有祭祀及會司之事而已玄端服章甫之冠也為小相相君之禮云點爾何如者赤答既竟又問曽晳也云鼓瑟希者鼓猶彈也希疏也點政彈瑟既得孔子之問將思所以對之言故彈瑟手遲而聲希也云鏗爾舍瑟而作者鏗投瑟聲也舍投也作起也點思所對之辭將欲仰答故投瑟而起對也起對者禮也點獨云起則求赤起可知也云對曰云云者撰具也點起而對云已所志者異於路求赤三子之志所具也所具即千乘之國等是也云子曰云云者孔子聞點志異故云人性所志各異亦何傷乎汝但當言之云曰暮春者春服既成者此點言志也暮春謂建辰夏之三月也年有四時時有三月初月為孟次者為仲後者為季季春是三月也不云季春而云暮春者近月末也月末其時已暖也春服成者天時暖而衣服單夾者成也云得冠者五六人者已加冠成人者也五六者趣舉其數也云童子六七人者童子未冠之稱也又有未冠者六七人也或云冠者五六五六三十人也童子六七六七四十二人也四十二就三十合為七十二人也孔門升堂者七十二人也云浴乎沂者沂水名也暮春者既暖故與諸朋友相隨往沂水而浴也云風乎舞雩者風風涼也舞雩請雨之壇處也請雨祭謂之雩雩吁也民不得雨故吁嗟也祭而巫舞故謂為舞雩也沂水之上有請雨之壇壇上有樹木故入沂浴出登壇庇于樹下逐風涼也故王弼云沂水近孔子宅舞雩壇在其上壇有樹木遊者託焉也云詠而歸者浴竟涼罷日光既稍晚於是朋友詠歌先王之道歸還孔子之門也云夫子喟然歎曰吾與點也者孔子聞點之願是以喟然而歎也既歎而云吾與點也言我志與點同也所以與同者當時道消世亂馳競者衆故諸弟子皆以仕進為心唯點獨識時變故與之也故李充云善其能樂道知時逍遙遊詠之至也夫人各有能性各有尚鮮能舍其所長而為其所短彼三子者之云誠可各言其志矣然此諸賢既已漸染風流餐服道化親仰聖師誨之無倦先生之門豈執政之所先乎嗚呼遽不能一忘鄙願而暫同于雅好哉諒知情從中來不可假已唯曽生超然獨對揚德音起豫風儀其辭精而逺其指高而適亹亹乎固盛德之所同也三子之談於兹陋矣云三子者出者子路求赤三人見孔子與點故已並先出去也云曽晳後者在後未去云曽晳曰云云者晳既留後故問孔子也言向者三子所言者其理如何也云子曰云云者孔子答言三子之言雖各不同然亦各是其心所志也云曰吾子何哂由也者點呼孔子為吾子也點又云若各親是言志則孔子何獨笑子路也乎故云何也云子曰云云者答笑子路之所由也言我笑子路非笑其志也政是笑其卒爾不讓故耳夫為國者必應須禮讓而子路既願治國而卒爾其言無所謙讓故笑之耳云唯求云云者孔子更證我笑非笑子路之志也若笑子路有為國之志則冉求亦是志于為國吾何獨不笑耶既不笑求豈獨笑子路乎故曰唯求非邦也與言是邦也安見方六七十如五六十非邦也者亦云是邦也云唯赤云云者又引赤證我不笑子路志也赤云宗廟會同會同即是諸侯之事豈曰非邦而我何獨不笑乎又明笑非笑志也云赤也云云者又因不許赤謙也言赤之才德云自願為小相若以赤為小誰堪大者乎赤又是有明已不笑之故因美之也注馬融曰哂笑也齒本曰哂大笑口開則哂見故謂哂為笑者也注鄭玄曰至禮者云宗廟之事謂祭祀者四時及禘夾皆是也云諸侯時見曰會殷見曰同者周禮六服各隨服而來是正朝有數也而時見曰會此無常期諸侯有不庭服者王將有征討之事則因朝竟王命為壇於國外合諸侯而發禁亦隨其方若東方不服則命與東方諸侯共征之此是時見曰會也又王十二年一巡狩若王有事故則六服諸侯並來京師朝王受法此是殷眺曰同也而鄭玄注云殷眺曰同者周禮又有時聘曰問殷眺曰視並是諸侯遣臣來京師也王有事故諸侯不得自來而遣臣來聘王此亦無定時是時聘曰問也又元年六服唯侯服獨來朝京師人少故諸侯並遣臣來京師視王是殷眺曰視也鄭玄云殷見曰同者廣眺見之言通也云端玄端云云者章甫殷冠也然周家諸侯日視朝之服服緇布衣素積裳冠委貌此云玄端日視朝者容是周末禮亂者也云小相謂相君禮者者宗廟及會同皆是君事而已願相之耳注孔安國曰至讓也徒猶黨輩也言求等所言皆是諸侯事與子路猶是一黨輩耳笑者本是笑其不讓也論語顔淵第十二疏顔淵孔子弟子也又為門徒之冠者也所以次前者進業之冠莫過顔淵故顔淵次先進也顔淵問仁子曰尅已復禮為仁疏馬融曰尅己約身也孔安國曰復反也身能反禮則為仁矣一日尅己復禮天下歸仁焉注馬融曰一日猶見歸况終身乎為仁由己而由人乎哉注孔安國曰行善在己不在人者也顔淵曰請問其目注苞氏曰知其必有條目故請問之也子曰非禮勿視非禮勿聽非禮勿言非禮勿動注鄭玄曰此四者尅己復禮之目也顔淵曰回雖不敏請事斯語矣注王肅曰敬事此語必行之疏顔淵問至語矣云顔淵問仁者問孔子為仁之道也云子曰云云者尅猶約也復猶反也言若能自約儉己身返反於禮中則為仁也于時為奢泰過禮故云禮也一云身能使禮反返身中則為仁也范寧云克責也復禮謂責克己失禮也非仁者則不能責己復禮故能自責己復禮則為仁矣云一日云云者更解克己復禮所以為仁之義也言人君若能一日克己復禮則天下之民咸歸於仁君也范寧云亂世之主不能一日克己故言一日也云為仁云云者行仁一日而民見歸所以是由己不由他人也范寧云言為仁在我豈俟彼為仁耶云顔淵曰請問其目者淵又請求克己復禮之條目也云子曰云云者此舉復禮之目也既每事用禮所以是復禮也云顔淵曰云云者回聞條目而敬受之也敏逹也斯此也言回雖不逹仁禮之理而請敬事此語事猶用也仲弓問仁子曰出門如見大賓使民如承大祭注孔安國曰為仁之道莫尚乎敬也己所不欲勿施於人在邦無怨在家無怨注苞氏曰在邦為諸侯也在家為卿大夫也仲弓曰雍雖不敏請事斯語矣疏仲弓問至語矣云仲弓問仁者亦咨仁也云子曰云云者亦答仁道也言若行出門恆起恭敬如見大賓見大賓必起敬也又若使民力役亦恆用心敬之如承事大祭大祭祭郊廟也然范寧云大賓君臣嘉會也大祭國祭也仁者舉動使民事如此也傳稱臼季言出門如賓承事如祭仁之則也云己所不欲勿施於人者恕己及物則為仁也先二事明敬後一事明恕恕敬二事乃為仁也云在邦無怨在家無怨者在邦為諸侯也在家為卿大夫也既出門及使民皆敬又恕己及物三事並足故為民人所懷無復相怨者也司馬牛問仁子曰仁者其言也訒注孔安國曰訒難也牛宋人弟子司馬犂也曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎注孔安國曰行仁難言仁亦不得不難矣疏司馬牛問至訒乎云司馬牛問仁者司馬牛是桓魋弟也亦問仁也云子曰仁者其言也訒者答之也訒難也古者言之不出恐行之不逮故仁者必不易出言故云其言也訒一云仁道既深不得輕説故言於人仁事必為難也王弼曰情發於言志淺則言疏思深則言訒也云曰其云云者牛又疑云言語之難便可謂此為仁乎一云不輕易言於仁事此便可謂為仁乎云子曰云云者又答也為猶行也凡行事不易則言語豈得妄出而不難乎又一云行仁既難言仁豈得易故江熙云禮記云仁之為器重其為道逺舉者莫能勝也行者莫能致也勉於仁者不亦難乎夫易言仁者不行之者也行仁然後知勉仁為難故不敢輕言也注牛宋人弟子司馬犂也犂牛名也司馬牛問君子子曰君子不憂不懼注孔安國曰牛兄桓魋將為亂牛自宋來學常憂懼故孔子解之曰不憂不懼斯謂之君子矣乎子曰內省不疚夫何憂何懼注苞氏曰疚病也內省無罪惡無所可憂懼也疏司馬牛問至何懼云司馬牛問君子者問行君子之道也云子曰云云者答也君子坦蕩蕩故不憂懼也云曰不云云者牛嫌君子之行不啻不憂懼而已故又咨之云子曰云云者內省謂反自視己心也疚病也言人生若外無罪惡內忖視己心無有愆病則何所憂懼乎注孔安國曰至解之言牛常愁其兄之罪過及己故孔子釋云君子不應憂懼者也司馬牛憂曰人皆有兄弟我獨亡注鄭玄曰牛兄桓魋行惡死喪無日我獨為無兄弟也子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之內皆為兄弟也君子何患乎無兄弟也注苞氏曰君子疏惡而友賢九州之人皆可以禮親也疏司馬牛憂至弟也云司馬牛憂者為其兄桓魋有罪故已恆憂也所以孔子前答云君子不憂也云曰人云云者此所憂之事也亡無也牛兄行惡必致殘滅不旦則夕即今雖暫在與無何異故云我獨亡也云子夏曰商聞之矣者商子夏名也聞牛之言故自稱名而為牛解之也不敢言出已故云聞之云死生有命富貴在天者此是我所聞為説不須憂之事也言死生富貴皆稟天所得應至不可逆憂亦不至不可逆求故云有命在天也然同是天命而死生云命富貴云天者亦互之不可逃也死生於事為切故云命富貴比死生者為泰故云天天比命則天為緩也繆播云死生者所稟之性分富貴者所遇之通塞人能命飬之以福不能令所稟易分分不可易命也能修道以待賈不能遭時必泰泰不可必天也天之為言自然之勢運不為主人之貴賤也云君子敬而無失者死生富貴既理不易故當委之天命此處無憂而此句以下自可人事易為修理也敬而無失是廣愛衆也君子自敬己身則與物無失者也云與人恭而有禮者此謂恭而親仁也人猶仁也若彼有仁者當恭而禮之也云四海之內皆為兄弟也者疏惡者無失善者恭禮故四海九州皆可親禮如兄弟也云君子何患乎無兄弟也者既逺近可親故不須憂患於無兄弟也注死喪無日無日猶無後餘一日也注苞氏曰至親也疏惡解敬而無失友賢釋與人恭而有禮也子張問明子曰浸潤之譖膚受之訴不行焉可謂明也已矣注鄭玄曰譖人之言如水之浸潤以漸成人之禍也馬融曰膚受之訴皮膚外語非其內實也浸潤之譖膚受之訴不行焉可謂逺也已矣注馬融曰無此二者非但為明其德行高逺人莫能及之也疏子張問至己矣云子張問明者問人行何事而可謂之明乎云子曰浸潤之譖者答也浸潤猶漸漬也譖讒謗也夫拙為讒者則人易覺巧為讒者日日漸漬也進譖當時使人受而不覺如水之浸潤漸漬久久必溼也故謂能讒者為浸潤之譖也云膚受之訴者膚者人肉皮上之薄皺也訴者相訴訟讒也拙相訴者亦易覺也若巧相訴害者亦日日積漸稍進為如人皮膚之受塵垢當時不覺久久方覩不淨故謂能訴害人者為膚受之訴也云不行云云者言人若覺彼浸譖膚訴害使二事不行則可謂為有明也云浸潤云云者又廣答也言若使二事不行非唯是明亦是高逺之德也孫綽云問明而及逺者其有高旨乎夫賴明察以勝讒猶火發滅之以水雖消災有方亦已殆矣若逺而絶之則佞根玄拔鑑巧無迹而逺體默全故知二辭雖同而後喻彌深微顯之義其在兹乎顔延之云譖潤不行雖由於明明見之深乃出於體逺體逺不對於情偽故功歸於明見斥言其功故曰明極言其本故曰逺也注鄭玄曰至禍也此巧譖者馬融曰至實也巧訴者也如馬意則謂內實之欣可受若皮膚外語虛妄則謂為膚受也然馬此注與鄭不類也若曲曰使相類則當云皮膚外語非內實者即是膚訴積漸入於皮膚非內實也子貢問政子曰足食足兵令民信之矣子貢曰必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死民不信不立孔安國曰死者古今常道也人皆有之治邦不可失信也疏子貢問至不立云子貢問政者問為政之法也云子曰云云者答之也食為民本故先須足食也時澆復須防衛故次足兵也雖有食有兵若君無信則民衆離背故必使民信之也云子貢曰云云者已止也子貢又咨云己奉知治國必須食兵信三事若假令被逼必使除三事之一而辭不得止則三事先去何者耶云曰去兵者答也兵比二者為劣若事不獲已則先可去兵也云曰必云云者子貢又問雖餘食信二事若假令又被逼使去二事一則先去何者也云曰去食者孔子又答云若復被逼去二中之一則先去食云自古云云者孔子既答云去食又恐子貢致嫌故更此為解之也言人若不食乃必致死雖然自古迄今雖復食亦未有一人不死者是食與不食俱是有死也而自古迄今未有一國無信而國安立者今推其二事有死自古而有無信國立自古而無今寧從其有者故我云去食也故李充云朝聞道夕死孔子之所貴捨生取義孟軻之所尚自古有不亡之道而無有不死之人故有殺身非喪已苟存非不亡己也棘子城曰君子質而已矣何以文為注鄭玄曰舊説云棘子城衛大夫也子貢曰惜乎夫子之説君子也駟不及舌注鄭玄曰惜乎夫子之説君子也過言一出駟馬追之不及舌也文猶質也質猶文也虎豹之鞹猶犬羊之鞹也注孔安國曰皮去毛曰鞹虎豹與犬羊别者正以毛文異耳今使文質同者何以别虎豹與犬羊耶疏棘子城曰至鞹也云棘子城曰云云者棘子城云君子所行但備質朴而足何必用於文華乎云子貢曰云云者子貢聞子城之言而譏之也夫子謂呼子城為夫子也言汝所説君子用質不用文為過失之甚故云惜乎夫子之説君子云駟不及舌者此所惜之事也駟四馬也古用四馬共牽一車故呼四馬為駟也人生過言一出口則雖四馬駿足追之亦所不及故云駟不及舌也云文猶質也質猶文也者更為子城解汝所説君子用質不用文所以可惜之理也將欲解之故此先述其意也言汝意云文猶質質猶文故曰何用文為者耳云虎豹云云者述子城意竟故此又譬之不可也鞹者皮去毛之稱也虎豹所以貴於犬羊者正以毛文炳蔚為異耳今若取虎豹及犬羊皮俱滅其毛唯餘皮在則誰復誠其貴賤别於虎豹與犬羊乎譬於君子所以貴者正以文華為别今遂若使質而不文則何以别於君子與衆人乎哀公問於有若曰年飢用不足如之何有若對曰盍徹乎注鄭玄曰盍者何不也周法十一而稅謂之徹徹通也為天下通法也曰二吾猶不足如之何其徹也注孔安國曰二謂十二而稅也對曰百姓足君孰與不足百姓不足君孰與足注孔安國曰孰誰也疏哀公問至與足云哀公問云云者魯哀公愚暗政苛賦重故民廢其業所以積年飢荒國用不足公苦此惡故問有若求不飢而用足之法也云有若對曰盍徹乎者盍何不也徹謂十而稅一也魯起宣公而十稅二至于哀公亦猶十二賦稅既重民飢國乏由於十二故有若答云今依舊十一故云何不徹也云曰二云云者公聞有若使為十一故拒之也言稅十取二吾國家之用猶尚不足今若為令我十而取一乎故云如之何其徹也云對曰百姓足君孰與不足者有若答君所以合十一之理也言君若輕稅則民下百姓得寬各從其業業從人寬則家家豐足民既豐足則豈有事君而不足耶故云百姓足君孰與不足也孰誰也云百姓不足君孰與足者又云君既重稅一則民從公先豐二則貧無糧故家家食空竭人人不足既人人不足故君豈得足故云君誰與足也故江熙云為家者與一家俱足乃可謂足豈可足已而謂之足也夫儉以足用寬以愛民日計之可不足而嵗計則有餘十二而行日計可有餘嵗計則不足行十二而不足不思損而益是揚湯止沸疾行遁影有子之所以發德音者也注鄭玄曰至法也徹字訓通故漢武名徹而改天下宜言徹者一切云通也今依王制云古者公田藉而不稅鄭玄曰藉之言借也借民力治公田美惡取於此不稅民之所自治也孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹則所云古者謂殷時也其實皆十一也侃案如記注夏家民人盛大則一夫受田五十畝殷承夏末民人稍少故一夫受田七十畝周承於紂人民凋盡故一夫受田百畝三代雖異同十分徹一故徹一為通法也夏云貢者是分田與民作之所獲隨豐儉十分貢一以上於王也夏民猶淳少於欺詐故云貢也殷人漸澆不復所可信故分田與民十分取一為君借民力以耕作於一年豐儉隨其所得還君不復稅民私作者也至周大文而王畿內用夏之貢法所以然者為去王近為王視聽所知兼鄉遂公邑之吏旦夕從民事為其役之以公使不得恤其私也若王畿外邦國諸侯悉用殷之助法所以然者為諸侯專一國之政貪暴稅民無法故也故詩有雨我公田遂及我私又宣公十五年初稅畝傳曰非禮也穀出不過藉以豐財也案此二文説既有公私稅又云不過籍則知諸侯助法也又以周禮載師論之則畿內用夏之貢法其中有輕重輕重不同自各有意此不復具言也子張問崇德辨惑注苞氏曰辨别也子曰主忠信徙義崇德注苞氏曰徙義見義則徙意從之也愛之欲其生也惡之欲其死也既欲其生也又欲其死是惑也注苞氏曰愛惡當有常一欲生之一欲死之是心惑也誠不以富亦祇以異注鄭玄曰此詩小雅也祇適也言此行誠不可以致富適以是為異耳取此詩之異義以非之也疏子張問至以異云子張問崇德辨惑者問求崇重有德辨别疑惑之法也云子曰云云者此答崇德義也言若能復以忠信為主又若見有義事則徙意從之此二條是崇德之法也云愛之欲其生者此答辨惑也中人之情不能忘於愛惡若有人從己已則愛之當愛此人時必願其生活於世也云惡之云云者猶是前所愛者而彼忽違己已便憎惡憎惡之既深便願其死也猶是一人而愛憎生死起於我心我心不定故為惑矣云誠不以富亦祗以異者引詩證為惑人之言生死不定之人誠不足以致富而只以為異事之行耳齊景公問政於孔子孔子對曰君君臣臣父父子子注孔安國曰當此時陳恆制齊君不君臣不臣父不父子不子故以此對也公曰善哉信如君不君臣不臣父不父子不子雖有粟吾豈得而食諸注孔安國曰言將危也陳氏果滅齊也疏齊景公問至食諸云齊景公問政於孔子者于時齊弱為其臣陳恆所制景公患之故問政方法於孔子也云孔子對云云者孔子隨其政惡而言之也言為風政之法當使君行君德故云君君也君德謂惠也臣當行臣禮故云臣臣也臣禮謂忠也父為父法故云父父也父法謂慈也子為子道故云子子也子道謂孝也云公曰云云者公聞孔子言而服之也言我國信有此四事也云雖有云云者諸之也公又言國既方亂我雖有粟米俸祿我豈得長食之乎江熙云景公喻旨故復遠述四弊不食粟之憂善其誠言也注孔安國曰至齊也後陳恆弒齊君是也子曰片言可以折獄者其由也與注孔安國曰片猶偏也聽訟必須兩辭以定是非偏信一言以折獄者唯子路可也子路無宿諾注宿豫也子路篤信恐臨時多故故不豫諾也疏子曰至宿諾云子曰云云者片猶偏也折獄謂判辨獄訟之事也由子路也夫判辨獄訟必須二家對辭子路既能果斷故偏聽一辭而能折獄也一云子路性直情無所隱者若聽子路之辭亦則一辭亦足也故孫綽云謂子路心髙而言信未嘗文過以自衛聽訟者便宜以子路單辭為正不待對驗而後分明也非謂子路聞人片言而便能斷獄也云子路無宿諾者宿猶逆也諾猶許也子路性篤信恐臨時多故曉有言不得行故不逆言許人也注孔安國曰至可也就此注意亦得兩通也子曰聽訟吾猶人也注苞氏曰言與人等也必也使無訟乎注王肅曰化之在前也疏子曰至訟乎云子曰云云者孔子言若有訟而使我聽出決之則我與人不異故云吾猶人也云必也使無訟乎者言我所以異於人者當訟未起而化之使不訟耳故孫綽云夫訟之所生先明其契而後訟不起耳若訟至後察則不異於凡人也此言防其本也子張問政子曰居之無倦行之以忠注王肅曰言為政之道居之於身無得懈倦行之於民必以忠信也疏子張問至以忠云子張問政者問為政方法也云子曰云云者答云言身居政事則莫懈倦又凡所行用於民者必盡忠信也子曰君子博學於文約之以禮亦可以弗畔矣夫注鄭玄玄曰弗畔不違道也疏子曰至矣夫云約之以禮者能以禮約束也云亦可以弗畔矣夫者畔違背也言人廣學文章而又以禮自約束則亦得不違背正理也子曰君子成人之美不成人之惡小人反是疏子曰至反是云子曰云云者美與己同故成之也惡與己異故不成之也云小人反是者惡與己同故成之也美與己異故不成之也故與君子反季康子問政於孔子孔子對曰政者正也子帥而正孰敢不正注鄭玄曰季康子魯上卿諸臣之帥也疏季康子問至不正云季康子問政於孔子者亦問為政之法於孔子也云孔子對曰政者正也者解字訓以答之也言所以謂治官為政者政訓中正之正也云子帥而正孰敢不正者又解政所以訓正之義也言民之從上如影隨身表若君上自率己身為正之事則民下誰敢不正者耶李充云我好靜而民自正也注鄭玄曰至帥也帥猶先也既為上卿故為同朝諸臣之先也季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊注孔安國曰欲多情欲也言民化于上不從其所令從其所好也疏季康子患至不竊云季康子患盜問於孔子者患國內多偷盜故問於孔子求除盜之法也云孔子對云云者孔子答多盜之由也子指季康子也竊猶盜也言民所以為盜者由汝貪欲不厭故民從汝而為盜耳若汝心苟無欲假令重賞於民令民為盜則民亦不為也是從汝故也李充云我無欲而民自朴者也注孔安國曰至好也雖賞不竊是不從其所令也康子患之而民為之不止是從其所好也季康子問政於孔子曰如殺無道以就有道何如注孔安國曰就成也欲多殺以止姧也孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草也草尚之風必偃注孔安國曰亦欲令康子先自正也偃仆也加草以風無不仆者猶民之化於上也疏季康子問至必偃云季康子問云云者就成也康子問孔子而言為政欲并殺無道之人而成就爵祿有道者其事好不故云何如也云孔子對云云者孔子不許其殺也言汝自為政為政由汝焉用多殺乎云子欲善而民善矣者民有道無道終由於汝汝若善則民自善自善豈復無道乎今之無道由汝無道之故也云君子云云者更為民從上之譬也君子人君也小人民下也言人君所行其德如風也民下所行其德如草也尚猶加也偃臥也言君如風民如草草上加風則草必臥東西隨風如民從君也注偃仆也仆亦跢臥也子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞注鄭玄曰言士之所在皆能有名譽也子曰是聞也非達也夫達者質直而好義察言而觀色慮以下人注馬融日常有謙退之志察言語見顔色知其所欲其念慮常欲以下人也在邦必達在家必達注馬融曰謙尊而光卑而不可踰也夫聞者色取仁而行違居之不疑注馬融曰此言佞人也佞人假仁者之色行之則違安居其偽而不自疑者也在邦必聞在家必聞注馬融曰佞人黨多也疏子張問至必聞云子張問云云者士通謂丈夫也達謂身命通達也子張問為士之法何若為德行而謂得為達士耶云子曰云云者孔子知子張意非故反質問之也言汝意謂若為事是達而問之也故云何哉爾所謂達者也云子張對云云者在邦謂仕諸侯也在家謂仕卿大夫也子張答云己所謂達者言若仕為諸侯及卿大夫者必並使有聲譽逺聞者是為達也云子曰是聞也非達也者孔子曰汝所言者則聞耳非是達也繆協云聞者達之名達者聞之實而殉為名者衆體實者寡故利名者飾偽敦實者歸真是以名分於聞而道隔於達也云夫達者質直而好義者既謂子張之達是聞故此更為其説達也言夫達者質性正直而所好者義也云察言而觀色者達者又能察人言語觀人容色者也云慮以下人者既察於言色又須懷於謙退思以下人也云在邦云云者此人所在必有此諸行以達於人故云必達也云夫聞者色取仁而行違者孔子更為子張説聞非達也時多佞顔色一往亦能假顔色為仁而不能行之故云包取仁而行違也云居之不疑者既能為假能為假故居此假而能使人不疑之也非唯不為他所疑而已亦自不復自疑也云在邦云云者既佞人黨多故所在必聞也縿協云世亂則佞人多黨盛則多聞所謂歎衰運疾弊俗沈居士云夫聞之與達為理自異達者德立行成聞者有名而已夫君子深淵隱默若長沮桀溺石門晨門有德如此始都不聞於世近世巍巍蕩蕩有實如此而人都不知是不聞世並終然顯稱名則是達也漢書稱王莽始拆節下士鄉黨稱孝州閭稱悌至終然豺狼迹著而母死不臨班固云此所謂在邦必聞在家必聞色取仁而行違者也聞者達之名達者聞之實有實者必有名有名不必有實實深乎本聞浮於末也注馬融曰至踰也引謙卦證慮以下人所以是必達之義也既謙光尊不可踰故所在必逹也樊遲從遊於舞雩之下注苞氏曰舞雩之處有壇墠樹木故其下可遊也曰敢問崇德修慝辨惑注孔安國曰慝惡也修治也治惡為善也子曰善或問先事後得非崇德與注孔安國曰先勞於事然後得報也攻其惡毋攻人之惡非修慝與一朝之忿忘其身以及其親非惑與疏樊遲從至惑與云樊遲從遊於舞雩之下者此舞雩之處近孔子家故孔子往遊其壇樹之下而弟子樊遲從之云曰敢云云者既從遊而問此三事也修治也慝惡也謂治惡為善也問崇德治惡辦惑之事也云子曰善問者將欲答之故先美其問之事也云先事云云者答崇德也先事謂先為勤勞之事也後得謂後得祿位已勞也若能如此豈非崇德與言其是也故范寧云物莫不避勞而處逸今以勞事為先得事為後所以崇德也云攻其云云者答修慝也攻治也言人但自治己身之惡改之為善而不須知他人惡事若能如此豈非修慝與云一朝云云者答辨惑也君子有九思忿則思難故若人觸滅者則思後有患難不敢遂肆我忿以傷害於彼也若遂肆念忘於我身又災禍及己親此則已為惑故宜辨明知而不為也樊遲問仁子曰愛人問智子曰知人樊遲未達子曰舉直錯諸枉能使枉者直注苞氏曰舉正直之人用之廢置邪枉之人則皆化為直也樊遲退見子夏曰嚮也吾見於夫子而問智子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉是言乎注孔安國曰富盛也舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣注孔安國曰言舜湯有天下選擇於衆舉臯陶伊尹則不仁者逺矣仁者至矣疏樊遲問至逺矣云樊遲問仁者問為仁之道也云子曰愛人者仁以惻懚濟衆故曰愛人也云問智者樊遲又問智也云子曰知人者孔子答曰能知人者則為智也云樊遲未達者達猶曉也已曉愛人之言而未曉知人之旨也云子曰云云者錯廢也枉邪也樊遲既未曉知人之旨故孔子又為説之也言若舉正直之人在位用之而廢置邪枉之人不用則邪枉之人皆改枉為直以求舉也云樊遲退見子夏者樊遲猶未曉舉直錯諸枉之言故退而往見子夏欲問之云曰嚮云云者樊遲既見於子夏而述夫子之言問之何謂也云子夏曰富哉是言乎者子夏得問而曉孔子語故先美之也富盛也云孔子之言甚盛云舜有云云者引事以答舉直錯枉也言舜昔有天位選擇諸民衆中舉得臯陶在位用之則是舉直也而不仁者不敢為非故云逺矣即是枉者直也云湯有云云者恐樊遲猶未曉故又舉一條事蔡謨云何謂不仁者逺逺去也若孔子言能使枉者去則是智也今云能使枉者直是化之也孔子言其化子夏謂之去者亦為商之未逹乃甚於樊遲也子夏言此者美舜湯之知人臯陶伊尹之致治也無緣説其道化之美但言不仁者去夫言逺者豈必足陟遐路身適異邦賢愚相殊是亦逺矣故曰性相近也習相逺也不仁之人感化遷善去邪枉正直是與故謂逺也案蔡氏之通與孔氏無異但孔氏云不仁者逺少為紆耳若味而言之則逺是逺惡行更改為善行也子貢問友子曰忠告而善𨗳之否則止無自辱焉注苞氏曰忠告以是非告之也以善導之不見從則止必言之或見辱也疏子貢問至辱焉云子貢問友者咨求朋友之道也云子曰云云者朋友主切磋若見有不善當盡已忠心告語之又以善事更相誘𨗳也云否則云云者否謂彼不見從也若彼苟不見從則便止而不重告也若重告不止則彼容反見罵辱故云無自辱焉注苞氏曰至辱也若必更言之已或反見辱也曽子曰君子以文會友注孔安國曰友以文德合也以友輔仁注孔安國曰友有相切磋之道所以輔成己之仁也疏曾子曰至輔仁云曾子曰君子以文會友者言朋友相會以文德為本也云以友輔仁者所以須友者政以輔成已仁之道故也論語集解義疏卷六
