body:
  text: 欽定四庫全書論語集解義疏卷一魏何晏集解梁皇侃義疏論語學而第一疏論語是此書總名學而為第一篇别自中間講説多分為科段矣侃昔受師業自學而至堯曰凡二十篇首末相次無别科而以學而最先者言降聖以下皆須學成故學記云玉不琢不成器人不學不知道是明人必須學乃成此書既遍該衆典以教一切故以學而為先也而者因仍也第者審諦也一者數之始也既諦定篇次以學而居首故曰學而第一也子曰學而時習之不亦悅乎注馬融曰子者男子通稱也謂孔子也王肅曰時者學者以時誦習也誦習以時學無廢業所以為悅懌也有朋自遠方來不亦樂乎注苞氏曰同門曰朋也人不知而不愠不亦君子乎注愠怒也凡人有所不知君子不愠之也疏子曰至子乎云子曰者子者指於孔子也子是有德之稱古者稱師為子也曰者發語之端也許氏説文云開口吐舌謂之為曰此以下是孔子開口談説之語故稱子曰為首也然此一書或是弟子之言或有時俗之語雖非悉孔子之語而當時皆被孔子印可也必被印可乃得預録故稱子曰通冠一書也云學而時習之者此以下孔子言也就此一章分為三段自此至不亦悅乎為第一明學者幼少之時也學從幼起故以幼為先也又從有朋至不亦樂乎為第二明學業稍成能招朋聚友之由也既學已經時故能招友為次也故學記云一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成是也又從人不知訖不亦君子乎為第三明學業已成能為師為君之法也先能招友故後乃學成為師君也故學記云九年知類通達強立而不反謂之大成又云能博喻然後能為師能為師然後能為長能為長然後能為君是也今此段明學者少時法也謂為學者白虎通云學覺也悟也言用先王之道導人情性使自覺悟而去非取是積成君子之德也時者凡學有三時一是就人身中為時二就年中為時三就日中為時也一就身中者凡受學之道擇時為先長則捍格幼則迷昏故學記云發然後禁則捍格而不勝時過然後學則勤苦而難成是也既必須時故內則云六年教之數與方名七年男女不同席八年始教之讓九年教之數日十年學書計十三年學樂誦詩舞勺十五年成童舞象並是就身中為時也二就年中為時者夫學隨時氣則受業易入故王制云春夏學詩樂秋冬學書禮是也春夏是陽陽體輕清詩樂是聲聲亦輕清輕清時學輕清之業則為易入也秋冬是隂陰體重濁書禮是事事亦重濁重濁時學重濁之業亦易入也三就日中為時者前身中年中二時而所學並日日修習不暫廢也故學記云藏焉修焉息焉遊焉是也今云學而時習之者而猶因仍也時是日中之時也習是修故之稱也言人不學則己既學必因仍而修習日夜無替也之之於所學之業也云不亦悅乎者亦猶重也悅者懷抱欣暢之謂也言知學已為可欣又能修習不廢是日知其所亡月無忌其所能彌重為可悅故云不亦悅乎如問之然也云有朋自遠方來不亦樂乎者此第二段明取友交也同處師門曰朋同執一志為友朋猶黨也共為黨類在師門也友者有也共執一志綢繆寒暑契闊飢飽相知有無也自猶從也學記云獨學而無友則孤陋而寡聞君子出其言善則千里之外應之出其言不善則千里之外違之今由我師德高故有朋從遠方而來與我同門共相講説故可為樂也所以云遠方者明師德洽被雖遠必集也招朋已自可為欣遠至彌復可樂故云亦也然朋疏而友親朋至既樂友至故忌言但來必先同門故舉朋耳悅之與樂俱是歡欣在心常等而貌迹有殊悅則心多貌少樂則心貌俱多所以然者向得講習在我自得於懷抱故心多曰悅今朋友講説義味相交德音往復形彰在外故心貌俱多曰樂也故江熙云君子以朋友講習出其言善則千里之外應之遠人且至况其近者乎道同齊味歡然適願所以樂也云人不知而不愠不亦君子乎者此第三段明學已成者也人謂凡人也愠怒也君子有德之稱也此有二釋一言古之學者為己己學得先王之道含章內映而他人不見知而我不怒此是君子之德也有德己為所可貴又不怒人之不知故曰亦也又一通云君子易事不求備於一人故為教誨之道若人有鈍根不能知解者君子恕之而不愠怒之也為君子者亦然也注馬融曰至懌也云子者男子通稱也者凡有德者皆得稱子故曰通稱也云謂孔子也者子乃是男子通稱今所稱子曰不關通他即指謂孔子也云王肅曰云云者背文而讀曰誦也然王此意即是日中不怠之時也舉日中不怠則前二事可知也注苞氏曰同門曰朋也鄭玄注司徒云同師為朋同志為友然何集注皆呼人名唯苞獨云氏者苞名咸何家諱咸故不言也注愠怒至之也就注乃得兩通而於後釋為便也故李充云愠怒也君子忠恕誨又不倦何怒之有乎明夫學者始於時習中於講肆終於教授者也凡注無姓名者皆是何平叔語也有子曰注孔安國曰弟子有若也其為人也孝悌而好犯上者鮮矣注鮮少也上謂凡在已上者也言孝悌之人必有恭順好欲犯其上者少也不好犯上而好作亂者未之有也君子務本本立而道生注本基也基立而後可大成也孝悌也者其為仁之本與注苞氏曰先能事父兄然後仁道可成也疏有子曰至本與云有子曰其為人也孝悌者其其孝悌者也善事父母曰孝善事兄曰悌也云而好犯上者鮮矣者好謂心欲也犯謂諫爭也上謂君親也鮮少也言孝悌之人必以無違為心以恭從為性若有欲犯其君親之顔諫爭者有此人少也然孝悌者實都不欲必無其人而云少者欲明君親有過若任而不諫必陷於不義不欲存孝子之心使都不諫故開其少分令必諫也故熊埋云孝悌之人志在和悅先意水旨君親有日月之過不得無犯顔之諫然雖屢納忠規何嘗好之哉今實都無好而復云鮮矣者以好見聞則生陵犯之慚以犯見塞則抑匡弼之心必宜微有所許者實在奬其志分稱論教體也故曰而好犯上者鮮矣云不好犯上而好作亂者未之有也者熊埋曰孝悌之人當不義而諍之尚無意犯上必不職為亂階也侃案熊解意是言既不好犯上必不作亂故云未之有也然觀熊之解乃無間然如為煩長既不好犯上理宜不亂何煩設巧明今案師説云夫孝者不好心自是恭順而又有不孝者亦有不好是願君親之敗故孝與不孝同有不好而不孝者不好必欲作亂此孝者不好必無亂理故云未之有也云君子務本者此亦有子語也務猶向也慕也本謂孝悌也孝悌者既不作亂故君子必向慕之也云本立而道生者解所以向慕本義也若其本成立則諸行之道悉滋生也云孝悌也者其為仁之本與者此更以孝悌解本以仁釋道也言孝是仁之本若以孝為本則仁乃生也仁是五德之初舉仁則餘從可知也故孝經云大孝德之本也教之所由生也王弼曰自然親愛為孝推愛及物為仁也注本基至成也人以孝為基故諸衆德悉為廣大也子曰巧言令色鮮矣有仁注苞氏曰巧言好其言語命色善其顔色皆欲令人悅少能有仁也疏子曰巧言令色鮮矣有仁巧言者便辟其言語也令色者柔善其顔色也鮮少也此人本無善言美色而虛假為之則少有仁者也然都應無仁而云少者舊云人自有非假而自然者此則不妨有仁但時多巧令故云少也又一通云巧言令色之人非都無仁政是性不能全故云少也故張憑云仁者人之性也性有厚薄故體足者難耳巧言令色之人於仁性為少非為都無其分也故曰鮮矣有仁王肅曰巧言無實令色無質曾子曰注馬融曰弟子曾參也吾日三省吾身為人謀而不忠乎與朋友交言而不信乎傳不習乎注言凡所傳之事得無素不講習而傳之乎疏曾子曰至習乎云吾日三省吾身者省視也曾子言我生平戒慎每一日之中三過自視察我身有過失否也云為人謀而不忠乎者忠中心也言為他人圖謀事當盡我中心也豈可心而不盡忠乎所以三省視察恐失也云與朋友交言而不信乎者朋友交會本主在於信豈可與人交而不為信乎云傳不習乎者凡有所傳述皆必先習後乃可傳豈可不經先習而妄傳之乎曾子言我一日之中每三過自視况復凡人可不為此三事乎言不可也又一通云曾子言我一日之中三過內視我身有此三行否也注馬融曰弟子曾參也姓曾名參字子輿注言凡至之乎得無猶無得也素猶本也言所傳之事無得本不經講習而傳之也故袁氏云常恐傳先師之言不能習也以古人言必稱師也子曰導千乘之國注馬融曰導者謂為之政教也司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為城城出革車一乘然則千乘之賦其地千城也居地方三百一十六里有竒唯公侯之封乃能容之雖大國之賦亦不是過焉苞氏曰導治也千乘之國者百里之國也古者井田方里為井井十為乘百里之國者適千乘也馬融依周禮苞氏依王制孟子義疑故兩存焉敬事而信注苞氏曰為國者舉事必敬慎與民必誠信也節用而愛人注苞氏曰節用者不奢侈也國以民為本故愛養之也使民以時注苞氏曰作使民必以其時不妨奪農務也疏子曰至以時此章明為諸侯治大國法也云導千乘之國者千乘大國也天子萬乘諸侯千乘千乘尚式則萬乘可知也導猶治也亦謂為之政教也其法在下故此張本也云敬事而信者此以下皆導千乘之國法也為人君者事無小大悉須敬故云敬事也曲禮云母不敬是也又與民必信故云信也云節用而愛人者雖富有一國之財而不可奢侈故云節用也雖貴居民上不可驕慢故云愛人也云使民以時者使民謂治城及道路也以時謂出不過三日而不妨奪民農務也然人是有識之目愛人則兼朝廷也民是瞑暗之稱使之則唯指黔黎也注馬融曰至存焉此明千乘法也云司馬法六尺為步者司馬法者齊景公時司馬穰苴為軍法也其法中有此千乘之説也凡人一舉足為跬跬三尺也兩舉足曰步步六尺也云步百為畝者廣一步長百步謂為一畝也畝母也既長百步可種苖稼有母養之功見也云畝百為夫者每一畝則廣六尺長百步今云畝百為夫則是方百步也謂為夫者古者賦田以百畝地給一農夫也夫所養人自隨地肥墽及其家人多少耳故王制云制農田百畝百畝之分上農夫食九人是也云夫三為屋者每夫方百步今云夫三則是方百步者是三也若並而言之則廣一里一里長三百步也而猶長百步也謂為屋者義名之也夫一家有夫婦子三者具則屋道乃成故合三夫目為屋也云屋三為井者向屋廣一里長百步今三屋並方之則方一里也名為井者因夫間有遂水縱橫相通成井字也何者畝廣六尺長百步用耜耕之耜廣五寸方兩耜為耦長沮桀溺耦而耕是也是耦伐廣一尺也畝廣六尺以一尺耕伐地為㴼通水流水流畝畝然因名曰畝也而夫田首倍之廣二尺深二尺謂之為遂九夫為井井間廣深四尺謂之為溝取其遂水相通如井字故鄭玄曰似井字故謂為井也遂取其水始遂也溝取其漸深有溝洫也釋名云田間之水曰溝溝搆也縱橫相交搆也云井千為通者此十井之地並之則廣十里長一里也謂為通者其地有三十屋相通共出甲士一人徒卒二人也云通十為城者其城地方十里也謂為城者兵賦法一乘成也其地有三百屋出革車一乘甲士十人徒卒二十人也云城出革車一乘者出一乘是賦一成故謂城也云千乘之賦其地千乘也者有地方千里者千即是千城也則容千乘也云居地方三百一十六里有竒者方百里者有方千里者百若方三百里三三為九則有方百里者九合成方十里者九百也是方三百里唯有九百乘也若作千乘猶少百乘百乘是方百里者一也今取方百里者一而六分破之每分得廣十六里長百里引而接之則長六百里其廣十六里也今半斷各長三百里設法特埤前三百里南西二邊是方三百十六里也然西南角猶缺方十六里者一方十六里者一有方千里者二又方一里者五十六里也是少方一里者二百五十六里也然則向割方百里者為六分埤方三百里兩邊猶餘方一里者四百今以方一里者二百五十六埤西南角猶餘方一里者一百四十四又設法破而埤三百十六里兩邊則每邊不復得半里故云方三百十六里有竒也云唯公侯之封乃能容之者周制上公方五百里侯方四百里伯方三百里子方二百里男方百里今千乘用地方三百十六里有竒故伯地不能容所以唯公侯封乃能容也云雖大國之賦亦不是過焉者雖魯方七百而其地賦稅亦不得過出千乘也故明堂位云賜魯革車千乘也云苞氏曰導治也千乘之國者百里之國者此夏殷法也夏殷大國百里次國七十里小國五十里故方百里國中令出千乘也云古者井田方里為井者此亦與周同也云井十為乘者此則與周異也周家十井為通通十為城城出一乘今此一通使出一乘則一城出十乘也云百里之國者適千乘者方百里者有方十里者百方十里者有方一里者百今制方一里者十出一乘則方十里者出十乘方百里者故出千乘也云馬融依周禮者馬氏所説是周禮制法也云苞氏依王制孟子者孟子及王制之言皆如苞氏所説也云義疑故兩存焉者此何平叔自下意也言馬及苞兩家之説並疑未知誰是故我今注兩録存之也子曰弟子入則孝出則悌謹而信泛愛衆而親仁行有餘力則以學文注馬融曰文者古之遺文也疏子曰至學文云弟子入則孝出則悌者弟子猶子弟也言為人子弟者盡其孝悌之道也父母在閨門之內故云入也兄長比之疏外故云出也前句已決子善父母為孝善兄為悌父親故云入兄疏故云出也云謹而信者向明事親此辨接外也接外之禮唯謹與信也外能如此在親可知也云泛愛衆者泛廣也君子尊賢容衆故廣愛一切也云而親仁者君子義之與比故見有仁德者而親之也若非仁親則不與之親但廣愛之而已云行有餘力則以學文者行者所以行事已畢之迹也若行前諸事畢竟而猶有餘力則宜學先王遺文五經六籍是也或問曰此云行有餘力則以學文後云子以四教文行忠信是學文或先或後何也答曰論語之體悉是應機適會教體多方隨須而與不可一例責也注馬融曰文者舌之遺文也即五經六籍也子夏曰賢賢易色注孔安國曰子夏弟子卜商也言以好色之心好賢則善也事父母能竭其力事君能致其身注孔安國曰盡忠節不愛其身也與朋友交言而有信雖曰未學吾必謂之學矣疏子夏曰至學矣云賢賢易色者凡人之情莫不好色而不好賢今若有人能改易好色之心以好於賢則此人便是賢於賢者故云賢賢易色也然云賢於賢者亦是奬勸之辭也又一通云上賢字猶尊重也下賢字謂賢人也言若欲尊重此賢人則當改易其平常之色更起莊敬之容也云事父母能極其力者子事父母左右就養無方是能竭力也云事君能致其身者致極也士見危致命是能致極其身也然事君雖就養有方亦宜竭力於君親若患難故宜致身但親主家門非患難之所故云竭力臣主捍難禦侮故云致身也云與朋友交言而有信者入則事親出則事君而與朋友交接義主不欺故云必有信也云雖曰未學吾必謂之學矣者假令不學而生知如前則吾亦謂之學也此勸人學故也故王雍云言能行此四者雖云未學而可謂己學也生而知者上學而知者次若未學而能知則過於學矣蓋假言之以勸善行也注孔安國曰子夏弟子卜商也姓卜名商字子夏言以至善也此注如前通也子曰君子不重則不威學則不固注孔安國曰固蔽也一曰言人不敢重既無威學不能堅固識其義理也主忠信無友不如已者過則勿憚改注鄭玄曰主親也憚難也疏子曰至憚改云君子不重則不威者重為輕根靜為躁本君子之體不可輕薄也君子不重則無威無威則人不畏之也云學則不固者言君子不重非唯無威而學業亦不能堅固也故孔後注云言人不敢重既無威學人不能堅固識其義理也云主忠信者言君子既須威重又忠信為心百行之主也云無友不如己者者又明凡結交取友必令勝己勝己則己有日所益之義不得友不如己友不如己則己有日損故云無友不如已者或問曰若人皆慕勝己為友則勝匕者豈友我耶或通云擇友必以忠信者為主不取忠信不如己者耳不論餘才也或通云敵則為友不取不敵者也蔡謨云本言同志為友此章所言謂慕其志而思與之同不謂自然同也夫上同乎勝己所以進也下同乎不如己所以退也閎天四賢上慕文王故四友是四賢上同心於文王非文王下同四賢也然則求友之道固當見賢思齊同志於勝己所以進德修業成天下之亹亹也今言敵則為友此直自論才同德等而相親友耳非夫子勸教之本旨也若如所云則直諒多聞之益便辟善柔之誡奚所施也云過則勿憚改者勿猶莫也憚難也友主切磋若有過失者當更相諌諍莫難改也一云若結友過誤不得善人則改易之莫難之也故李充云若友失其人改之為貴也注孔安國曰固蔽也侃案孔訓固為蔽蔽猶當也言人既不能敢重縱學亦不能當道理也猶詩三百一言以蔽之蔽也注鄭玄曰主親也憚難也鄭心則言當親於忠信之人也曾子曰慎終追遠民德歸厚矣注孔安國曰慎終者喪盡其哀也追遠者祭盡其敬也人君能行此二者民化其德而皆歸於厚也疏曾子曰至厚矣明人君德也云慎終追遠者慎終謂喪盡其哀也喪為人之終人子宜窮其哀戚是慎終也追遠謂三年之後為之宗廟祭盡其敬也三年後去親轉遠而祭極敬是追遠也一云靡不有初鮮克有終終宜慎也久遠之事録而不忘是追遠也故熊埋云欣新忘舊近情之常纍信近負遠義士之所棄是以慎終如始則㽎有敗事平生不忘則久人敬之也云民德歸厚矣者上之化下如風扉草君上能行慎終追遠之事則民下之德日歸於厚也一云君能行此二事是厚德之君也君德既厚則民咸歸依之也注孔安國曰至厚也此是前通也子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與注鄭玄曰子禽弟子陳亢也字子禽也子貢弟子姓端木名賜字子貢也亢怪孔子所至之邦必與聞其國政求而得之耶抑人君自願與為治耶子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與也注鄭玄曰言夫子行此五德而得之與人求之異明人君自願求與為治也疏子禽問至與也云子禽問云云者是此也此邦謂每邦非一國也禽問子貢怪孔子每所至之國必早逆聞其國之風政也故問云求之與者與語不定之辭也問言孔子每所至國必先逆聞其風政為是就其國主求而得之否乎云抑與之與者抑語助也亢又問言為是孔子不就國主求而國主自呼與孔子為治而聞之否乎云子貢曰云云者子貢答禽説孔子所以得逆聞之由也夫子即孔子也禮身經為大夫者則得稱為夫子孔子為魯大夫故弟子呼之為夫子也敦美潤澤謂之溫行不犯物謂之良和從不逆謂之恭去奢從約謂之儉推人後己謂之讓言夫子身有此五德之美推己以測人故凡所至之邦必逆聞之也故顧歡云此明非求非與直以自得之耳其故何也夫五德內充則是非自鏡也又一通云孔子入人境觀其民之五德則知其君所行之政也故梁冀云夫子所至之國入其境觀察風俗以知其政教其民溫良則其君政教之溫良也其民恭儉讓則政教恭儉讓也孔子但見其民則知其君政教之得失也云夫子之云云者此明夫子之求與人之求異也人則行就彼君求之而孔子至境推五德以測求之故云其諸異乎人之求之也諸猶之也與語助也故顧歡云夫子求知乎己而諸人訪之於聞故曰異也梁冀又云凡人求聞見乃知耳夫子觀化以知之與凡人異也注必與聞其國政乃與逆也注鄭玄曰至治也云言夫子云云者亦會兩通也明不就人求故云異也云明人君云云者此云人君自與之非謂自呼與之也政是人君所行見於民下不可隱藏故夫子知之是人君所行自與之也子曰父在觀其志父沒觀其行注孔安國曰父在子不得自專故觀其志而已父沒乃觀其行也三年無改於父之道可謂孝矣注孔安國曰孝子在喪哀慕猶若父在無所改於父之道也疏子曰至孝矣云父在觀其志父沒觀其行者此明人子之行也其其於人子也志謂在心未行也故詩序云在心為志是也言人子父在則已不得專行應有善惡但志之在心在心而外必有趣向意氣故可觀志也父若已沒則子得專行無憚故父沒則觀此子所行之行也云三年無改於父之道可謂孝矣者謂所觀之事也子若在父喪三年之內不改父風政此即是孝也所以是孝者其義有二也一則哀毁之深豈復識政之是非故君薨世子聽冢宰三年也二則三年之內哀慕心事亡如存則所不忍改也或問曰若父政善則不改為可若父政惡惡教傷民寧可不改乎答曰本不論父政之善惡自論孝子之心耳若人君風政之惡則冢宰自行政若卿大夫之心惡則其家相邑宰自行事無關於孝子也注孔安國曰至行也云觀其志者志若好善聞善事便喜志若好惡聞善則不喜也云觀其行者得專行也注孔安國曰至道也此如後通也有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也注馬融曰人知禮貴和而每事從和不以禮為節亦不可行也疏有子曰至行也云禮之用和為貴者此以下明人君行化必禮樂相須用樂和民心以禮檢民迹迹檢心和故風化乃美故云禮之用和為貴和即樂也變樂言和見樂功也樂既言和則禮宜云敬但樂用在內為隱故言其功也云先王之道斯為美者先王謂聖人為天子者也斯此也言聖天子之化行禮亦以此用和為美也云小大由之有所不行者由用也若小大之事皆用禮而不用和則於事有所不行也云知和云云者上明行禮須樂此明行樂須禮也人若知禮用和而每事從和不復用禮為節者則於事亦不得行也所以言亦者沈居士云上純用禮不行今皆用和亦不可行也注馬融曰至行也此解知和而和不以禮為節義也有子曰信近於義言可復也注復猶覆也義不必信信不必義也以其言可反覆故曰近於義也恭近於禮遠恥辱也注苞氏曰恭不合禮非禮也以其能遠恥辱故曰近於禮也因不失其親亦可宗敬也注孔安國曰因親也言所親不失其親亦可宗敬也疏有子曰至敬也云信近於義言可復也者信不欺也義合宜也復猶驗也夫信不必合宜合宜不必信若為信近於合宜此信之言乃可復驗也若為信不合宜此雖是不欺而其言不足復驗也或問曰不合宜之信云何答曰昔有尾生與一女子期於梁下每期每會後一日急暴水漲尾生先至而女子不來而尾生守信不去遂守期溺死此是信不合宜不足可復驗也六恭近於禮遠恥辱也者恭是遜從禮是體别若從不當於體則為恥辱若遜從近禮則遠於恥辱遜從不合禮者何猶如遜在牀下及不應拜而拜之之屬也云因不失其親亦可宗敬也者因猶親也人能所親得其親者則此德可宗敬也親不失其親若近而言之則指於九族宜相和睦也若廣而言之則是泛愛衆而親仁乃義之與比是親不失其親也然云亦可宗者亦猶重也能親所親則是重為可宗也注復猶至義也若如注意則不可得為向者通也言信不必合宜雖不合宜而其交是不欺不欺則猶近於合宜故其言可覆驗也注苞氏曰至禮也此注亦不依向通也故言恭不合禮乃是非禮而交得逺於恥辱故曰近禮也即是危行言遜得免遠恥辱也注孔安國曰至敬也亦會二通然喪服傳云繼母與因母同是言繼母與親母同故孔亦謂此因為親是也子曰君子食無求飽居無求安注鄭玄曰學者之志有所不暇也敏於事而慎於言就有道而正馬可謂好學也已矣注孔安國曰敏疾也有道者謂有道德者也正謂問事是非也疏子曰至已矣云君子食無求飽居無求安者此勸人學也既所慕在形骸之內故無暇復在形骸之外所以不求安飽也一簞一瓢是無求飽也曲肱陋巷是無求安也云畝於事者此以下三句是不飽不安所為之事也敏疾也事所學之行也疾於所學之行也云而慎於言者言所學之言也所學之言當慎傳説之也云就有道而正焉者有道有道德者也若前學之言行心有疑昧則往就有道德之人決正之也云可謂好學也已矣者合結食無求飽以下之事並是可謂好學者也子貢問曰貧而無諂富而無驕何如子曰可也注孔安國曰未足多也未若貧而樂道富而好禮者也注鄭玄曰樂謂志於道不以貧賤為憂苦也子貢曰詩云如切如磋如琢如磨其斯之謂與也注孔安國曰能貧而樂道富而好禮者能自切磋琢磨者也子曰賜也始可與言詩已矣告諸往而知來者也注孔安國曰諸之也子貢知引時以成孔子義善取類故然之往告之以貧而樂道來答以切磋琢磨者也疏子貢問至來者也云貧而無諂者屯財曰貧非分橫求曰諂也乏財者好以非分橫求也子貢問言若有貧者能不橫求何如故云貧而無諂也范寧云不以正道求人為諂也云富而無驕者積蓄財帛曰富陵上慢下曰驕也富積者既得人所求好生陵慢故云富而無驕也云何如者陳二事既畢故問云何如也云子曰可也者答子貢也言貧富如此乃是可耳未足為多也范寧云孔子以為不驕不諂於道雖可未及臧也云未若貧而樂道者孔子更説貧行有勝於無諂者也貧而無諂乃是為可然而不及於自樂也故孫綽云顔氏之子一簞一瓢人不堪憂回也不改其樂也云富而好禮者也者又舉富行勝於不驕者也富能不驕乃是可嘉而未如恭敬好禮者也然不云富而樂道貧而好禮者亦各指事也貧者多憂而不樂故以樂為勝又貧無財以行禮故不云禮也富既饒足本自有樂又有財可行禮故言禮也云子貢曰云云者子貢聞孔子言貧樂富禮並是宜自切磋之義故引詩以證之也爾雅云治骨曰切治象曰磋治玉曰琢治石曰磨言骨象玉石四物須切磋乃得成器如孔子所説貧樂富禮是自切磋成器之義其此之謂不乎以咨孔子也云子曰賜也始可與言詩已矣者子貢既知引詩結成孔子之義故孔子美之云始可與言詩也言始可者明知之始於此也云告諸往而知來者也者解所以可言詩義也諸之也言我往告之以貧樂富禮而子貢來答知引切磋之詩以起豫也江熙云古者賦詩見志子貢意見故曰可與言詩矣夫所貴悟言者既得其言又得其旨也告往事而知將來謂聞夷齊之賢可以知不為衛君不欲指言其語故舉其類耳范寧云子貢欲躬行二者故請問也切磋琢磨所以成器訓誘學徒義同乎兹子貢富而猶吝仲尼欲戒以禮中子貢知心厲己故引詩以為喻也注鄭玄曰至苦也顔願是也子曰不患人之不已知也患已不知人也注王肅曰但患已之無能知也疏子曰至人也世人多言已有才而不為人所知故孔子解抑之也言不患人不知已但患已不知人耳故李充云凡人之情多輕易於知人而怨人不知已故抑引之教興乎此矣論語為政第二疏為政者明人君為風俗政之法也謂之為政者後卷云政者正也子率而正孰敢不正又鄭注周禮司馬云政正也政所以正不正也所以次前者學記云君子如欲化民成俗其必由學乎是明先學後乃可為政化民故以為政次於學而也子曰為政以德譬如北辰居其所而衆星共之注鄭玄曰德者無為譬猶北辰之不移而衆星共之也疏子曰至共之云為政以德者此明人君為政教之法也德者得也言人君為政當得萬物之性故云以德也故郭象云萬物皆得性謂之德夫為政者奚事哉得萬物之性故云德而已也云譬如云云者此為為政以德之君為譬也北辰者北極紫微星也所猶地也衆星謂五星及二十八宿以下之星也北辰鎮居一地而不移動故衆星共宗之以為主也譬人君若無為而御民以德則民共尊奉之而不違背猶如衆星之共尊北辰也故郭象云得其性則歸之失其性則違之子曰詩三百注孔安國曰篇之大數也一言以蔽之注苞氏曰蔽猶當也曰思無邪注苞氏曰歸於正也疏子曰至無邪此章舉詩證為政以德之事也云詩三百者詩即今之毛詩也三百者詩篇大數也詩有三百五篇此舉其全數也云一言以蔽之者一言謂思無邪也蔽當也詩雖三百篇之多六義之廣而唯用思無邪之一言以當三百篇之理也猶如為政其事乃多而終歸於以德不動也云曰思無邪者此即詩中之一言也言為政之道唯思於無邪無邪則歸於正也衛瓘云不曰思正而曰思無邪明正無所思邪邪去則合於正也子曰導之以政注孔安國曰政謂法教也齊之以刑注馬融曰齊整之以刑罰也民免而無恥注孔安國曰苟免罪也導之以德注苞氏曰德謂道德也齊之以禮有恥且格注格正也疏子曰至且格此章證為政以德所以勝也云導之以政者將言其勝故先舉其劣者也導謂誘引也政謂法制也謂誘引民用法制也故郭象云政者立常制以正民者也云齊之以刑者齊謂齊整之也刑謂刑罰也故郭象云刑者興法辟以割制物者也云民免而無恥者免猶脫也恥恥辱也為政若以法制導民以刑罰齊民則民畏威苟且百方巧避求於免脫罪辟而不復知避恥故無恥也故郭象云制有常則可矯法辟興則可避可避則違情而苟免可矯則去性而從制從制外正而心內未服人懷苟免則無恥於物其於化不亦薄乎故曰民免而無恥也云導之以德者此即舉勝者也謂誘引民以道德之事也郭象云德者得其性者也云齊之以禮者以禮齊整之也郭象云禮者體其情也云有恥且格者既導德齊禮故民服從而知愧恥皆歸於正也郭象云情有所恥而性有所本得其性則本至體其情則知恥知恥則無刑而自齊本至則無制而自正是以導之以德齊之以禮有恥且格沈居士云夫立政以制物物則矯以從之用刑以齊物物則巧以避之矯則迹從而心不化巧避則苟克而情不恥由失其自然之性也若導之以德使物各得其性則皆用心不矯其真各體其情則皆知恥而自正也注孔安國曰政謂法教也法教即是法制也注苞氏曰德謂道德也亦得合郭象解也子曰吾十有五而志於學三十而立注有所成立也四十而不惑注孔安國曰不疑惑也五十而知天命注孔安國曰知天命之終始也六十而耳順注鄭玄曰耳順聞其言而知其微旨也七十而從心所欲不踰矩注馬融曰矩法也從心所欲無非法者疏子曰至踰矩此章明孔子隱聖同凡學有時節自少迄老皆所以勸物也云吾十有五而志於學者志者在心之謂也孔子言我年十五而學在心也十五是成童之歲識慮堅明故始此年而志學也云三十而立者立謂所學經業成立也古人三年明一經從十五至三十是又十五年故通五經之業所以成立也云四十而不惑者惑疑惑也業成後已十年故無所惑也故孫綽云四十強而仕業通十年經明行修德茂成於身訓洽邦家以之蒞政可以無疑惑也六五十而知天命者天命謂窮通之分也謂天為命者言人稟天氣而生得此窮通皆由天所命也天本無言而云有所命者假之言也人年未五十則猶有橫企無崖及至五十始衰則自審已分之可否也故王弼云天命廢興有期知道終不行也孫綽云大易之數五十天地萬物之理究矣以知命之年通致命之道窮學盡數可以得之不必皆生而知之也此勉學之至言也熊埋云既了人事之成敗遂推天命之期運不以可否繫其理治不以窮通易其志也云六十而耳順者順謂不逆也人年六十識智廣博凡厥萬事不得悉須觀見但聞其言即解微旨是所聞不逆於耳故曰耳順也故王弼云耳順言心識任聞前也孫綽云耳順者廢聽之理也朗然自玄悟不復役而後得所謂不識不知從帝之則也李充云耳順者聽先王之法言則知先王之德行從帝之則莫逆於心心與耳相從故曰耳順也云七十而從心所欲不踰矩者從猶放也踰越也矩法也年至七十習與性成猶蓬生麻中不扶自直故雖復放縱心意而不踰越於法度也所以不説八十者孔子唯夀七十三也説此語之時當在七十後也李充曰聖人微妙玄通深不可識所以接世軓物者曷嘗不誘之以形器乎黜獨化之迹同盈虛之質勉夫童蒙而志乎學學十五載功可與立自志學迄於從心善始令終貴不踰法示之易行而約之以禮為教之例其在兹矣注孔安國曰知天命之終始也終始即是分限所在也孟懿子問孝注孔安國曰魯大夫仲孫何忌也懿諡也子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違注鄭玄曰孟孫不曉無違之意將問於樊遲故告之也樊遲弟子樊須也樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮疏孟懿子問至以禮云孟懿子問孝者孟懿子魯大夫也問孝問於孔子為孝之法也云子曰無違者孔子答也言行孝者每事須從無所違逆也云樊遲御者樊遲孔子弟子樊須也字子遲御御車也謂樊遲時為孔子御車也云子告云云者孟孫即懿子也孔子前答懿子之問云無違恐懿子不解而他日樊遲為孔子御車孔子欲使樊遲為孟孫解無違之旨故語樊遲云孟孫問孝於我我對曰無違也云樊遲曰何謂也者樊遲亦不曉無違之旨故反問之何謂也云子曰云云者向樊遲釋無違旨也孟孫三家偕濫違禮故孔子以每事須禮為答也此三事為人子之大禮故特舉之也故衛瓘云三家僭侈皆不以禮也故以禮答之也或問曰孔子何不即告孟孫乃還告樊遲耶答曰欲厲於孟孫言其人不足委曲即亦示也所以獨告樊遲者舊説云樊遲與孟孫親狎必問之也一云孟孫問時樊遲在側孔子知孟孫不曉後必問樊遲故後遲御時而告遲也注孔安國曰至諡也云魯大夫仲孫何忌者仲孫是其氏也何忌是其名也然曰孟懿子而不云仲孫者魯有三卿至八佾自釋也云懿諡也者諡者明行之迹也生時有百行之不同死後至葬隨其生時德行之迹而為名稱猶如經緯天地曰文撥定禍亂曰武之屬也孟武伯問孝子曰父母唯其疾之憂注馬融曰武伯懿子之子仲孫彘也武諡也言孝子不妄為非唯有疾病然後使父母之憂耳疏孟武伯問至之憂云孟武伯問孝者孟武伯懿子之子也亦問孔子行孝之法也云子曰父母唯其疾之憂者答也其其於人子也言人子欲常敬慎自居不為非法橫使父母憂也若己身有疾唯此一條非人所及可測尊者憂耳唯其疾之憂也子遊問孝注孔安國曰子遊弟子也姓言名偃也子曰今之孝者是謂能養至於犬馬皆能有養不敬何以别乎注苞氏曰犬以守禦馬以代勞能養人者也一曰人之所養乃能至於犬馬不敬則無以别孟子曰養而不愛豕畜之也愛而不敬獸畜之也疏子遊問至别乎云子遊問孝者亦問行孝法也云子曰今之孝者是謂能養者答也今之謂當孔子時也夫孝為體以敬為先以養為後而當時皆多不孝縱或一人有唯知進於飲食不知行敬故云今之孝者是謂能養也云至於犬馬皆能有養者此舉能養無敬非孝之例也犬能為人守禦馬能為人負重載人皆是能養而不能行敬者故云至於犬馬皆能有養也云不敬何以别乎者言犬馬者亦能養人但不知為敬耳人若但知養而不敬則與犬馬何以為殊别乎注苞氏曰至畜之也云犬以守禦馬以代勞能養人者也者唯不知敬與人為别耳云一曰人之所養乃能至於犬馬者此釋與前異也言人所養乃至養於犬馬也云不敬則無以别者養犬馬則不須敬若養親而不敬則與養犬馬不殊别也云孟子曰養而不愛豕畜之也者引孟子語證後通也言人畜養豕但以食之而不愛重之也云愛而不敬獸畜之也者又言人養珍禽竒獸亦愛重之而不恭敬之也子夏問孝子曰色難注苞氏曰色難謂承望父母顔色乃為難也有事弟子服其勞有酒食先生饌注馬融曰先生謂父兄也饌飲食也曾是以為孝乎注馬融曰孔子喻子夏曰服勞先食汝謂此為孝乎未足為孝也承順父母顔色乃是為孝耳疏子夏問至孝乎云子夏問孝者亦問行孝法也云子曰色難者答也色謂父母顔色也言為孝之道必須承奉父母顔色此事為難故曰色難也故顔延之云夫氣色和則情志通善養親之志者必先和其色故曰難也云有事弟子服其勞者此以下是易而非孝子之事也有事謂役使之事也弟子謂為人子弟者也服謂執持也勞勞苦也言家中有役使之事而弟子自執持不憚於勞苦也云有酒食先生饌者先生謂父兄也饌猶飲食也言若有酒食則弟子不敢飲食必以供飲食於父母也云曾是以為孝乎者曾猶嘗也言為人子弟先勞後食此乃是人子人弟之常事最易處耳誰嘗謂此為孝乎言非孝也故江熙稱或曰勞役居前酒食處後是人子之常事未足稱孝也然此四人問孝是同而夫子答異者或隨疾與藥或寄人𢎞教也懿子武伯皆明以其人有失故隨其失而答之子遊子夏是寄二子以俱明教也故王弼云問同而答異者或攻其短或矯其時失或成其志或説其行又沈峭云夫應教紛紜常係汲引經營流世每存急疾今世萬途難以同對互舉一事以訓來問來問之訓縱橫異轍則孝道之廣亦以明矣注馬融曰先生謂父兄也然禮唯呼師為先生謂資為弟子此言弟子以對先生則似非子弟對父兄也而注必謂先生為父兄者其有二意焉一則既云問孝孝是事親之目二則既釋先生為父兄欲寄在三事同師親情等也子曰吾與回言終日不違如愚注孔安國曰回弟子也姓顔名回字子淵魯人也不違者無所怪問於孔子之言默而識之如愚者也退而省其私亦足以發回也不愚也注孔安國曰察其退還與二三子説釋道義發明大體知其不愚也疏子曰至愚也云吾與回言終日不違如愚者此章美顔淵之德也回者顔淵名也愚者不達之稱也自形器以上名之為無聖人所體也自形器以還名之為有賢人所體也今孔子終日所言即入於形器故顔子聞而即解無所咨問故不起發我道故言終日不違也一往觀回終日默識不問殊似於愚魯故云如愚故繆孺云將言形器形器顔生所體莫逆於心故若愚也云退而云云者退謂回聽受已竟退還其私房時也省視也其私謂顔私與諸朋友談論也發發明義理也言回就人衆講説見回不問如似愚人今視回退還私房與諸子覆述前義亦足發明義理之大體故方知回之不愚也熊理云察退與二三子私論亦足以發明聖奧振起風訓也回之似愚而豈愚哉既以美顔又曉衆人未違者也注孔安國曰至者也諸弟子不解故時或咨問而顔回默識故不問不問如愚者之不能問也子曰視其所以注以用也言視其所行用也觀其所由注由經也言觀其所經從也察其所安人焉廋哉人焉廋哉注孔安國曰廋匿也言觀人之終始安有所匿其情也疏子曰至廋哉此章明觀知於人之法云視其所以者以用也其其彼人也若欲知彼人行當先視其即日所行用之事也云觀其所由者由者經歷也又次觀彼人從來所經歷處之故事也云察其所安者察謂心懷忖測之也安謂意氣歸向之也言雖或外迹有所避而不得行用而心中猶趣向安定見於貌者當審察以知之也然在用言視由言觀安言察者各有以也視直視也觀廣贍也察沈吟用心忖度之也即日所用易見故云視而從來經歷處此即為難故宫觀情性所安最為深隱故云察也云人焉廋哉人焉廋哉者焉安也廋匿也言用上三法以觀驗彼人之德行則在理必盡故彼人安得藏匿其情耶再言之者深明人情不可隱也故江熙云言人誠難知以三者取之近可識也子曰溫故而知新可以為師矣注溫尋也尋繹故者又知新者可以為師也疏子曰至師矣此章明為師之難也溫溫燖也故謂所學已得之事也所學已得者則溫燖之不使忘失此是月無忘其所能也新謂即時所學新得者也知新謂日知其所亡也若學能日知所亡月無忘所能此乃可為人師也孫綽云滯故則不能明新希新則存故不篤常人情也唯心平秉一者守故彌溫造新必通斯可以為師者也注溫尋也溫是尋繹之義亦是燖暖之義也子曰君子不器注苞氏曰器者各周其用至於君子無所不施也疏子曰君子不器此章明君子之人不係守一業也器者給用之物也猶如舟可汛於海不可登山車可陸行不可濟海君子當才業周普不得如器之守一也故熊埋云器以名可繫其用賢以才可濟其業業無常分故不守一名用有定施故舟車殊功也子貢問君子子曰先行其言而後從之注孔安國曰疾小人多言而行之不周也疏子貢問至從之云子貢問君子者問施何德行而可謂為君子乎云子曰先行其言而後從之者答云君子先行其言而後必行行以副所言是行從言也若言而不行則為辭費君子所恥也又一通云君子之言必為物偕故凡有言皆令後人從而法之也故王朗云鄙意以為立言之謂乎傳曰大上有立德其次立言明君子之道言必可則令後世凖而從之故曰而後從之子曰君子周而不比注孔安國曰忠信為周阿黨為比也小人比而不周疏子曰至不周此章明君子行與小人異也云君子周而不比者周忠信也比阿黨也君子常以忠信為心而無相阿黨也云小人比而不周者與君子反也小人唯更相阿黨而並不忠信也然周是博遍之法故謂為忠信比是親狎之法故謂為阿黨耳若互而言周名亦有惡比名亦有善者故春秋傳云是謂比周言其為惡周遍天下也易卦有比比則是輔里仁云君子義之與比比則是親雖非廣稱文亦非惡今此文既言周以對比故以為惡耳孫綽云理備故稱周無私故不比也子曰學而不思則罔注苞氏曰學而不尋思其義理則罔然無所得也思而不學則殆注不學而思終卒不得使人精神疲殆也疏子曰至則殆此章教學法也云學而不思則罔者夫學問之法既得其文又宜精思其義若唯學舊文而不思義則臨用行之時罔罔然無所知也又一通云罔誣罔也言既不精思至於行用乖僻是誣罔聖人之道也云思而不學則殆者又若不廣學舊文而唯専意而獨思則精神疲殆而於所業無功也子曰攻乎異端斯害也已矣注攻治也善道有統故殊途而同歸異端不同歸者也疏子曰攻乎異端斯害也已矣此章禁人雜學諸子百家之書也攻治也古人謂學為治故書史載人專經學問者皆云治其書治其經也異端謂雜書也言人若不學六籍正典而雜學於諸子百家此則為害之深故云攻乎異端斯害也已矣斯害也已矣者為害之深也注善道至者也云善道有統故殊途而同歸者善道即五經正典也有統統本也謂皆以善道為本也殊途謂詩書禮樂為教之途不同也同歸謂雖所明各異而同歸於善道也云異端不同歸者也者諸子百家並是虛妄其理不善無益教化故是不同歸也子曰由誨汝知之乎注孔安國曰由弟子也姓仲名由字子路也知之為知之不知之為不知是知也疏子曰至知也此章抑子路兼人也云子曰由者由子路名也子路有兼人之性好以不知為知也孔子將欲教之故先呼其名也云誨汝知之乎者誨教也孔子呼子路名云由我欲教汝知之文章乎云知之為知之不知之為不知者汝若心有所不知則當云不知不可妄云知之也云是知也者若不知云知此則是無知之人耳若實知而云知此乃是有知之人也又一通云孔子呼子路名云由我從來教化於汝汝知我教汝以不乎汝若知我教則云知若不知則云不知能如此者是有知之人也子張學干祿注鄭玄曰子張弟子也姓顓孫名師字子張也干求也祿祿位也子曰多聞闕疑慎言其餘則寡尤注苞氏曰尤過也疑則闕之其餘不疑猶慎言之則少過也多見闕殆慎行其餘則寡悔注苞氏曰殆危也所見危者闕而不行則少悔也言寡尤行寡悔祿在其中矣注鄭玄曰言行如此雖不得祿得祿之道也疏子張學至中矣云子張學干祿者干求也祿祿位也弟子子張就孔子學求祿位之術也云子曰多聞闕疑者答求祿術也疑疑惑之事也言人居世間必多有所聞所聞之事必有疑者有解者解者則心録之若疑者則廢闕而莫存録故云多聞闕疑云慎言其餘者其餘謂所心解不疑者也已闕廢可疑者而所餘不疑者雖存録在心亦何必中理故又宜口慎言之也云則寡尢者寡少也尢過也既闕可疑又慎言所不疑能如此者則生平之言少有過失也云多見闕殆者殆危也言人若眼多所見闕廢其危殆者不存録之也云慎行其餘者其餘謂自所録非危殆之事也雖已廢危殆者而所餘不殆者亦何必並中其理故又宜慎行之也云則寡悔者悔恨也既闕於危殆者又慎行所不殆能如此者則平生所行少悔恨也云言寡尤行寡悔祿在其中矣者其餘若能言少過失行少悔恨則祿位自至故云祿在其中也故范寧云發言少過履行少悔雖不以要祿乃致祿之道也仲尼何以不使都無尢悔而言寡尢乎有顔回猶不二過蘧伯玉亦未能寡其過自非聖人何能無之子張若能寡尢悔便為得祿者也注鄭玄曰至道也言當無道之世德行如此雖不得祿若忽值有道之君則必見用故云得祿之道也哀公問曰何為則民服注苞氏曰哀公魯君之諡也孔子對曰舉直錯諸枉則民服注苞氏曰錯置也舉用正直之人廢置邪枉之人則民服其上矣舉枉錯諸直則民不服疏哀公問至不服云哀公問曰何為則民服者哀公失德民不服從而公患之故問孔子求民服之法也云孔子對曰舉直錯諸枉則民服者答哀公民服之法也凡稱子曰則是弟子所記若稱孔子則當時人非弟子所記後為弟子所撰仍舊不復改易故依先呼孔子也直謂正直之人也錯置也枉委曲邪佞之人也言若舉正直之人為官位為廢置邪佞之人則民服君德也亦由哀公廢直用枉故也故范寧云哀公捨賢任佞故仲尼發乎此言欲使舉賢以服民也云舉枉錯諸直則民不服者此舉哀公之政如此故民不服也江熙云哀公當千載之運而聖賢滿國舉而用之魯其王矣而唯好耳目之悅羣邪秉政民心厭棄既而苦之乃有此問也季康子問使民敬忠以勸如之何注孔安國曰魯卿季孫肥也康諡也子曰臨民之以莊則民敬注苞氏曰莊嚴也君臨民以嚴則民敬其上也孝慈則忠注苞氏曰君能上孝於親下慈於民則民忠矣舉善而教不能則民勸注苞氏曰舉用善人而教不能者則民勸也疏季康子問至民勸云季康子問云云者季康子魯臣也其既無道僭濫故民不敬不忠不相勸奬所以問孔子求學使民行敬及忠及勸三事也故云如之何云子曰云云者答使為三事之術也民從上化如草從風也臨謂以高視下也莊猶嚴也言君居上臨下若自能嚴整則下民皆為敬其上也云孝慈則忠者人言君若上孝父母下慈民人則民皆盡竭忠心以奉其上也故江熙云言民法上而行也上孝慈則民亦孝慈孝於其親乃能忠於君求忠臣必於孝子之門也云舉善而教不能則民勸者又言若民中有善者則舉而祿位之若民中未能善者則教令使能若能如此則民競為勸慕之行也或謂孔子曰子奚不為政注苞氏曰或人以為居位乃是為政也子曰書云孝于惟孝友于兄弟施於有政是亦為政也奚其為為政注苞氏曰孝于惟孝者美孝之辭也友于兄弟善於兄弟也施行也所行有政道即是與為政同耳疏或謂至為政云或謂云云者或者或有一人不記其姓名也奚何也政謂居官南靣也或人見孔子栖達故問孔子曰何不為政處官位乎云子曰云云者此以上並尚書言也引書以答或人也然此語亦與尚書微異而義可一也善父母曰孝善兄弟為友于於也惟孝謂惟令盡於孝也施行也言人子在閨門當極孝于父母而極友於兄弟若行此二事有政即亦是為政也云奚其為為政者此是孔子正答於或人也言施行孝友有政家家皆正則邦國自然得正亦又何用為官位乃是為政乎故范寧云夫所謂政者以孝友為政耳行孝友則是為政復何者為政乎引周書所以明政也或人貴官位而不存孝道故孔子言于此也注苞氏曰至同耳云孝于云云者惟令極行於孝故云美孝之辭也然友于兄弟是善於兄弟則孝于惟孝是善於父母也父母既云孝于惟孝則兄弟亦宜云友于惟友也所以互見之也云施行云云者行孝友有政道即與為政同更何所别復為政乎子曰人而無信不知其可也注孔安國曰言人而無信其餘終無可也大車無輗小車無軏其何以行之哉注苞氏曰大車牛車輗者轅端橫木以縛枙者也小車駟馬車也軏者轅端上曲拘衡者也疏子曰至之哉此章明人不可失信也云人而無信不知其可也者言人若無信雖有他才終為不可故云不知其可也云大車云云者此為無信設譬也言人以信得立如大小之車由於輗軏以得行也若車無輗軏則車何以得行哉如人而無信則何以得立哉故江熙稱彥升曰車待輗軏而行猶人須信以立也注孔安國曰至可也其餘謂他才伎也注苞氏曰至者也云天車牛車者牛能引重故曰大車也云輗者轅端橫木以縛枙者也者端頭也古作牛車二轅不異即時車但轅頭安枙與今異也即時車枙用曲木駕於牛脰仍縛枙兩頭者兩轅古時則先取一橫木縛著兩轅頭又别取曲木為枙縛著橫木以駕牛脰也即時一馬牽中枙猶如此也云小車駟馬車也者馬所載輕故曰小車也四馬共牽一車即今龍旗車是也云軏者轅端上曲枸衡者也者衡橫也四馬之車唯中夾有一轅轅頭曲向上此拘駐於橫名此曲者為軏也所以頭拘此橫者轅駕四馬故先橫一木於轅頭而縛枙著此橫此橫既為四馬所載恐其不堅故特置曲枙軏裏使牽之不脫也猶即時龍旗車轅端為龍置橫在龍頭上曲處也鄭玄曰輗穿轅端著之軏因轅端著之子張問十世可知也注孔安國曰文質禮變也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也注馬融曰所因謂三綱五常也所損益謂文質三統也其或繼周者雖百世亦可知也注馬融曰物類相招勢數相生其變有常故可豫知也疏子張問至知也云子張問十世可知也者十世謂十代也子張見五帝三王文質變易世代不同故問孔子從今以後方來之事假設十代之法可得逆知以不乎云子曰殷因云云者孔子舉前三代禮法相因及所損益以為後代可知之證也言殷代夏立而因用夏禮及損益夏禮事事可得而知也云周因云云者又周代殷立亦有因殷禮及有所損益者亦事事可知也云其或云云者既因變有常故從今以後假令或有繼周而王者王王相承至於百世亦可逆知也言或者爾時周猶在不敢指斥百代故云其或也注馬融曰至統也云所因謂三綱五常者此是周所因於殷殷所因於夏之事也三綱謂夫婦父子君臣也三事為人生之綱領故云三綱也五常謂仁義禮智信也就五行而論則木為仁火為禮金為義水為信上為智人稟此五常而生則備有仁義禮智信之性也人有博愛之德謂之仁有嚴斷之德為義有明辨尊卑敬讓之德為禮有言不虛妄之德為信有照了之德為智此五者是人性之恆不可暫捨故謂五常也雖復時移世易事歷今古而三綱五常之道不可變革故世世相因百代仍襲也云所損益謂文質三統者夫文質再而復正朔三而改質文再而復者若一代之君以質為教者則次代之君必以文教也以文之後君則復質質之後君則復文循環無窮有興必有廢廢興更遷故有損益也正朔三而改者三代而一周也夫人君為政所尚不同必各有所統統則有三也案大傳云王者始起改正朔易服色夫正朔有三本亦有三統明王者受命各統一正也朔者蘇也革也言萬物革更於足故統馬又禮三正記云正朔三而改文質再而復尚書大傳云夏以孟春為正殷以季冬為正周以仲冬為正又曰夏以十三月為正色尚黑以平旦為朔殷以十二月為正色尚白以雞鳴為朔周以十一月為正色尚赤以夜牛為朔也白虎通云王者受命必改正朔者明易姓示不相襲明受之於天不受之於人所以變易民心革其耳目以化又云十三月之時萬物始達孚甲而出皆黑人得加功力故夏為人正色尚黑也十二月之時萬物始芽而白白者陰氣故段為地正色尚白也十一月之時陽氣始養根核故黃泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤也又云天道左旋改正右行者非改天道但改日月耳日月右行故改正右行日尊於月不言正日而言正月者積日成月物隨月而變據物為正也天質地文周反天統何質文再改正朔三易三微質文正不相因故正不隨質文也三統之義如此然舊問云夏用建寅為正物初出色黑故尚黑今就草木初生皆青而云黑何也舊通云物初出乃青遠望則黑人功貴廣遠故也且一日之中天有青時故取其黑也又舊問云三正為正是三王為上代已有舊通有二家一云正在三代三代時相統故須變革相示也人一家云自從有書籍而有三正也伏犧為人統神農為地統黃帝為天統少昊猶天統言是黃帝之子故不改統也顓頊為人統帝嚳為地統帝堯是為嚳子亦為地統帝舜為天統夏為人統殷為地統周為天統三正相承若連環也今依後釋所以必從人為始者三才須人乃成是故從人為始也而禮家從夏為始者夏是三王始故舉之也又不用建卯建辰為正者于是萬物不齊莫適所統也注馬融曰至知也云物類相招者謂三綱五常各以類相招因而不變者也云勢數相生者謂文質三統及五行相次各有勢數也如太昊木德神農火德黃帝土德少昊金德顓頊水德周而復始其勢運相變生也云其變有常故可豫知者豫逆也有因有變各有其常以此而推故百世可逆知也子曰非其鬼而祭之諂也注鄭玄曰人神曰鬼非其祖考而祭之是諂以求福也見義不為無勇也注孔安國曰義者所宜為也而不能為是無勇也疏子曰至勇也云非其鬼而祭之諂也者諂橫求也鬼神聰明正直不歆非禮人若非已祖考而祭之是為諂求福也云見義不為無勇也者義謂所宜為也見所宜為之事而不為是無勇敢也論語集解義疏卷一
