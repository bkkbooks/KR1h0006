body:
  text: 欽定四庫全書論語集解義疏卷五魏何晏集解梁皇侃義疏論語子罕第九疏子孔子也罕希也此篇明時感者既少故聖應亦希也所以次前者外逺當貴既為粃糠故還反凝寂所以希言故子罕火泰伯也子罕言利與命與仁注罕者希也利者義之和也命者天之命也仁者行之盛也寡能及之故希言也疏子罕言利與命與仁子孔子也罕者希也言者說也利者天道元亨利萬物者也與者言語許與之也命天命窮通天壽之日也仁者惻隱濟衆行之盛者也弟子記孔子為教化所希言及所希許與人者也所以然者利是元亨利貞之道也百姓日用而不知其理𤣥絶故孔子希言也命是人稟天而生其道難測又好惡不同若逆向人說則傷動人情故孔子希說與人也仁是行盛非中人所能故亦希說許與人也然希者非都絶之稱亦有時而言與人也周易文言是說利之時也謂伯牛亡之命矣夫及云若由也不得其死然是說與人命也人孟武伯問子路冉求之屬仁乎子曰不知及云楚令尹陳文子馬得仁並是不與人仁也而云顔回三月不違仁及云管仲如其仁則是說與人仁時也故云子罕言利與命與仁也注罕者至言也云罕者希也利者義之和也者即引文言也義者宜也和者無害也凡人世之利利彼則害此非義和也若天道之利利而無害故萬物得宜而和故曰義之和也云命者天之命者人禀天而生故云天命也中庸曰天命之謂性是也云仁者行之盛者也仁義禮智信五者至是人之行而仁居五者之首主生故曰行盛也云寡能及之者天道微妙天命深逺仁道盛大非人所能知及故云寡能及之也云故希言也者為世人寡及故孔子亦希言也達巷黨人曰大哉孔子博學而無所成名注鄭𤣥曰達巷者黨名也五百家為黨此黨之人美孔子博學道藝不成一名而已子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣注鄭𤣥曰聞人美之承以謙也吾執御者欲名六藝之卑也疏達巷圭御矣云達巷云云者五百家為黨黨各有名此黨名達巷達巷黨中人美孔子道大故曰大哉也博廣也言大哉孔子廣學道藝周遍不可一一而稱故云無所成名也猶如堯德蕩蕩民無能名也故王弼曰譬猶和樂出乎八音乎然八音非其名也江熙曰言其彌貫六流不可以一藝取名焉故曰大也云子聞云云者孔子聞達巷人美已故呼弟子而語之也彼既美我之博學而我於道藝何所持執乎欲自謙也云執御乎執射乎者既欲謙己之不多故陳六藝之下者以自許也言吾所執執於御及射乎御御車者也云吾執御矣者向欲合以射御自許又嫌太多故又滅射而云吾執御者也注鄭𤣥曰至卑也六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數也今云執御御比禮樂射為卑也子曰麻冕禮也今也純儉吾從衆注孔安國曰冕緇布冠也古者積麻三十升布以為之純絲也絲易成故從儉也拜下禮也今拜乎上泰也雖違衆吾從下注王肅曰臣之與君行禮者下拜然後升成禮時臣驕泰故於上拜也今從下禮之恭也疏子曰至從下云麻冕禮也者禮謂周禮也周禮有六冕以平板為主而用三十升麻布衣板上𤣥下纁故云麻冕禮也云今也純者今謂周末孔子時也純絲也周末不復用三十升布但織絲為之故云今也云儉者三十升布用功巨多難得難得則為奢華而織絲易成易成則為儉約故云儉也云吾從衆者衆謂周末時人也時既人人從易用絲故孔子云吾亦從衆也所以從之者周末每事奢華孔子寧欲抑奢就儉今幸得衆共用儉故孔子從之也云拜下禮也者下謂堂下也禮君與臣燕君賜酒皆下堂而再拜故云拜下禮也云今拜乎上泰也者今謂周末孔子時也上謂堂上也泰驕泰也當于時周末君臣飲燕臣得君賜酒不復下堂但於堂上而拜故云今拜乎上泰也拜不下堂是由臣驕泰故云泰也云雖違衆吾從下者當時皆違禮而拜上者衆孔子不從拜上故云雖違衆也違衆而從舊禮拜於下故云吾從下也注孔安國曰冕緇布冠也冠冕邇名也且周家委貌冠亦用三十升緇布也注王肅曰至恭也云臣之云云者燕義云君舉旅於賔及君所賜爵皆降再拜稽首升成拜明臣禮也案燕義云賓皆是臣也臣得君旅及賜爵降下堂再拜再拜竟更升堂又再拜謂為成拜成拜者向在堂下之拜若禮未成然故更升堂以成之也云時臣云云者周末時如此也云今從下禮之恭也者孔子欲從下之禮是禮為恭也子絶四毋意注以道為度故不任意也毋必注用之則行捨之則藏故無專必也毋固注無可無不可故無固行也毋我注述古而不自作處羣萃而不自異唯道是從故不自有其身也疏子絶至毋我云子絶四者絶者無也明孔子聖人無此下四事故云絶四也不云無而曰絶者據世人以言之也四事世人未能絶而孔子絶之故云絶也顔延之云謂絶人四者也云毋意者一也此謂聖人心也凡人有滯故動靜委曲自任用其意聖人無心泛若不係舟豁寂同道故無意也云毋必者二也此謂聖人行化時也物求則赴應無所抑必故互鄉進而與之是也無所抑必由無意故能為化無必也云無固者三也此聖人已應物行化故也固謂執守堅固也聖雖已應物物若不能得行則聖亦不追固執之不反三隅則不復是也亦由無意故能無固也云毋我者四也此聖人行教功德成身退之跡也聖人晦跡功遂身退恆不自異故無我也亦由無意故能無我也或問曰孔子或拒孺悲或天生德於豫何得云無必無我乎答曰聖人作教應幾不可一凖今為其跡涉兹地為物所嫌恐心實如此故正明絶此四以見本地也注羣萃萃聚也子畏於匡注苞氏曰匡人誤圍夫子以為陽虎陽虎嘗暴於匡夫子弟子顔剋時又與虎俱往後剋為夫子御至於匡匡人相與共識剋又夫子容貌與虎相似故匡人以兵圍之曰文王既沒文不在兹乎注孔安國曰兹此也言文王雖已沒其文見在此此自此其身也天之將喪斯文也後死者不得與於斯文也注孔安國曰文王既沒故孔子自謂後死也言天將喪斯文者本不當使我知之今使我知之未欲喪也天之未喪斯文也匡人其如豫何注馬融曰如豫何者猶言奈我何也天之未喪此文也則我當傳之匡人欲奈我何言其不能違天而害己也疏子畏至豫何云子畏於匡者心服曰畏匡宋地名也于時匡人誤以兵圍孔子故孔子同物畏之孫綽云畏匡之說皆衆家之言而不釋畏名解書之理為漫夫體神知幾𤣥定安危者雖兵圍百重安若太山豈有畏哉雖然兵事阻險常情所畏聖人無心故即以物畏為畏也云曰文王既沒文不在兹乎者孔子得圍而自說己德欲使匡人知己兹此也孔子自此已也言昔文王聖德有文章以教化天下也文王今既沒則文章宜須人傳傳文章者非我而誰故云文王既沒文不在兹乎言此我當傳之也云天之將喪云云者既云傳文在我故更說我不可殺之意也斯文即文王之文章也後死孔子自謂也夫生必有死文王既沒已亦當終但文王既沒於前則已方死於後故自謂為後死也言天若將欲喪棄文王之文章則不應今使我已得預知識也云天之未喪云云者天今使我知之是未欲喪此文也既未欲喪此文使已傳之則匡人豈能違天而害我乎故云如豫何也衛瓘云若孔子自明非陽虎必謂之詐晏然而言若是匡人是知非陽虎而懼害賢所以免也江熙云言文王之道為後代之䡄已未得述上天之明必不使沒也注苞氏曰至圍之釋誤圍之由者也注此自此其身也身夫子身也大宰問於子貢曰夫子聖者與何其多能也注孔安國曰大宰大夫官名也或吳或宋未可分也疑孔子多能於小藝也子貢曰固天縱之將聖又多能也注孔安國曰言天固縱之大聖之德又使多能也子聞之曰大宰知我者乎吾少也賤故多能鄙事君子多乎哉不多也注苞氏曰我少小貧賤常自執事故多能為鄙人之事君子固不當多能也疏大宰至多也云大宰問云云者大宰聞孔子聖又聞孔子多能而其心疑聖人務大不應細碎多能故問子貢言孔子既聖其那復多能乎云子貢曰云云者子貢答云孔子大聖是天所固縱又使多能也固故也將大也云子聞云云者孔子聞大宰之疑而云知我則許疑我非聖是也繆協云我信多能故曰知我江熙曰大宰嫌多能非聖故云知我謙之意也云吾少也賤故多能鄙事者又說我非聖而所以多能之由也言我少小貧賤故多能為粗鄙之事也云君子多乎哉不多也者更云若聖人君子豈多能鄙事乎則不多能也繆協云君子從物應務道達則務簡務簡則不多能也江熙云言君子所存逺者大者不應多能欒肇云周禮百工之事皆聖人之作也明聖人兼材備藝過人也是以大宰見其多能固疑夫子之聖也子貢曰固天縱之將聖又多能故承以謙也且抑排務言不以多能為君子也謂君子不當多能也明兼材者自然多能多能者非所學所以先道德後伎藝耳非謂多能必不聖也據孔子聖人而多能斯伐柯之近鑒也注孔安國曰至分也云大宰大夫官名者鄉大夫職有冢宰或云大宰故云是大夫官也云或吳或宋未可分者既唯云大宰不論名氏故不知何人而吳有大宰嚭宋有大宰華督故云未可分也然此應是吳臣何以知之魯哀公七年公㑹吳于鄫吳人徵百牢使子貢辭於大宰嚭十二年公㑹吳師于槖臯吳子使大宰嚭請尋盟公不欲使子貢對將恐此時大宰嚭問子貢也且宋大宰督去孔子世逺或其至後世所不論耳牢曰子云吾不試故藝注鄭𤣥曰牢弟子子牢也試用也言孔子自云我不見用故多能伎藝也疏牢曰至故藝試用也子牢述孔子言緣我不被時用故得多學伎藝也繆協云此蓋所以多能之義也言我若見用將崇本息未歸純反素兼愛以忘仁遊藝以去藝豈唯不多能鄙事而已子曰吾有知乎哉無知也注知者知意之知也言知者言未必盡也今我誠盡也有鄙夫來問於我空空如也我叩其兩端而竭焉注孔安國曰有鄙夫來問於我其意空空然我則發事之終始兩端以語之竭盡所知不為有愛也疏子曰至竭焉云吾有知乎哉無知也者知謂有私意於其間之知也聖人體道為度無有用意之知故先問弟子云吾有知乎哉也又云無知也明已不有知知之意也即是無意也云有鄙夫來問於我空空如也者此舉無知而誠盡之事也鄙夫鄙劣之夫也空空無識也言有鄙夫來問我而心抱空虛如也云我叩其兩端而竭焉者兩端事之終始也言雖復鄙夫而心虛空來問於我我亦無隱不以用知處之故即為其發事終始竭盡我誠也即是無必也故李充云日月照臨不為愚智易光聖人善誘不為賢鄙異教雖復鄙夫寡識而率其疑誠咨疑於聖必示之以善惡之兩端已竭心以誨之也繆協云夫名由跡生故知從事顯無為寂然何知之有唯其無也故能無所不應雖鄙夫誠問必為盡其本末也注知者至盡也云知者知意之知者知意謂故用知為知也聖人忘知故無知知意也云言知者言未必盡者若用知者則用意有偏故其言未必盡也云今我誠盡者我以不知知故於言誠無不盡也子曰鳳鳥不至河不出圗吾已矣夫注孔安國曰有聖人受命則鳳鳥至河出圗今天無此瑞吾已矣夫者不得見也河圗八卦是也疏子曰至矣夫夫時人皆願孔子有人主之事故孔子釋已不得以塞之也言昔之聖人應王者必有鳳鳥河圗之瑞今天無此瑞故云吾已矣夫已止也言吾已止無此事也故繆協云夫聖人達命不復俟此乃知也方遺知任事故理至乃言所以言者將釋衆庶之望也又孫綽云孔子所以乃發此言者以體大聖之德弟子皆稟絶異之質壘落殊才英偉命世之才蓋王德光于上將相備乎下當世之君咸有忌難之心故稱此以徵已之不王以絶不達者之疑望也注孔安國曰至是也云有聖云云者麟鳳五靈王者之嘉瑞也云河出云云者聖人王則有龍馬及神龜負應王之圗書從河而出為瑞也如龍圗授伏犧龜書畀姒禹也云河圖八卦是也者八卦則易乾坤等八方之卦也龍負之出授伏犧也子見齊衰者冕衣裳者與瞽者注苞氏曰冕者冕冠也大夫之服也瞽者盲者也見之雖少者必作過之必趨注苞氏曰作起也趨疾行也此夫子哀有喪尊在位恤不成人也疏子見至必趨云子見齊衰者者此記孔子哀人有喪者也齊衰五服之第二者也言齊則斬從可知而大功不預也云冕衣裳者者記孔子尊敬在位者也冕衣裳者周禮大夫以上之服也大夫以上尊則士不在列也云與瞽者者記孔子愍不成人也瞽盲者也言與者盲者卑故加與字以别之也言瞽者則聾者不預也聾輕於盲也云見之雖少者必作者言孔子見此三種人雖復年少孔子改坐而見之必為之起也云過之必趨者趨疾行也又明孔子若行過此三種人必為之疾速不敢自修容也范寧云趨就之也注恤不成人也恤憂也顔淵喟然歎曰注喟然歎聲也仰之彌髙鑽之彌堅注言不可窮盡也瞻之在前忽焉在後注言忽恍不可為形象也夫子循循然善誘人注循循次序貌也誘進也言夫子正以此道勸進人有次序也博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也已注孔安國曰言夫子既以文章開博我又以禮節節約我使我欲罷而不能已竭我才矣其有所立則又卓然不可及言已雖蒙夫子之善誘猶不能及夫子之所立也疏顔淵至也已云顔淵喟然歎曰者孔子至聖顔生上賢賢聖道絶故顔致歎也云仰之彌高鑽之彌堅者此所歎之事也夫物雖高者若仰瞻則可覩也物雖堅者若鑽錐則可入也顔於孔子道愈瞻愈高彌鑽彌堅非己厝力之能得也故孫綽云夫有限之高雖嵩岱可陵有形之堅雖金石可鑽若乃彌高彌堅鑽仰所不逮故知絶域之高堅未可以力至也云瞻之在前忽焉在後者向明仰鑽上下之絶域此明四方之無窮也若四方而瞻復為遼逺故恍惚非已所定所以或前或後也又一通云愈瞻愈逺故云瞻之在前也愈顧愈後故云忽焉在後也故孫綽云馳而不及待而不至不行不動孰能測其所妙哉江熙云慕聖之道其殆庶幾是以欲齊其高而仰之愈邈思等其深而鑽鑒愈堅尚竝其前而俯仰塵絶此其所以喟然者也云夫子循循然善誘人者又歎聖道雖懸而令人企慕也循循次序也誘進也言孔子以聖道進勸人而有次序故曰善誘人云博我以文約我以禮者此說善誘之事也博廣也文文章也言孔子廣以文章誘引於我故云博我以文章也又以禮教約束我故云約我以禮也云欲罷不能者文博禮束故我雖欲罷止而不能止也云既竭吾才者既盡也才才力也我不能罷故盡竭我之才力學之也故孫綽云既以文章博我視聽又以禮節約我以中俯仰動止莫不景行才力已蠋猶不能已罷猶罷息也云妒有所立卓爾者此明絶地不可得言之處也卓高逺貌也言雖自竭才力以學博文約禮而孔子更有所言述創立則卓爾高絶也云雖欲從之末由也已者末無也言其好妙高已絶雖已欲從之而無由可及也故孫綽云常事皆循而行之若有所興立卓然士視聽之表猶天之不可階而升從之將何由也此顔孔所絶處也子疾病注苞氏曰疾甚曰病也子路使門人為臣注鄭𤣥曰孔子嘗為大夫故子路欲使弟子行其臣之禮也病閒曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎注孔安國曰病少差曰閒也言子路有是心非唯今日也且豫與其死於臣之手也無寧死於二三子之手乎注馬融曰無寧寧也二三子門人也就使我有臣而死其手我寧死弟子之手乎且豫縱不得大葬注孔安國曰君臣禮葬也豫死於道路乎注馬融曰就使我不得以君臣之禮葬有二三子在我寧當憂棄於道路乎疏子疾至路乎云子疾病者孔子疾甚也云子路使門人為臣者子路以孔子聖人宜為人君且嘗為大夫大夫亦有家臣今疾病恐忽終亡故使弟子行臣禮也故江熙云子路以聖人君道足宜有臣猶禱上下神祗也云病閒云云者孔子病少差也少差曰閒謂少差為閒者若病不差則病病相續無閒斷也若少差則病勢斷絶有閒隙也當孔子病困時不覺子路為立臣至於少差乃覺而歎子路行詐也言子路有此行詐之心非復一日故曰久矣也云無臣而為有臣者無臣而為有是所以行詐也云吾誰欺欺天乎者我賓無臣今汝詐立之持此詐欲欺誰乎天下人皆知我無臣則人不可欺今日立之此政是逺欲欺天故云欺天乎云且子與云云者又以理喻之言在三事同若以親察而言則臣不及弟子也豫我也二三子諸弟子也無寧寧也言設使與我死於臣手則我寧死弟子手也臣禮就養有方有方則隔弟子無方無方則親也云且豫縱云云者又明在三同也大葬臣禮葬君也君葬禮大故曰大葬也若縱不得君臣禮葬有二三子在我豈復被棄擲於道路乎言亦必得葬也注孔安國曰至日也夫立臣事大非卒可定汝今立之是知有其心已久故也子貢曰有美玉於斯韞櫝而藏諸求善賈而沽諸注馬融曰韞藏也櫝匱也藏諸櫝中也沽賣也得善賈寧賣之耶子曰沽之哉沽之哉我待賈者也注苞氏曰沽之哉不衒賣之辭也我居而待賈者也疏子貢曰至者也云子貢曰有美玉於斯者子貢欲觀孔子聖德藏用何如故託事以咨衰否也美玉譬孔子聖道也言孔子有聖道可重如世閒有美玉而在此也云韞櫝云云者諸之也韞囊之也櫝謂匣匱也善賈貴賈也沽賣也言孔子聖道如美玉在此為當韞匣而藏之為當得貴賈而賣之否乎假有人請求聖道為當與之否耶云子曰沽之哉者答云我不衒賣之者也故重云沽之哉明不衒賣之深也王弼曰重言沽之哉賣之不疑也故孔子乃聘諸侯以急行其道也云我待賈者也者又言我雖不衒賣然我亦待貴賈耳有求者則與之也子欲居九夷注馬融曰九夷東方之夷有九種也或曰陋如之何子曰君子居之何陋之有注馬融曰君子所居者皆化也疏子欲至之有云子欲居九夷者孔子聖道不行於中國故託欲東往居於九夷也亦如欲乘桴浮海也云或曰陋如之何者或人不達孔子意謂之實居故云陋如之何言夷狄鄙陋不可居也云子曰云云者孔子答云君子所居即化豈以鄙陋為疑乎不復逺申己意也孫綽云九夷所以為陋者以無禮義也君子所居者化則陋有泰也注馬融曰至種也四方東有九夷一𤣥菟二樂浪三高麗四滿飾五鳬更六索家七東屠八倭人九天鄙南有八蠻一天竺二咳首三僬僥四跂踵五穿胸六儋耳七狗軹八旁脊西有六戎一僥夷二依貊三織皮四耆羌五鼻息六天剛北有五狄一月支二􅐮貊三胸奴四單于五白屋也注馬融曰至化也聖人所在則化九夷變中夏也子曰吾自衛反於魯然後樂正雅頌各得其所注鄭𤣥曰反魯魯哀公十一年冬也是時道衰樂廢孔子來還乃正之也故曰雅頌各得其所也疏子曰至其所孔子去魯後而魯禮樂崩壞孔子以魯哀公十一年從衛還魯而删詩書定禮樂故樂音得正樂音得正所以雅頌之詩各得其本所也雅頌是詩義之美者美者既正則餘者正亦可知也子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉注馬融曰困亂也疏子曰至我哉云出則事公卿者公君也卿長也人子之禮移事父孝以事於君則忠移事兄悌以事於長則從也故出仕朝廷必事公卿也云入則事父兄者孝以事父悌以事兄還入閨門宜盡其禮先言朝廷後云閨門者勖已仕者也猶仕而優則學也云喪事不敢不勉者勉强也父兄天性續莫大馬公卿義合厚莫重焉若有喪事則不敢不勉强也云不為酒困者雖唯酒無量不及亂時多沈酗故戒之也衛瓘云三事為酒興也侃案如銜意言朝廷閨門及有喪者並不為酒所田故云三事為酒興也云何有於我哉者言我何能行比三事故云何有於我哉又一云人若能如此則何復須我故云何有於我哉也緣人不能故有我應世耳子在川上曰逝者如斯夫不舍晝夜注鄭𤣥曰逝往也言凡往者如川之流也疏子在至晝夜逝往去之辭也孔子在川水之上見川流迅邁未嘗停止故歎人年往去亦復如此向我非今我故云逝者如斯夫者也斯此也夫語助也日月不居有如流水故云不舍晝夜也江熙云言人非南山立德立功俯仰時過臨流興懷能不慨然聖人以百姓心為心也孫綽云川流不舍年逝不停時已晏矣而道猶不興所以憂歎也子曰吾未見好德如好色者也注疾時人薄於德而厚於色故以發此言也疏子曰至者也時人多好色而無好德孔子患之故云未見以厲之也云責其心也子曰譬如為山未成一簣止吾止也注苞氏曰簣土籠也此勸人進於道德也為山者其功雖已多未成一籠而中道止者我不以其前功多而善之也見其志不遂故不與也譬如平地雖覆一簣進吾往也注馬融曰平地者將進加功雖始覆一簣我不以其見功少而薄之也據其欲進而與之也疏子曰至往也云子曰云云者此戒人為善垂成而止者也蕢土籠也言人作善垂足而止則善事不成如為山垂足唯少一籠土而止則山不成此是建功不篤與不作無異則吾亦不以其前功多為善如為善不成吾亦不美其前功多也故云吾止也云譬如平地云云者此奬人始為善而不住者也譬於平地作山山乃須多土而始覆一籠一籠雖少交是其有欲進之心可嘉如人始為善善乃未多交求進之志可重吾不以其功少而不善之善之有勝於垂成而止者故云吾往也子曰語之而不惰者其回也與注顔淵則解故語之不惰餘人不解故有惰語之時也疏子曰至也與惰疲懈也餘人不能盡解故聞孔子語而有疲懈唯顔回體之故閒語即解所以云語之而不惰其回也與子謂顔淵曰惜乎吾見其進也未見其止也注馬融曰孔子謂顔淵進益未止痛惜之甚也疏子謂至止也顔淵死後孔子有此歎也云見進未見止惜其神識猶不長也然顔淵分已滿至於屢空而此云未見其止者勸引之言也故殷仲堪云夫賢之所假一語而盡豈有彌進勖實乎蓋其䡄物之行日見於跡夫子從而咨嗟以盛德之業也子曰苖而不秀者有矣夫秀而不實者有矣夫注孔安國曰言萬物有生而不育成者喻人亦然也疏子曰至矣夫又為歎顔淵為譬也萬物草木有苖稼蔚茂不經秀穗遭風霜而死者又亦有雖能秀穗而值沴焊氣不能有粒實者故並云有矣夫也物既有然故人亦如此所以顔淵摧芳蘭於早年矣子曰後生可畏也焉知來者之不如今也注後生謂年少也四十五十而無聞焉斯亦不足畏也已矣疏子曰至已矣云後生可畏者後生謂年少在已後生者也可畏謂有才學可心服者也云焉知云云者馬安也來者未來事也今謂我今師徒也後生既可畏亦安知未來之人師徒教化不如我之今日乎言不可誣也云四十云云者又言後生雖可畏若年四十五十而無聲譽聞達於世者則此人亦不足可畏也孫綽云年在知命蔑然無聞不足畏也子曰法語之言能無從乎改之為貴注孔安國曰人有過以正道告之口無所不順從之能必自改乃為貴也巽與之言能無悅乎繹之為貴注馬融曰巽恭也謂恭巽謹敬之言也聞之無不悅者也能尋繹行之乃為貴也悅而不繹從而不改吾末如之何也己矣疏子曰至已矣云子曰云云者言彼人有過失若我以法則語之彼人聞法當時無不口從而云止當不敢復為者也故云能無從乎但若口雖從而身為失不止者則此口從不足為貴也我所貴者在於口從而行亦改者耳故云改之為貴也云巽與云云者巽恭遜也繹尋續也言有彼人不遜而我謙遜與彼恭言故云巽與之言也彼不遜者得我遜言遜彼彼必亦特遜為悅故云能無悅乎然雖悅人遜己而已不能尋續行此遜事是雖悅不足為貴也我所貴者在尋續行遜耳故云繹之為貴也云悅而云云者不繹不改聖所不教故孔子云末如之何也末無也孫綽云疾夫形服心不化也子曰主忠信無友不如己者過則勿憚改注慎其所主所友有過務改皆所以為益者也疏子曰至憚改此事再出也所以然者范寧云聖人應於物作教一事時或再言弟子重師之訓故又書而存焉子曰三軍可奪帥也匹夫不可奪志也注孔安國曰三軍雖衆人心非一則其將帥可奪之而取匹夫雖微苟守其志不可得而奪也疏子曰至志也此明人能守志雖獨夫亦不可奪若其心不堅雖衆必傾故三軍可奪匹夫無回也謂為匹夫者言其賤但夫婦相配匹而已也又云古人質衣服短狹二人衣裳唯其用一匹故曰匹夫匹婦也子曰衣弊緼袍與衣狐貉者立而不恥者其由也與注孔安國曰緼枲著也不忮不求何用不臧注馬融曰忮害也臧善也言不忮害不貪求何用為不善疾貪惡忮害之詩也子路終身誦之子曰是道也何足以臧注馬融曰臧善也尚復有美於是者何足以為善也疏子曰至以臧云子曰云云者衣猶著也弊敗也縕枲著也狐貉輕裘也由子路也當時人尚奢華皆以惡衣為恥唯子路能果敢率素雖服敗麻枲著袍裘與服狐貉輕裘者並立而不為羞恥故云其由也與顔延之云狐貉緼袍誠不足以䇿恥然自非勇於見義者或以心戰不能素泰也云不忮云云者孔子更引疾貪惡忮詩證子路德美也忮害也求貪也臧善也言子路之為人身不害物不貪求德行如此何用不謂之為善乎言其善也云子路終身誦之者子路得孔子美已才以為美故終身長誦不忮不求何用不臧之言也云子曰云云者孔子見子路誦之不止故抑之也言此不忮不求乃可是道亦何足遇為善而汝誦之不止乎言尚復有勝於此者也顔延之云懼其伐善也注孔安國曰緼枲著也枲麻也以碎麻著裘也碎麻曰緼故絮亦曰緼玉藻曰縕為袍是也子曰嵗寒然後知松柏之後凋也注大寒之嵗衆木皆死然後知松柏之小凋傷平嵗則衆木亦有不死者故須嵗寒而後别之喻凡人處治世亦能自修整與君子同在濁世然後知君子之正不苟容也疏子曰至凋也此欲明君子德性與小人異也故以松柏匹於君子衆木偶乎小人矣言君子小人若同居聖世君子性本自善小人服從教化是君子小人竝不為惡故堯舜之民比屋可封如松柏與衆木同處春夏松柏有心故本蓊鬱衆木從時亦盡其茂美者也若至無道之主君子秉性無回故不為惡而小人無復忌憚即隨世變改桀紂之民比屋可誅譬如松柏衆木同在秋冬松柏不改柯易葉衆木枯零先盡而此云嵗寒然後知松柏後凋者就如平叔之注意若如平嵗之寒衆木猶有不死不足致别如平世之小人亦有修飾而不變者唯大寒嵗則衆木皆死大亂則小人悉惡故云嵗寒也又云然後知松柏後凋者後非俱時之日凋非枯死之名言大寒之後松柏形小凋衰而心性猶存如君子之人遭值積惡外逼暗世不得不遜跡隨時是小凋矣而性猶不變如松柏也而琳公曰夫嵗寒别木遭困别士寒嚴霜降知松柏之後凋謂異凡木也遭亂世小人自變君子不改其操也子曰智者不惑注苞氏曰不惑亂也仁者不憂注孔安國曰不憂患也勇者不懼疏子曰至不懼此章談人性分不同也云智者不惑者智以照了為用故於事無疑惑憂患也仁人常救濟為務不嘗侵物故不憂物之見侵患也孫綽云安於仁不改其樂故無憂也云勇者不懼者男以多力為用故無怯懼於前敵也繆協云見義而為不畏强禦故不懼也注孔安國曰不憂患也內省不疾故無憂患也子曰可與共學未可與適道注適之也雖學或得異端未必能之道者也可與適道未可與立注雖能之道未必能以有所成立者也可與立未可與權注雖能有所立未必能權量其輕重之極也唐棣之華偏其反而豈不爾思室是逺而注逸詩也唐棣栘也華反而後合賦此詩以言權道反而後至於大順也思其人而不得見者其室逺也以言思權而不得見者其道逺也子曰未之思也夫何逺之有哉注夫思者當思其反反是不思所以為逺也能思其反何逺之有言權可知唯不知思耳思之有次序斯可知矣疏子曰至有哉此章明權道之難也云可與共學未可與適道者夫正道易行權事難達既欲明權故先從正起也道謂所學之道也言凡人乃可與同處師門共學而已既未得彼性則未可便與為友共適所志之道也云可與適道未可與立者立謂謀議之立事也亦人性各異或能學問而未必能建立世中正事者故可與共適所學之道而未便可與共立事也云可與立未可與權者權者反常而合於道者也自非通變逹理則所不能故雖可共立於正事而未可便與之為權也故王弼曰權者道之變變無常體神而明之存乎其人不可豫設尤至難者也張憑云此言學者漸進階級之次耳始志於學求發其蒙而未審所適也既向方矣而信道未篤則所立未固也又既固又未達變通之權也明知反而合道者則日勸之業亹亹之功其幾乎此矣云唐棣之華偏其反而者引明權之逸詩以證權也唐棣棣樹也華花也夫樹木之花皆先合而後開唐棣之花則先開而後合譬如正道則行之有次而權之為用先反後至於大順故云偏其反而言偏者明唯其道偏與常反也云豈不爾思室是逺而者言凡思其人而不得見者其居室遼逺故也人豈不思權權道𤣥邈如其室奧逺故也云子曰云云者又引孔子言證權可思也言權道易思但未有思之者耳若反道而思之則必可得故云大何逺之有也注適之至者也異端非正典也人各自有性彼或不能寧學正道而唯能讀史子故未可使與之共之於正道也注雖有至極也能權量輕重即是曉權也注逸詩至逺也如前釋也云權道反而後至於大順者初逆而後從也論語鄉黨第十疏鄉黨者明孔子教訓在於鄉黨之時也所以次前者既朝廷感希故退還應於鄉黨也故鄉黨次於子罕也孔子於鄉黨恂恂如也似不能言者注王肅曰恂恂溫恭貌也其在宗廟朝廷便便言唯謹爾注鄭𤣥曰便便言辨貌雖辨而謹敬也朝與下大夫言侃侃如也注孔安國曰侃侃和樂貌也與上大夫言誾誾如也注孔安國曰誾誾中正貌也君在踧踖如也與與如也注馬融曰君在者君視朝也踧踖恭敬貌也與與威儀中適之貌也疏孔子至與如也此一篇至末並記孔子平生德行也云孔子云云者於鄉黨謂孔子還家教化於鄉黨中時也天子郊內有鄉黨郊外有遂鄙孔子居魯魯是諸侯今云鄉黨當知諸侯亦郊內為鄉郊外為遂也孔子家當在魯郊內故云於鄉黨也恂恂溫恭貌既還鄉黨鄉黨宜須和恭以相接故恂恂如也既其溫恭則言語寡少故一往觀之如似不能言者也云其在云云者謂孔子助君祭在宗廟及朝延也既在君朝應順酬答及入大廟每事須問竝不得不言也言須流故云便便言也言雖流而必謹敬故云唯謹爾云朝與下大夫言侃侃如者侃侃和樂貌也下大夫賤孔子與之言宜用和樂相接故侃侃如也云與上大夫言誾誾如者上大夫卿也誾誾中正貌也卿貴不敢和樂接之宜以謹正相對故誾誾如也云君在云云者君在謂君出視朝時也踧踖恭敬貌也禮每日旦諸臣列在路門外以朝君君至日出而出視之視之則一一揖卿大夫而都一揖士當此君視朝之時則臣皆起恭敬之貌故孔子踧踖如也雖須踧踖又不得急速所以形容舉動每須與與如也與與猶徐徐也所以恭而安也君召使擯注鄭𤣥曰君召使擯者有賓客使迎之也色勃如也注孔安國曰必變色也足躩如也注苞氏曰盤辟貌也揖所與立左右其手衣前後襜如也注鄭𤣥曰揖左人左其手揖右人右其手一俯一仰故衣前後則襜如也趨進翼如也注孔安國曰言端正也賓退必復命曰賓不顧矣注孔安國曰復命白賓已去也疏君召至顧矣云君召使擯者擯者為君接賓也謂有賓來君召已迎接之也云色勃如者既召已接賓故已宜變色起敬故勃然也云足躩如者躩盤辟貌也既被召不敢自容故速行而足盤辟也故江熙云不暇間步躩速貌也云揖所與立云云者此謂君出迎賓已為君副列擯時也賓副曰命介主人副曰擯副且作匹敵國而言若公詣公法也賓至主人大門外西邊而向北去門九十步而下車面向北而倚賓則九副在賓北而東向邐迤而西北在四十五步之中主人出門東邊南向而倚主人是公則五擯主人是侯伯則四擯主人是子男則三擯不隨命數主人謙故竝用强半數也公陳擯在公之南而西向邐迤而東南亦在四十五步中使主人下擯與賓下介相對而中間相去三丈六尺列賓主介擯既竟主人語上擯使就賓請辭問所以來之意於是上擯相傳以至於下擯下擯進前揖賓之下介而傳語問之下介傳問而以次上至賓賓答語使上介傳以次而下至下介下介亦進揖下擯下擯傳而上以至主人凡相傳雖在列位當授受言語之時皆半轉身戾手相揖既竝立而相揖故曰揖所與立也若揖左人則移其手向左若揖右人則移其手向右故云左右其手既半回身左右回手當使身上所著之衣必襜襜如有容儀也故江熙云揖兩手衣裳襜如動也云趨進翼如者謂擯迎賓進在庭行時也翼如謂端正也徐趨衣裳端正如鳥欲翔舒翼時也云賓退云云者謂君使已送賓時也復命反命也反命謂初受君命以送賓賓退故反還君命以白君道賓已去云不顧者舊云主人若禮送賓未足則賓猶回顧若禮已足送則賔直去不復迥顧此明則送賓禮足故云不顧也注鄭𤣥曰至之也聘禮云卿為上擯大夫為承擯士為紹擯是也注苞氏曰盤辟貌盤辟即足轉速也注孔安國曰復命白賓已去也言反白君道賓已去也然云賓已去亦是不復來見顧也入公門鞠躬如也如不容注孔安國曰斂身也立不中門行不履閾注孔安國曰閾門限也過位色勃如也足躩如也注苞氏曰過君之空位也其言似不足者攝齊升堂鞠躬如也屏氣似不息者注孔安國曰皆重慎也衣下曰齊攝齊者摳衣也出降一等逞顔色怡怡如也注孔安國曰先屏氣下階舒氣故怡怡如也沒階趨進翼如也注孔安國曰沒盡也下盡階也復其位踧踖如也孔安國曰來時所過位也疏入公門至踖如也云入公云云者公君也謂孔子入君門時也鞠曲斂也躬身也臣入君門自曲斂身也君門雖大而已恆曲斂如君門之狹不見容為云立不中門者謂在君門倚立時也中門謂棖闑之中也門中央有闑闑以硋門兩扇之交處也門左右兩橽邊各豎一木名之為棖棖以禦車過恐觸門也闑東是君行之道關西是賓行之道也而臣行君道示係屬於君也臣若倚門立時則不得當君所行棖闑之中央當中是不敬故云不中門也云行不履閾者履踐也閾限也若出入時則不得踐君之門限也所以然者其義有二一則忽上升限似自高矜二則人行跨限已若履之則汚限汚限則汚跨者之衣也云過位云云者謂臣入朝君時也位君常所在外之位也謂在寧屏之間揖賓之處也即君雖不在此位此位可尊故臣行入從位之邊過而色勃然足躩為敬也云其言似不足者者既入過位漸以近君故言語細下不得多言如言不足之狀也不足少若不能也云攝齊云云者至君堂也攝摳也齊裳下縫也既至君堂當升之未升之前而摳提裳前使齊下去地一尺故云攝齊升堂也升堂將近君故又自斂鞠躬如也必攝齊者為妨履輟行故也云屏氣似不息者者屏疊除貌息亦氣也已至君前當疊除藏其氣如似無氣息者也不得炮掁君也云出降云云者降下也逞申也出降一等謂見君已竟而下堂至階第一級時也初對君時既屏氣故出降一等而申氣氣申則顔色亦申故顔容怡悅也云沒階趨進翼如者沒猶盡也盡階謂下諸級盡至平地時也既去君逺故又徐趨而翼如也云復其位踧踖如者位謂初入時所過君之空位也今出至此位而更踧踖為敬也注攝齊者摳衣也曲禮云兩手摳衣去齊尺是也執圭鞠躬如也如不勝注苞氏曰為君使以聘問鄰國執持君之圭鞠躬者敬慎之至也上如揖下如授勃如戰色足蹜蹜如有循注鄭𤣥曰上如揖授玉宜敬也下如授不敢忘禮也戰色敬也足蹜蹜如有循舉前曳踵行也享禮有容色注鄭𤣥曰享獻也聘禮既聘而享享用圭璧有庭實也私覿愈愈如也注鄭𤣥曰覿見也既享乃以私禮見愈愈顔色和也疏執圭至愈如也云執圭云云者謂為君出使聘問鄰國時也圭瑞玉也周禮五等諸侯各受王者之玉以為瑞信公桓圭九寸侯信圭七寸伯躬圭七寸子榖璧五寸男蒲璧五寸五等若自執朝王則各如其寸數若使其臣出聘鄰國乃各執其君之玉而減其君一寸也今云執圭魯是侯侯執信圭則孔子所執執君之信圭也初在國及至他國執圭皆為敬慎圭雖輕而已執之恆如圭重似已不能勝故曲身如不勝也云上如揖者謂初授受圭之容儀也上如揖謂就下取玉上授與人時也俯身為敬故如揖時也云下如授者謂奠玉置地時也雖真置地亦徐徐俯僂如授與人時也云勃如戰色者通謂執行及授時之顔色也臨陳戰鬭則色必懼怖故今重君之玉使己顔色恆如戰時也云足蹜蹜如有循者謂舉玉行時之容也蹜蹜猶蹴蹴也循猶緣循也言舉玉行時不敢廣步速進恆如足前有所蹴有所緣循也云享禮有容色者享者聘後之禮也夫諸侯朝天子及五等更相朝聘禮初至皆先單執玉行禮禮王謂之為朝使臣禮主國之君謂之為聘䀻問也政言久不相見使臣來問於安否也既是初至其禮質敬故無他物唯有瑞玉表至誠而已行朝聘既竟次行享禮享者獻物也亦各有玉玉不與聘玉同也又皆有物將之或用皮馬或用錦繡又獻土地所生羅列滿庭謂之庭實其中差異不復曲論但既是次後行禮以多為貴則質敬之事猶稍輕故有容貌采章及禓以行事故云有容色也云私覿愈愈如也者私非公也覿見也愈愈顔色和也謂行聘享公禮已竟别日使臣私齎已物以見於主君故謂為私覿也既私見非公故容儀轉以自若故顔色容貌有和悅之色無復勃戰之容者也注足蹜至行也解蹜蹜有循之事也舉足前恆使不至地而踵或不離地如車輪也注鄭𤣥曰至實也亦有圭璧所執不同聘時也注鄭𤣥曰至禮見私禮謂束帛乘馬之屬也君子不以紺緅飾注孔安國曰一入曰緅飾者不以為領袖緣也紺者齊服盛色以為飾似衣齊服也緅者三年練以緅飾衣為其似衣喪服故皆不以飾衣也紅紫不以為䙝服注王肅曰䙝服私居非公㑹之服者也皆不正䙝尚不衣正服無所施當暑縝絺綌必表而出注孔安國曰暑則單服絺綌葛也必表而出加上衣也緇衣羔裘素衣麑裘黃衣狐裘注孔安國曰服皆中外之色相稱也䙝裘長短右袂注孔安國曰私家裘長主溫也短右袂便作事也必有寢衣長一身有半注孔安國曰今被也狐貉之厚以居注鄭𤣥曰在家以接賓客也去喪無所不佩注孔安國曰去除也非喪則備佩所宜佩也非帷裳必殺之注王肅曰衣必有殺縫唯帷裳無殺也羔裘𤣥冠不以弔注孔安國曰喪主素吉主𤣥吉凶異服故不相弔也吉月必朝服而朝注孔安國曰吉月月朔也朝服皮辨服也齊必有明衣布注孔安國曰以布為沐浴衣也疏君子至衣布云君子不以紺緅飾者君子者自士以工士以上衣服有法不可雜色也紺緅者孔意言紺是𤣥色也緅是淺絳色也飾者衣之領袖緣也所以不用紺緅為衣領袖緣者𤣥是齊服若用紺為衣飾是似衣齊服故不用也又三年之喪練而受淺絳為緣也若用緅為衣飾是似衣喪服故不敢用也故云君子不以紺緅飾也云紅紫不以為䙝服者紅紫非正色也䙝服私䙝之服非正衣也䙝尚不衣則正服故宜不用也所以言此者為時多重紅紫棄正色故孔子不衣之也故後卷云惡紫之奪朱也鄭𤣥注云紺緅紫𤣥之類也紅纁之類也𤣥纁所以為祭服等其類也紺緅木染不可為衣飾紅紫草染不可為䙝服而已飾謂純緣也侃案五方正色青赤白黑黃五方閒色緑為青之間紅為赤之間碧為白之間紫為黑之閒緇為黃之閒也故不用紅紫言是閒色也所以為閒者穎子嚴云東方木木色青木剋於土土色黃以青加黃故為緑緑為東方之間也又南方火火色赤火剋金金色白以赤加白故為紅紅為南方閒也又西方金金色白金剋木木色青以白加青故為碧碧為西方閒也又北方水水色黑水剋火火色赤以黑加赤故為紫紫為北方閒也又中央土土色黃土剋水水色黑以黃加黑故為緇黃緇黃為中央閒也緇黃黃黑之色也又一注云東甲乙木南丙丁火中央戊己土西庚辛金北壬癸水以木剋土戊以妹己嫁於木甲是黃入於青故為緑也又火剋金庚以妹辛嫁於丙是白入於赤故為紅也又金剋木甲以妹乙嫁於庚是青入於白故為碧也又水剋火丙以妹丁嫁於壬是赤入於黑故為紫也又土剋水壬以妹癸嫁於戊是黑入黃故為緇黃者也云當暑云云者暑熱也縝單也絺細練葛也綌大練葛也表謂加上衣也古人冬則衣裘夏則衣葛也若在家則裘葛之上亦無别加衣若出行接賓皆加上衣當暑雖熱絺綌可單若出不可單則必加工衣也故云必表而出也然裘上出亦必加衣而獨云當暑絺綌者嫌暑熱不加故特明之也然又衣裏之裘必隨上衣之色使衣裘相稱則葛之為衣亦未必隨上服色也云緇衣羔裘者裘色既隨衣故此仍明裘上之衣也緇染黑七入者也𤣥則六入色也羔者烏羊也裘與上衣相稱則緇衣之內故曰羔裘也緇衣服者𤣥冠十五升緇布衣素積裳也素積者用素為之襞積攝之無數故云素積也此是諸侯日視朝服也諸侯視朝與羣臣同服孔子是魯臣故亦服此服以日朝君也云素衣麑裘者素衣謂衣裳竝用素也麑鹿子也鹿子色近白與素微相稱也謂國有凶荒君素服則羣臣從之故孔子魯臣亦服之也喪服則大鹿為裘也故檀弓云鹿裘橫長祛是也此凶荒之服既輕故裘用鹿子鹿子文勝於大鹿也或云大蠟祭百物之神皮辨素服也故鄭𤣥注郊特牲云皮辨素服而祭以送終也注云素服衣裳皆素也云黃衣狐裘者此服謂蠟祭宗廟五祀也嵗終大蠟報功象物色黃落故著黃衣黃冠也而狐貉亦黃故特為裘以相稱也孔子為臣助蠟祭亦隨君著之黃衣也故禮速云昔者仲尼預於蠟賓是也鄭𤣥注郊特牲云黃衣黃冠而祭注云祭謂既蠟臘先祖五祀也又云論語云黃衣狐裘案鄭以論語黃衣即是郊特牲蠟臘祭廟服也云褻裘長短右袂者褻裘謂家中常著之裘也上無加衣故不云衣也家居主溫暖故長為衣也而右臂是有事之用故短為右袂使作事便也袂謂衣袂屬身者也若手間屬袂者則名祛亦曰袖也云必有寢衣長一身有半者寢衣謂被也宜長故長一身有半也云狐貉之厚以居者此謂在家接賓客之裘也家居主溫故厚為之也既接賓客則其上亦應有衣也云去喪無所不佩者去喪謂三年喪畢喪服已除也無所不佩謂佩已今吉所宜得佩者悉佩之也嫌既經喪親恐除服後猶宜有異故特明之者也云非帷裳必殺之者帷裳謂帷幔之屬也殺謂縫之也若非帷幔裳則必縫殺之以殺縫之面置裏不殺之面在外而帷裳但刺連之如今服帊不有裏外殺縫之異也所以然者帷幔內外竝為人所見必須飾故刺連之而已也所以喪服云凡裳內削幅裳外不削幅鄭注云削猶殺也而鄭注此云帷裳謂朝祭之服其制正幅如帷也非者謂餘衣也殺之者削其幅使縫齊陪腰者也云羔裘𤣥冠不以弔者弔弔喪也喪凶主素故羔𤣥不用弔也云吉月必朝服而朝者吉月者月朔也朝服者凡言朝服唯是𤣥冠緇布衣素積裳今此云朝服謂皮辨十五升白布衣素積裳也所以亦謂為朝服者天子用之以日視朝今云朝服是從天子受名也諸侯用之以視朝孔子魯臣亦得與君同服故月朔必服之也然魯自文公不視朔故子貢欲去告朔之餼羊而孔子是哀公之臣應無隨君視朝之事而云必服之者當是君雖不視朔而孔子月朔必服而以朝是我愛其禮也云齊必有明衣布者謂齊浴時所著之衣也浴竟身未燥未堪著好衣又不可露肉故用布為衣如衫而長身也著之以待身燥故玉藻云君衣布晞身是也注孔安國曰至飾衣也然案孔以紺為齊服盛色或可言紺深於𤣥為似齊服故不用也而禮家三年練以縓為深衣領緣不云用緅且檢考工記三入為纁五入為緅七入為緇則緅非復淺絳明矣故解者相承皆云孔此注誤也注鄭𤣥曰至客也然前褻裘亦應是狐貉之厚也注孔安國曰至佩也備佩所宜佩若為大夫而𤣥冕公侯衮鷩之屬及佩玉佩之飾也注孔安國曰至服也皮辨以鹿皮為辨辨形如今祭酒道士扶容冠而無邊葉也身著十五升白布衣素積裳而頭著皮辨也天子皮辨服內則著素錦衣狐白裘諸侯皮辨服內著狐黃裘黃錦衣也卿大夫不得衣錦而皮辨服內當著麛裘青犴裒絞衣以禓之者也注孔安國曰以布為沐浴衣然浴時乃用布便乎待肉燥江長云沐者當是沐浴時亦衣此服置衣上以辟身溼也齊必變食注孔安國曰改常食也居必遷坐注孔安國曰易常處也食不厭精膾不厭細食饐而餲注孔安國曰饐餲臰味變也魚餒而肉敗不食注孔安國曰魚敗曰餒也色惡不食臰惡不食失飪不食注孔安國曰失飪失生熟之節也不時不食注鄭𤣥曰不時非朝夕日中時也割不正不食不得其醬不食注馬融曰魚膾非芥醬不食肉雖多不使勝食氣唯酒無量不及亂沽酒市脯不食不撤薑食注孔安國曰撤去也齊禁薰物薑辛而不薰故不去也不多食注孔安國曰不過飽也祭於公不宿肉注周生烈曰助祭於君所得牲體歸則以班賜不留神惠也祭肉不出三日出三日不食之矣注鄭𤣥曰自其家祭肉也過三日不食是褻鬼神之餘也食不語寢不言雖蔬食菜羮苽祭必齊如也注孔安國曰齊嚴敬貌也三物雖薄祭之必敬也疏齊必至如也云齊必變食者方應接神欲自潔淨故變其常食也云居必遷坐者亦不坐恆居之坐也故於祭前先散齊於路寢門外七日又致齊於路寢中三日也故范寧云齊以敬潔為主以期神明之享故改常之食遷居齊室也云食不厭精者此兼明平常禮也食若粗則誤人生疾故調和不厭精潔也云膾不厭細者細切魚及肉皆曰膾也既腥食之故不厭細者也云食饐而餲者饐謂飲食經久而腐臰也餲謂經久而味惡也如乾魚乾肉久而味惡也爾雅云食饐謂之餲李充注云皆飲食壞敗之名也云魚餒者餒謂魚臰壞也魚敗而餒餒然也云而肉敗者肉臰壞也爾雅云肉謂之敗魚謂之餒李巡云肉敗久則臰魚餒肉爛云不食者自食饐而餲以下並不可食也云色惡不食者食失常色是為色惡色惡則不可食也云臰惡不食者臰惡謂饌臰不宜食故不食也云失飪不食者失飪謂失生熟節也煮食或未熟或已過熟竝不食也云不時不食者不時非朝夕日中時也非其時則不宜食故不食也江熙云不時謂生非其時若冬梅李實也云割不正不食者古人割肉必方正若不方正割之故不食也江熙云殺不以道為不正也云不得其醬不食者食味各有所宜嬴醢菰食魚膾芥醬竝相宜也故若食不得所宜之醬則不食也云肉雖多不使勝食氣者勝猶多也食謂他饌也食氣多肉少則肉美若肉多他食少則肉不美故不使肉勝食氣也亦因殺止多殺也云唯酒無量不及亂者酒雖多無有限量而人宜隨已能而飲不得及至於醉亂也一云不格人為量而隨人所能而莫亂也云沽酒市脯不食者酒不自作則未必清淨脯不自作則不知何物之肉故沽市所得並所不食也或問曰沽酒不飲則詩那云無酒沽我乎答曰論所明是祭神不用詩所明是人得用也云不撤薑食者撤除也齊禁薰物薑辛而不薰嫌亦禁之故明食時不除薑者也云不多食者多則傷亷故不多也江熙云少所啖也云祭於公不宿肉者祭於公謂孔子仕時助君祭也助祭必得賜爼得賜爼還即分賦食之不得留置經宿是慢鬼神餘也云祭肉云云者謂家自祭也自祭肉多故許經宿但不得出三日出三日是褻慢鬼神之餘故人亦不得後食之也云食不語寢不言者言是宜出已語是答述也食須加益故許言而不許語語則口可惜亦不敬也寢足眠卧眠卧須靜若言則驚閙於人故不言也云雖蔬云云者蔬食粗食也菜羹苽祭謂用粗食菜羮及苽持此三物供祭也三物雖薄而必𡨕盡齊敬之理鬼神饗德不饗味故也注孔安國曰饐餲臰味變也饐臰變也餲味變也注馬融曰魚膾非芥醬不食古者醬齊葅三者通名也芥醬即芥齊也注周生烈曰至惠也牲體謂隨臣貴賤以牲骨體為爼賜之祭統云貴者得貴骨賤者得賤骨是也席不正不坐鄉人飲酒杖者出斯出矣注孔安國曰杖者老人也鄉人飲酒之禮主於老者老者禮畢出孔子從而後出也疏席不至出矣云席不正不坐者舊說云鋪之不周正則不坐之也故范寧云正席所以恭敬也或云如禮所言諸侯之席三重大夫再重是各有其正者也云鄉人云云者鄉人飲酒謂鄉飲酒之禮也杖者老人也禮五十杖於家六十杖於鄉故呼老人為杖者也鄉人飲酒者貴齡崇年故出入以老人者為節也若飲酒禮畢杖者先出則同飲之人乃從之而出故云杖者出斯出矣鄉人儺朝服而立於阼階注孔安國曰儺驅逐疫鬼也恐驚先祖故朝服立廟之阼階也疏鄉人至阼階云鄉人儺者儺者逐疫鬼也為隂陽之氣不即時退疫鬼隨而為人作禍故天子使方相氏黃金四目䝉熊皮執戈楊楯𤣥衣朱裳口作儺儺之聲以驅疫鬼也一年三過為之三月八月十二月也故月令季春云命國儺鄭𤣥云此儺儺隂氣也隂寒至此不止害將及人屬鬼隨之而出行至仲秋又云天子乃儺鄭𤣥云此儺儺陽氣也陽暑至此不衰害亦將及人厲鬼亦隨之而出行至季冬又云命有司大儺鄭云此儺儺隂氣也厲鬼將隨强隂出害人也侃案三儺二是儺隂一是儺陽隂陽乃異俱是天子所命春是一年之始彌畏災害故命國民家家悉儺八月儺陽陽是君法臣氏不可儺君故稱天子乃儺也十二月儺雖是隂既非一年之急故民亦不得同儺也今云鄉人儺是三月也云朝服而立於阼階者阼階東階主人之階也孔子聞鄉人逐鬼恐見驚動宗廟故著朝服而立於阼階以侍先祖為孝之心也朝服者𤣥冠緇布衣素積裳是卿大夫之祭服也禮唯孤卿爵辨自祭若卿大夫以下悉𤣥冠以自齊祭齊祭不異冠服也問人於他邦再拜而送之注孔安國曰拜送使者敬之也疏問人至送之問者謂更相聘問也他邦謂鄰國之君也謂孔子與鄰國交遊而遣使往彼聘問時也既敬彼君故遣使使者去則再拜送之也為人臣禮乃無外交而孔子聖人應聘東西無疑也康子饋藥拜而受之注苞氏曰遺孔子藥也曰丘未達不敢嘗注孔安國曰未知其故故不嘗禮也疏康子至敢嘗云康子饋藥拜而受之者饋餉也魯季康子餉孔子藥也孔子得彼餉而拜受是禮也云曰丘未達不敢嘗者達猶曉解也孔子雖拜受而不遂飲故稱名云丘未曉比藥治何疾故不敢飲嘗之也廄焚子退朝曰傷人乎不問馬注鄭𤣥曰重人賤畜也云子退朝者自魯之朝來歸也疏廏焚至問馬云廏焚者廏養馬之處也焚燒也孔子早上朝朝竟而退還家也少儀云朝廷曰退也云曰傷人乎不問馬者從朝還退見廏遭火廄是養馬處而孔子不問傷馬唯問傷人乎是重人賤馬故云不問馬也王弼曰孔子時為魯司冠自公朝退而之火所不問馬者矯時重馬者也君賜食必正席先嘗之注孔安國曰敬君惠也既嘗之乃以班賜也君賜腥必熟而薦之注孔安國曰薦薦其先祖也君賜生必畜之侍食於君君祭先飯注鄭𤣥曰於君祭則先飯矣若為先嘗食然也疏君賜至先飯云君賜食云云者席猶坐也君賜孔子食孔子雖不嗜食必正坐先嘗之敬君之惠也云君賜腥云云者謂君賜孔子腥肉也薦薦宗廟也孔子受之煮熟而薦宗廟重榮君賜也賜熟食不薦者熟為褻也云君賜生必畜之者生謂活物也得所賜活物當養畜之待至祭祀時充牲用也云侍食於君者謂孔子侍君共食之時也云君祭先飯者祭謂祭食之先也夫禮食必先取食種種出片子置爼豆邊地名為祭祭者報昔初造此食者也君子得惠不忘報故將食而先出報也當君政祭食之時而臣先取飯食之故云先飯飯食也所以然者示為君先嘗食先知調和之是非者也疾君視之東首加朝服拖紳注苞氏曰夫子疾也處南牖之下東首加其朝服拖紳紳大帶也不敢不衣朝服見君也疏疾君至拖紳云疾君視之者疾謂孔子疾病時也孔子病而魯君來視之也此君是哀公也云東首者病者欲生東是生陽之氣故眠頭首東也故玉藻云君子之居恆當于戶寢恆東首者是也云加朝服拖紳者加覆也朝服謂健時從君日視朝之服也拖猶牽也紳大帶也孔子既病不能復著衣而見君不宜私服故加朝服覆於體上而牽引大帶於心下至是如健時著衣之為注苞氏曰夫子疾也處南牑之下病本當户在北壁下東首君既來而君不宜北面故移處南窗之下令君入戶而西轉面得南向也故樂肇云南牖下欲令南面視之者也君命召不俟駕行矣注鄭𤣥曰急趨君命也出行而車既駕隨之疏君命召不俟駕行矣謂君有命召見孔子時也君尊命重故得召不俟駕車而即徒趨而往也故玉藻云君命召以三節一節以趨二節以走在宫不俟屨在家不俟車是也注鄭𤣥曰至隨之大夫不可徒行故後人駕車而隨之使乘之也入大廟每事問注鄭𤣥曰為君助祭也大廟周公廟也疏入大廟每事問或云此句煩重舊通云前是記孔子對或人之時此是録平生常行之事故兩出也朋友死無所歸曰於我殯注孔安國曰重朋友之恩也無所歸無親昵也疏朋友至我殯殯謂停喪於寢以待葬也時孔子有朋友在孔子之家死而此朋友無親情來奔喪者故云無所歸也既未有所歸故曰於我殯也朋友之饋雖車馬非祭肉不拜注孔安國曰不拜有通財之義也疏朋友至不拜云朋友之饋者謂朋友有物見餉也云雖車馬非祭肉不拜者車馬家財之大者也朋友有通財之義故雖復見餉車馬而我不拜謝也所可拜者若朋友見餉其家之祭肉雖小亦拜受之敬祭故也故云雖車馬非祭肉不拜也寢不尸注苞氏曰不偃卧四體布展手足似死人也居不容注孔安國曰為室家之敬難久也疏寢不尸居不容云寢不尸者寢眠也尸謂死尸也眠當小欹不得直腳申布似於死人者也云居不容者謂家中常居也家主和怡燕居先溫溫故不為容自處者也注苞氏曰至人也偃缺眠也展舒也曲禮云寢無伏此云不偃卧四體展舒手足似死人則不得覆却唯當欹而小屈也子見齊衰者雖狎必變注孔安國曰狎素相親狎也見冕者與瞽者雖䙝必以貌注周生烈曰䙝謂數相見也必當以貌禮也凶服者式之式負版者注孔安國曰凶服者送死之衣物也負版持邦國之圗籍者也有盛饌必變色而作注孔安國曰作起也敬主人之親饋也迅雷風烈必變注鄭𤣥曰敬天之怒也風疾雷為烈也疏子見至必變云子見云云者狎謂素相親狎也哀有喪故必變必變謂必作必趨也云見冕云云者䙝謂無親而卑數者也尊在位恤不成人故必以貌以貌變色對之也變重貌輕親狎重故言變卑䙝輕故以貌也然前篇必作必趨謂見踈者也云凶服者式之者凶服送死人衣物也孔子見他人送死之衣物必為敬而式之也式者古人乘路車如今龍旗車皆於車中倚立倚立難久故於車箱上安一橫木以手隱憑之謂之為較詩云倚重較是也又於較之下未至車牀半許安一橫木名為軾若在車上應為敬時則落手憑軾憑軾則身俯僂故云式之式軾也云式負版者者負謂擔揭也版謂邦國圗籍也古未有紙凡所書晝皆於版故云版也孔子見人擔揭國之圗版者皆式敬之也云有盛饌必變色而作者作起也孔子見主人食饌有盛平常故變色而起也所以然者主人自親饋故客起敬也云迅雷風烈必變者迅疾也風而雷疾急名為烈也風疾而雷此是隂陽氣激為天之怒故孔子自整變顔容以敬之也故玉藻云若疾風迅雷甚兩則必變雖夜必興衣服冠而坐是也注孔安國曰至者也云凶服者送死之衣物者此釋式凶服也云負版云云者鄭司農注宫伯職云版名籍也以版為之今時鄉户籍謂之户版鄭康成注內宰云版謂宫中閽寺之屬及其子弟録籍也國王及后世子之宫中吏官府之形象也注孔安國曰至饋也親饋謂主人自執食設之升車必正立執綏注周生烈曰正立執綏所以為安也車中不內顧注苞氏曰輿中不內顧者前視不過衡枙旁視不過輢轂也不疾言不親指疏升車至親指云升車必正立執綏者謂孔子升車禮也綏牽以上車之繩也若升車時則正立而執綏以上所以為安也云車中不內顧者內猶後也顧回頭也升在車上不回頭後顧也所以然者後人從已者不能常正若轉顧見之則掩人私不備非大德之所為故不為也故衛瓘云不掩人之不備也云不疾言者疾高急也在車上言易高故不疾言為驚於人也故繆協云車行則言傷疾也云不親指者車上既高亦不得手有所親指㸃為惑下人也注苞氏曰至􅕪也云輿中云云者車牀名輿故云輿中也衡枙轅端也若前視不得逺故曲禮云立視五雟五雟九丈九尺地也式視馬尾馬尾近在車牀欄間也竝是不過衡枙之類也云旁視不過輢轂者旁謂兩邊也輢豎在車箱兩邊三分居前之一承較者也轂在箱外當人兩邊故云旁視不過輢轂也色斯舉矣注馬融曰見顔色不善則去之翔而後集注周生烈曰回翔審觀而後下止也曰山梁雌雉時哉時哉子路供之三嗅而作注言山梁雌雉得其時而人不得時故歎之子路以其時物故供具之非其本意不苟食故三嗅而起也疏色斯至而作云色斯舉矣者謂孔子在處觀人顔色而舉動也繆協云自親指以上鄉黨拘拘之禮應事適用之跡詳矣有其禮而無其時蓋天運之極也將有逺感高興故色斯舉矣云翔而後集者謂孔子所至之處也必回翔審觀之後乃下集也云曰山梁雌雉時哉者此記者記孔子因所見而有歎也梁者以木架水上可踐渡水之處也孔子從山梁間遇見山梁閒有此雌雉也時哉者言雉逍遙得時所也所以有歎者言人遭亂世翔集不得其所是失時矣而不如山梁閒之雉十步一啄百步一飲是得其時故歎之也獨云雌者因所見而言也云子路供之者子路不達孔子時哉時哉之歎而謂歎雌雉是時月之味故馳逐驅拍遂得雌雉煮熟而進以供養孔子故云子路供之也云三嗅而作者嗅謂鼻歆翕其氣也作起也子路不達孔子意而供此熟雉乖孔子本心孔子若直爾不食則恐子路生怨若遂而食之則又乖我本心故先三嗅氣而後乃起亦如得食不食之閒也顧歡云夫栖遲一丘雉之道適也不以剛武傷性雌之德也故於翔集之下繼以斯歎而仲由之獻偶與歎不諧若即饗之則事與情反若棄而弗御則似由也有失故三嗅而起則心事雙合虞氏贊曰色斯舉矣翔而後集此以人事喻於雉也雉之為物精警難狎譬人在亂世去危就安當如雉也曰山梁雌雉時哉以此解上義也時者是也供猶設也言子路見雉在山梁因設食物以張之雉性明警知其非常三嗅而作去不食其供也止言雌者記子路所見也論語集解義疏卷五
