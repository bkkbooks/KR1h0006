body:
  text: 欽定四庫全書論語集解義疏卷三魏何晏集解梁皇侃義疏論語公冶長第五疏公冶長者孔子弟子也此篇明時無明君賢人獲罪者也所以次前者言公冶雖在柱濫縲紲而為聖師證明若不近仁則曲直難辨故公冶次里仁也子謂公冶長可妻也雖在縲紲之中非其罪也以其子妻之註孔安國曰公冶長弟子魯人也姓公冶名長縲黑索也紲攣也所以拘罪人也疏子謂至妻之云子謂公冶長可妻也者公冶長弟子也可妻者孔子欲以女嫁之故先評論而謂可妻也云雖在縲紲之中非其罪也者既欲妻之故備論其由來也縲黑索也紲攣也古者用黑索以攣係罪人也冶長賢人于時經枉濫在縲紲之中雖然實非其罪也云以其子妻之者評之既竟而遂以女嫁之也范寗曰公冶行正獲罪罪非其罪孔子以女妻之將以大明衰世用刑之枉濫勸將來實守正之人也别有一書名為論釋云公冶長從衛還魯行至二堺上聞鳥相呼往清溪食死人肉須臾見一老嫗當道而哭冶長問之嫗曰兒前日出行于今不反當是已死亡不知所在冶長曰向聞鳥相呼往清溪食肉恐是嫗兒也嫗住看即得其兒也已死即嫗告村司村司問嫗從何得知之嫗曰見冶長道如此村官曰冶長不殺人何縁知之囚録冶長付獄主問冶長何以殺人冶長曰解鳥語不殺人主曰當試之若必解鳥語便相放也若不解當今僨死駐冶長在獄六十日卒日有雀子縁獄栅上相呼嘖嘖冶長含笑吏啓主冶長笑雀語是似解鳥語主教問冶長雀何所道而笑之冶長曰雀鳴嘖嘖白蓮水邊有車翻覆黍粟牡牛折角収斂不盡相呼徃啄獄未信遣人往看果如其言後又解猪及燕語屢驗於是得放然此語乃出雜書未必可信而亦古舊相傳云冶長解鳥語故聊記之也註孔安國曰公冶長弟子魯人也姓公冶名長范甯曰名芝字子長也子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之註王肅曰南容弟子南宫縚魯人也字子容不廢言見任用也疏子謂至妻之云子謂南容者又評南容也云邦有道不廢邦無道免於刑戮者明南容之徳也若遭國君有道則出仕官不廢已之才徳也若君無道則危行言遜以免於刑戮也刑戮通語耳亦含輕重也云以其兄之子妻之者論之既畢孔子以己兄女妻之也昔時講説好評公冶南容徳有優劣故妻有己女兄女之異侃謂二人無勝負也巻舒隨世乃為有智而枉濫獲罪聖人猶然亦不得以公冶為劣也以己女妻公冶兄女妻南容者非謂權其輕重政是當其年相稱而嫁事非一時在次耳則可無意其間也註王肅曰南容弟子南宫縚魯人也字子容姓南宫名縚也又名閲也子謂子賤註孔安國曰子賤魯人弟子宓不齊也君子哉若人魯無君子者斯焉取斯註苞氏曰若人者若此人也如魯無君子子賤安得取此行而學行之疏子謂至取斯云子謂子賤者亦評子賤也云君子哉若人者此通所評之事也若人如此人也言子賤有君子之徳故言君子哉若此人也云魯無君子者斯焉取斯者因美子賤又美魯也焉安也斯此也言若魯無君子子賤安得取此君子之行而學之乎言由魯多君子故子賤學而得之子貢問曰賜也何如子曰女器也註孔安國曰言汝是器用之人也曰何器也曰瑚璉也註苞氏曰瑚璉者黍稷器也夏曰瑚殷曰璉周曰簠簋宗廟器之貴者也疏子貢問至璉也云子貢問曰賜也何如者子貢聞孔子歴評諸弟子而不及己已獨區區已分故因諮問何如也云子曰汝器也者孔子答曰汝是器用之人也云曰何器也者器有善惡猶未知己器云何故更問也云曰瑚璉也者此荅定器有善分也瑚璉者宗廟寳器可盛黍稷也言汝是器中之貴者也或云君子不器器者用必偏瑚璉雖貴而為用不周亦言汝乃是貴器亦用偏也故江熙云瑚璉置宗廟則為貴器然不周於民用也汝言語之士束脩廊廟則為豪秀然未必能幹煩務也器之偏用此其貴者猶不足多況其賤者乎是以玉之碌碌石之落落君子皆不欲也註苞氏曰至貴者也云瑚璉者黍稷器也者用盛黍稷之飯也云夏曰瑚云云者禮記云夏之四璉殷之六瑚今云夏瑚殷璉講者皆云是誤也故欒肇曰未詳也然夏殷各一名而其形未測及周則兩名其形各異外方内圓曰簠内方外圓曰簋俱容一斗二升以簠盛黍稷以簋盛稻粱或問曰子貢周人孔子何不云汝是簠簋而逺舉夏殷器也或通者曰夫子近捨當時而逺稱二代者亦微有㫖焉謂湯武聖徳伊吕賢才聖徳則與孔子不殊賢才與顔閔豈異而湯武飛龍伊吕為阿衡之任而孔子布衣洙泗顔回簞瓢陋巷論其人則不殊但是用捨之不同耳譬此器用則一而時有廢與者也或曰雍也仁而不佞註馬融曰雍弟子仲弓名也姓冉也子曰焉用佞禦人以口給屢憎於人不知其仁也焉用佞也註孔安國曰屢數也佞人口辭捷給數為人所憎也疏或曰至佞也云或曰雍也仁而不佞者或人云弟子冉雍甚有仁徳而不能佞媚求會時也云子曰焉用佞者距或人也言人生在世備仁躬自足焉用作佞為也云禦人以口給屢憎於人者更説佞人之為惡也禦猶對也給捷也屢數也言佞者口辭對人捷給無實則數為人所憎惡也云不知其仁也焉用佞也者憎佞為惡之深故重荅距於或人也子使漆彫開仕對曰吾斯之未能信註孔安國曰開弟子也漆彫姓也開名也仕進之道未能信者未能究習也子悦註鄭𤣥曰喜其志道深也疏子使至子悦云子使漆彫開仕者孔子使此弟子出仕官也云對曰吾斯之未能信者開荅也荅師稱吾者古人皆然也荅云言已學業未熟未能究習則不為民所信未堪仕也一云言時君未能信則不可仕也故張憑曰夫君臣之道信而後交者也君不信臣則無以授任臣不信君則難以委質魯君之誠未洽於民故曰未能信也云子悦者孔子開開言而欣悦也范甯曰開知其學未習究治道以此為政不能使民信已孔子悦其志道之深不汲汲於榮禄也子曰道不行乗桴浮於海從我者其由也與註馬融曰桴編竹木也大者曰筏小者曰桴也子路聞之喜註孔安國曰喜與已俱行也子曰由也好勇過我無所取材註鄭𤣥曰子路信夫子欲行故言好勇過我也無所取材者言無所取桴材也以子路不解微言故戲之耳一曰子路聞孔子欲乘桴浮海便喜不復顧望故孔子歎其勇曰過我無所復取哉言唯取於己也古字材哉同耳疏子曰至取材云道不行乗桴浮於海者桴者編竹木也大曰筏小曰桴孔子聖道不行於世故或欲居九夷或欲乘桴泛海故云道不行乘桴浮於海也云從我者其由也與者由子路名也言從我浮海者當時子路也故云其由與云子路聞之喜者子路聞孔子唯將與已俱行所以喜也云子曰由也好勇過我者然孔子本意託秉桴激時俗而子路信之將行既不達微㫖故孔子不復更言其實且先云由好勇過我以戲之也所以云過我者我始有乘桴之言而子路便實欲乘此是勇過我也云無所取材者又言汝勇乃過勝於我然我無所覓取為桴之材也註鄭𤣥曰至同耳云子路信云云者此注如向釋也云一曰云云者此又一通也此意亦與前不乖也云無所復取哉言唯取於己也者此注則微異也哉送句也言子路信我欲行而所以不顧望者言將我入海不復取餘人哉言唯取已也云古字材哉同耳者古作材字與哉字同故今此字雖作材而讀義應曰哉也又一家云孔子為道不行為譬言我道之不行如乘小桴入於巨海終無濟理也非唯我獨如此凡門徒從我者道皆不行亦並由我故也子路聞我道由便謂由是其名故便喜也孔子不欲指斥其不解微㫖故微戲曰汝好勇過我我無所更取桴材也孟武伯問子路仁乎子曰不知也註孔安國曰仁道至大不可全名也又問子曰由也千秉之國可使治其賦也註孔安國曰賦兵賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也註孔安國曰千室之邑卿大夫之邑也卿大夫稱家諸侯千乘卿大夫故曰百乘也宰家臣不知其仁也赤也何如子曰赤也束帶立於朝可使與賓客言也註馬融曰赤弟子公西華也有容儀可使為行人也不知其仁也疏孟武伯問至仁也云孟武伯問子路仁乎者武伯問孔子云弟子中有子路是仁人不乎云子曰不知也者孔子荅也所以云不知者范甯曰仁道𢎞逺仲由未能有之又不欲指言無仁非奨誘之教故託云不知也云又問者武伯得荅不知而意猶未已故更問云子路定有仁不乎故范甯曰武伯意猶未愜或似仲尼有隠故再問也云子曰由也云云者賦兵賦也孔子得武伯重問荅又直云不知則武伯未已故且言其才伎然後更荅以不知也言子路才勇可使治大國之兵賦仕為諸侯之臣也云不知其仁也者言唯知其才堪而猶不知其仁也云求也何如者武伯又問孔子弟子冉求其有仁不乎故云何如也云子曰求也云云者亦不荅仁而言求之才亦堪也千室之邑卿大夫之邑也百乘之家三公采地也言求才堪為千室百乘之邑宰也云不知其仁也者亦結荅不知其仁也云赤也何如者武伯又問弟子公西華有仁不乎云子曰赤也云云者亦唯荅赤之才能也束帶立於朝謂赤有容儀可使對賓客言語也故范甯曰束帶整朝服也賓客鄰國諸侯來相聘享也云不知其仁也者亦不荅有仁也註孔安國曰仁道至大不可全名也言子路未能全受此仁名故云不知也註孔安國曰至家臣云千室之邑卿大夫之邑也卿大夫稱家者今不復論夏殷且作周法周天子畿内方千里三公采地方百里卿地方五十里大夫地方二十五里畿外五等公方五百里侯方四百里伯方三百里子方二百里男方一百里舊説五等之臣其采地亦為三等各依其君國十分為之何以然天子畿千里既以百里為三公采五十里為卿采二十五里為大夫采地故畿外準之上公地方五百里其臣大采方五十里中采方二十五里小采方十二里半侯方四百里其臣大采方四十里次采方二十里小采方十里也伯方三百里其臣大采方三十里中采方十五里小采方七里半子方二百里其臣大采方二十里次采方十里小采方五里男方百里其臣大采方十里次采方五里小采方二里半也凡制地方一里為井井有三家若方二里半有方一里者六又方半里者一則合十八家有餘故論語云十室之邑也其中大小各隨其君故或有三百户是方十里者一或有千室是方十里者三有餘也云諸侯千秉者謂上公也云卿大夫故曰百乗也宰家臣者然百乘之家是三公之采鄭注雜記及此並云大夫百乘者三公亦通有大夫之稱也註馬融曰至人也行人謂宜使為君出聘鄰國及接鄰國之使來者也周禮有大小行人職也子謂子貢曰女與回也孰愈註孔安國曰愈猶勝也對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也註苞氏曰既然子貢弗如復云吾與汝俱不如者蓋欲以慰子貢心也疏子謂至如也云子謂子貢曰汝與回也孰愈者孰誰也愈勝也孔子問子貢汝與顔回二人才伎誰勝者也所以須此問者繆播曰學末尚名者多顧其實者寡囘則崇本棄末睗也未能忘名存名則美著於物精本則名損於當時故發問以要賜對以示優劣也所以抑賜而進回也云對曰云云者荅孔子以審分也王弼曰假數以明優劣之分言已與顔淵十裁及二明相去懸逺也張封溪曰一者數之始十者數之終顏生體有識厚故聞始則知終子貢識劣故聞始裁至二也云子曰弗如也者弗不也孔子聞子貢之荅分有懸殊故定之云不如也云吾與汝弗如也者孔子既荅子貢之不如又恐子貢有怨故又云吾與汝皆不如也所以安慰子貢也註苞氏曰至心也云既然子貢弗如者釋前弗如也復云云云者苞意如向解而顧歡申苞注曰回為徳行之俊賜為言語之冠淺深雖殊而品裁未辨故使名實無濫故假問孰愈子貢既審回賜之際又得發問之㫖故舉十與二以明懸殊愚智之異夫子嘉其有自見之明而無矜尅之貎故判之以弗如同之以吾與汝此言我與爾雖異而同言弗如能與聖師齊見所以為慰也侃謂顧意是言我與爾俱明汝不如也非言我亦不如也而秦道賓曰爾雅云與許也仲尼許子貢之不如也宰予晝寢註苞氏曰宰予弟子宰我也子曰朽木不可彫也註苞氏曰朽腐也彫彫琢刻畫也糞土之牆不可圬也註王肅曰圬墁也二者喻雖施功猶不成也於予與何誅註孔安國曰誅責也今我當何責於汝乎深責之辭也子曰始吾於人也聴其言而信其行今吾於人也聴其言而觀其行於予與改是註孔安國曰改是者始聴言信行今更察言觀行發於宰我晝寢也疏宰予至改是云宰予晝寢者寢眠也宰予惰學而晝眠也云子曰朽木不可彫也者孔子責宰予晝眠故為之作譬也朽敗爛也彫彫鏤刻畫也夫名工巧匠所彫刻唯在好木則其器乃成若施工於爛朽之木則其器不成故云朽木不可彫云糞土之牆不可圬也者牆謂牆壁也圬謂圬墁之使之平泥也夫圬墁牆壁若牆壁土堅實者則易平泥光飾耳若墁於糞土之牆則頽壊不平故云不可圬也所以言此二者言汝今當畫而寢不可復教譬如爓木與糞牆之不可施功也云於予與何誅者誅責也言所責者當責有智之人而今宰予無智則何責乎予宰予與語助也言不足責也即是責之深也然宰我有此失者一家云其是中人豈得無失一家云與孔子為教故託跡受責也故珊琳公曰宰予見時後學之徒將有懈廢之心生故假晝寢以發夫子切磋之教所謂互為影響者也范甯曰夫宰我者升堂四科之流也豈不免乎晝寢之咎以貽朽糞之譏乎時無師徒共明勸誘之教故託夫弊跡以為發起也云子曰云云者始謂孔子少年時也孔子歎世醨薄之跡今異昔也昔時猶可故吾少時聞於人所言便信其能有行故云而信其行也云今吾云云者今謂孔子末時也不復聴言信行乃更聴言而必又須觀見其行也云於予與改是者是比也言我所以不復聴言信行而更為聴言觀行者起於宰予而改為此所以起宰予而改者我當信宰予是勤學之人謂必不懶惰今忽正直晝而寢則如此之徒居然不復可信故使我并不復信於時人也子曰吾未見剛者或對曰申棖註苞氏曰申棖魯人也子曰棖也慾焉得剛註孔安國曰慾多情慾也疏子曰至得剛云吾未見剛者者剛謂性無慾者也孔子言我未見世有剛性無慾之人也云或對曰申棖者或有人聞孔子説而荅之云魯有姓申名棖者其人剛也云子曰棖也慾焉得剛者孔子語或人曰夫剛人性無求而申棖性多情慾多情慾者必求人求人則不得是剛故云焉得剛子貢曰我不欲人之加諸我也吾亦欲無加諸人註馬融曰加陵也子曰賜也非爾所及也註孔安國曰言不能止人使不加非義於己也疏子貢曰至及也云子貢曰云云者子貢自願無世人以非理加陵於我也云吾亦欲無加諸人者又云我匪唯願人不以非理加於我而我亦願不以非理加陵於人也云子曰賜也非爾所及也者孔子抑子貢也言能不招人以非理見加及不以非理加人此理深逺非汝分之所能及也爾汝也故袁氐曰加不得理之謂也非無過者何能不加人人亦不加己盡得理賢人也非子貢之分也註孔安國曰至已也然不加人人不加己並難可能而注偏釋不加已者畧也子貢曰夫子之文章可得而聞也註章明也文彩形質著見可得以耳目自修也夫子之言性與天道不可得而聞也已矣註性者人之所受以生者也天道者元亨日新之道也深微故不可得而聞也疏子貢曰至已矣云子貢曰云云者子貢此歎顔氏之鑽仰也但顔既庶㡬與聖道相鄰故云鑽仰之子貢既懸絶不敢言其高堅故自説聞於典籍而已文章者六籍也六籍是聖人之筌蹄亦無關於魚兔矣六籍者有文字章著煥然可修耳目故云夫子文章可得而聞也然典籍著見可聞可觀今不云可見而云可聞者夫見之為近聞之為逺不敢言躬自近見政欲寄於逺聞之而已云夫子云云者夫子之言即謂文章之所言也性孔子所稟以生者也天道謂元亨日新之道也言孔子六籍乃是人之所見而六籍所言之㫖不可得而聞也所以爾者夫子之性與天地元亨之道合其徳致此處深逺非凡人所知故其言不可得聞也註性者至聞也云性者人之所受以生者也者人禀天地五常之氣以生曰性性生也云天道者元亨日新之道也者元善也亨通也日新謂日日不停新新不已也謂天善道通利萬物新新不停者也言孔子所稟之性與元亨日新之道合徳也云深微故不可得而聞也者與元亨合徳故深微不可得而聞也或云此是孔子死後子貢之言也故大史叔明云文章者六籍是也性與天道如何注以此言之與是夫子死後七十子之徒追思曩日聖師平生之徳音難可復值六籍即有性與天道但垂於世者可蹤故千載之下可得而聞也至於口説言吐性與天道藴藉之深止乎身者難繼故不可得而聞也侃案何注似不如此且死後之言凡者亦不可聞何獨聖乎子路有聞未之能行唯恐有聞註孔安國曰前所聞未能及得行故恐後有聞不得竝行也疏子路有聞未之能行唯恐有聞子路禀性果决言無宿諾故前有所聞於孔子即欲修行若未及能行則不願更有所聞恐行之不周故唯恐有聞也子貢問曰孔文子何以謂之文也註孔安國曰孔文子衛大夫孔叔圉也文諡也子曰敏而好學不恥下問是以謂之文也註孔安國曰敏者識之疾也下問問凡在已下者也疏子貢問至文也云子貢問云云者衛大夫孔叔圉以文為諡子貢疑其大高故問於孔子也問其何徳而諡文也云子曰云云者荅所以諡文之由也敏疾速也言孔圍之識智疾逮而所好在學若有所不知則不恥諮問在己下之人有此諸行故謂為文也子謂子産有君子之道四焉註孔安國曰子産鄭大夫公孫僑也其行已也恭其事上也敬其養民也恵其使民也義疏子謂至也義云子謂子産有君子之道四焉者言子産有四徳並是君子之道也云其行已也恭者一也言其行己身於世常恭從不逆忤人物也云其事上也敬者二也言若事君親及凡在已上者必皆用敬也云其養民也惠者三也言其養民皆用恩恵也故孔子謂為古之遺愛也云其使民也義者四也義宜也使民不奪農務各得所宜也子曰晏平仲善與人交久而人敬之註周生烈曰齊大夫也晏姓平諡名嬰也疏子曰至敬之云晏平仲善與人交者言晏平仲與人結交有善也云久而人敬之者此善交之驗也凡人交易絶而平仲交久而人愈敬之也孫綽曰交有傾蓋如舊亦有白首如新隆始者易克終者難敦厚不渝其道可久所以難也故仲尼表馬子曰臧文仲居蔡註苞氏曰臧文仲魯大夫臧孫辰也文諡也蔡國君之守龜也出蔡地因以為名焉長尺有二寸居蔡僭也山節藻棁註苞氏曰節者栭也刻鏤為山也棁者梁上楹也畫為藻文言其奢侈也何如其智也註孔安國曰非時人謂以為智也疏子曰至智也云臧文仲居蔡者居猶畜也蔡大龜也禮唯諸侯以上得畜大龜以卜國之吉凶大夫以下不得畜之文仲是魯大夫而畜龜是僭人君禮也云山節藻棁者此奢侈也山節者刻柱須露節為山如今栱斗也藻棁者畫梁上侏儒柱為藻文也人君居室無此禮而文仲為之故為奢也宫室之飾士去首去本大夫達稜諸侯刻而礱之天子加密石焉出穀梁傳云何如其智也者時人皆謂文仲是有智之人故孔子出其僭奢之事而譏時人也故云何如其智也註苞氏曰至僭也云蔡國云云者國君守國之龜出蔡地因呼龜為蔡也云長尺有二寸者蔡地既出大龜龜長尺二寸者因名蔡也云居蔡僭也者大夫亦得卜用龜之小者也不得畜蔡也文仲畜之是僭濫也註苞氏曰至侈也云節者栭也刻鏤為山也者言刻栭柱頭為山也栭是梁上柱名也云棁者梁上楹也者梁上楹即是檽檽即侏儒柱也苞兩而言之當是互明之也刻檽頭為山也畫檽身為藻文也又有一本注云山節者刻欂櫨為山也云畫為藻文言其奢侈也者若以注意則此是非僭也正言是奢侈失禮人君無此禮故不僭也子張問曰令尹子文註孔安國曰令尹子文楚大夫姓鬬名㝅字於菟三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如也子曰忠矣曰仁矣乎曰未知焉得仁註孔安國曰但聞其忠事未知其仁也崔子弑齊君陳文子有馬十乘棄而違之註孔安國曰皆齊大夫也崔杼作亂陳文子惡之捐其四十匹馬違而去之也至於他邦則曰猶吾大夫崔子也違之之至一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁註孔安國曰文子避惡逆去無道求有道當春秋時臣陵其君皆如崔杼無有可止者也疏子張問至得仁云子張問曰令尹子文者令尹楚官名也子文為楚令尹故曰令尹子文也云三仕為令尹無喜色者文子經仕楚三過為令尹之官而顔色未曾喜也云三已之無愠色者已謂黜止也文子作令尹經三過被黜而亦無愠恚之色也云舊令尹之政必以告新令尹者雖三過被黜受代之時必以令尹舊政令告語新人恕其不知解也云何如也者子張問孔子令尹行如此是謂何人也云子曰忠矣者孔子荅言臨代以舊告新此是為臣之忠者也李充曰進無喜色退無怨色公家之事知無不為忠臣之至也云曰仁矣乎者子張又問孔子如子文之行可得謂為仁不乎云曰未知焉得仁者孔子荅曰唯聞其忠未知其何由得為仁也李充曰子玉之敗子文之舉舉以敗國不可謂智也賊夫人之子不可謂仁侃案李謂為不智不及注也云崔子弑齊君者崔子齊大夫崔杼也弑其君莊公也云弑者夫上殺下曰殺殺名為卑也下殺上曰弑弑試也下之害上不得即而致殺必先相試以漸故易曰臣弑君子弑父非一朝一夕之故其所從來漸矣如履霜以至堅氷也云陳文子有馬十乗者陳文子亦齊大夫也十乗四十匹也四馬共乘一車故十乘有四十匹也云棄而違之者文子見崔杼殺君而已力勢不能討故棄四十匹馬而違去此國更往他邦云至於他邦則曰猶吾大夫崔子也者于時天下並亂國國皆惡文子棄馬而去復更至他邦而所至之國亦亂與齊不異故曰猶吾大夫崔子也云違之者違去也文子所至新國文惡故又去之也云之至一邦者之往也去所至新國更復往一邦也云則又曰猶吾大夫崔子也者去初所至更往一國一國復昏亂又與齊不異故又曰猶吾大夫崔子也云違之者已復更去也云何如者子張更問孔子言文子捨馬三至新邦屢違之事如此可謂為何人也云子曰清矣者清清潔也顔延之曰每適又違潔身者也云曰仁矣乎者子張又問若如此文子之行則可謂為仁不乎云曰未知焉得仁者荅子張曰其能自去只可得清未知所以得名為仁也孫綽曰大哉仁道之𢎞以文子平粹之心無借之誠文子疾時惡之篤棄馬而逝三去亂邦坐不暇寜忠信有餘而仁猶未足唯顏氏之子體仁無違其亞聖之目乎李充曰違亂求治不汙其身清矣而所之無可驟稱其亂不如甯子之能愚蘧生之可巻未可謂智也潔身而不濟世未可謂仁也李謂為未智亦不勝為未知也註孔安國曰至於菟楚鬬伯比外家是䢵國其還外家通舅女生子既恥之仍遂擲於山草中此女之父獵還見虎乳飲小兒因取養之既未知其姓名楚人謂乳為㝅謂虎為於菟音烏塗此兒為虎所乳故名之曰㝅於菟也後知其是伯比子故呼為鬬㝅於菟也後長大而賢仕楚為令尹之官范甯曰子文是諡也註捐其四十匹馬捐猶棄放也季文子三思而後行子聞之曰再思斯可矣註鄭𤣥曰季文子魯大夫季孫行父也文諡也文子忠而有賢行其舉事寡過不必及三思也疏季文子至可矣云季文子三思而後行者言文子有賢行舉事必三過思之也云子聞之曰再思斯可矣者孔子美之言若如文子之賢不假三思唯再思此則可也斯此也有一通云言再過二思則可也人季彪曰君子之行謀其始思其中慮其終然後允合事機舉無遺算是以曾子三省其身南容三復白圭夫子稱其賢且聖人敬慎於教訓之體但當有重耳固無緣有减損之理也時人稱季孫名遇其實故孔子矯之言季孫行事多闕許其再思則可矣無緣乃至三思也此蓋矯抑之談耳非稱美之言也子曰甯武子註馬融曰衛大夫甯俞也武諡也邦有道則智邦無道則愚其智可及也其愚不可及也註孔安國曰詳愚似實故曰不可及也疏子曰至及也此章美武子徳也云邦有道則智者言武子若值邦君有道則肆已智譏以贊明時也云邦無道則愚者若值國主無道則卷智藏明詳昬同愚也云其智可及也者是其中人識量當其肆智之目故為世人之可及也云其愚不可及也者時人多衒聰明故智識有及於武子者而無敢詳愚隠智如武子者故云其愚不可及也註孔安國曰至及也詳詐也王朗曰或曰詳愚蓋連智之所得緣有此智故能有此愚豈得云同其智而闕其愚哉荅曰智之為名止於布徳尚善動而不黜者也愚無預焉至於詳愚韜光潛綵恬然無用支流不同故其稱亦殊且智非足者之目可有雖審其顯而未盡其愚者矣孫綽曰人情莫不好名咸貴智而賤愚雖治亂異世而矜鄙不變唯深逹之士為能晦智藏名以全身逺害飾智以成名者易去華以保性者難也子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之也註孔安國曰簡大也孔子在陳思歸欲去故曰吾黨之小子狂者進趨於大道妄穿鑿以成文章不知所以裁制我當歸以裁制之耳遂歸疏子在至之也云子在陳曰歸與歸與者孔子周流諸國在陳最久將欲反魯故發此辭再言歸與歸與者欲歸之意深也云吾黨云云者此是欲歸之辭也所以不直歸而必有辭者客住既久主人無薄若欲去無辭則恐主人生愧故託為此辭以申客去之有由也吾黨者謂我鄉黨中也小子者鄉黨中後生末學之人也狂者直進無避者也簡大也大謂大道也斐然文章貎也孔子言我所以欲歸者為我鄉黨中有諸末學小子狂而無避進取正經大道輒妄穿鑿斐然以成文章皆不知其所以輒自裁斷此為謬誤之甚故我當歸為裁正之也註進趨於大道妄穿鑿以成文章趨取也大道正經也既狂故取正典穿鑿之也子曰伯夷叔齊不念舊惡怨是用希註孔安國曰伯夷叔齊孤竹君之二子也孤竹國名也疏子曰至用希此美夷齊之徳也念猶識録也舊惡故憾也希少也人若録於故憾則怨恨更多唯夷齊豁然忘懐若有人犯己己不怨録之所以與人怨少也註孔安國曰至名也孤竹之國是殷湯正月三日丙寅日所封其子孫相傳至夷齊之父也父姓墨台名初字子朝伯夷名允字公信叔齊名致字公逹伯夷大而庶叔齊小而正父薨兄弟相讓不復立也子曰孰謂微生高直註孔安國曰微生姓名高魯人也或乞醯焉乞諸其鄰而與之註孔安國曰乞之四鄰以應求者用意委曲非為直人也疏子曰至與之云孰謂微生高直者于時世人多云微生高用性清直而孔子譏之故云孰謂微生高直也孰誰也云或乞醯焉者舉微生非直之事也醯酢酒也或有人就微生乞醯者也云乞諸其鄰而與之者諸之也時微生家自無醯而為乞者就已鄰有醯者乞之以與或人也直人之行不應委曲今微生高用意委曲故譏其非直註四鄰四鄰四靣鄰里之家也子曰巧言令色足恭註孔安國曰足恭便僻之貎也左丘明恥之丘亦恥之註孔安國曰左丘明魯大史也匿怨而友其人註孔安國曰心内相怨而外詐親也左丘明恥之丘亦恥之疏子曰至恥之云巧言令色足恭者謂己用恭情少而為巧言令色足恭之者也繆協曰恭者從物凡人近情莫不欲人之從已足恭者以恭足於人意而不合於禮度斯皆適人之適而曲媚於物也云左丘明恥之丘亦恥之者左丘明受春秋於仲尼者也其既良直故凡有可恥之事而仲尼皆從之為恥也巧言令色足恭是可恥之事也云匿怨而友其人者匿藏也謂心藏怨而外詐相親友者也云左丘明恥之丘亦恥之者亦從丘明恥也范甯曰藏怨於心詐親於形外楊子法言曰友而不心靣友也亦丘明之所恥顔淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共弊之而無憾註孔安國曰憾恨也顔淵曰願無伐善註孔安國曰自無稱已之善也無施勞註孔安國曰無以勞事置施於人也子路曰願聞子之志子曰老者安之朋友信之少者懐之註孔安國曰懐安也疏顔淵至懷之云顔淵季路侍者季路即子路也次第是季侍侍孔子卑在尊側曰侍也云子曰盍各言爾志者盍何不也孔子話顔路曰汝二人何不各言汝心中所思乎云子路曰云云者弊敗也憾恨也子路性決言朋友有通財車馬衣裘共乗服而無所憾恨也一家通云而無憾者言願我既乗服朋友衣馬而不慚憾也故殷仲堪曰施而不恨士之近行也若乃用人之財不覺非已推誠闇往感思不生斯乃交友之至仲由之志與也云顔淵曰願無伐善者有善而自稱曰伐善也顔淵所願願已行善而不自稱欲潛行而百姓日用而不知也李充曰自伐者無功自矜者不莊云無施勞者又願不施勞役之事於天下也故鑄劒㦸為農器使子貢無施其辨子路無厲其勇也云子路曰願聞子之志者二子説志既竟而子路又云願聞孔子志也古稱師曰子也云子曰云云者孔子荅也願已為老人必見撫安朋友必見期信少者必見思懐也若老人安己己必是孝敬故也朋友信己己必是無欺故也少者懐己己必有慈恵故也欒肇曰敬長故見安善誘故可懷也子曰已矣乎吾未見能見其過而内自訟者也註苞氏曰訟猶責也言人有過莫能自責者也疏子曰至者也已止也止矣乎者歎此以下事久已無也訟猶責也言我未見人能自見其所行事有過失而内自責者也子曰十室之邑必有忠信如丘者焉不如丘之好學也疏子曰至學也丘孔子名也孔子自稱名言十室為邑其中必有忠信如丘者焉也但無如丘之好學耳孫綽曰夫忠信之行中人所能存全雖聖人無以加也學而為人未足稱也好之至者必鑽仰不怠故曰有顔回者好學今也則亡今云十室之學不速於己又曰我非生而知之好古敏而求耳此皆陳深崇於教以盡汲引之道也一家云十室中若有忠信如丘者則其餘焉不如丘之好學也言今不好學不忠信耳故衛瓘曰所以忠信不如丘者由不能好學如丘耳苟能好學則其忠信可使如丘也論語雍也第六疏雍孔子弟子也明其才堪南面而時不與也所以次前者其雖無横罪亦是不遇之流横罪為切故公冶前明而雍也為次也子曰雍也可使南面註苞氏曰可使南面者言任諸侯可使治國政也疏子曰雍也可使南面南面謂為諸侯也孔子言冉雍之徳可使為諸侯也仲弓問子桑伯子註王肅曰伯子書傳無見也子曰可也簡註以其能簡故曰可也仲弓曰居敬而行簡以臨其民不亦可乎註孔安國曰居身敬肅臨下寛略則可也居簡而行簡無乃大簡乎註苞氏曰伯子之簡大簡也子曰雍之言然疏仲弓問至簡乎云仲弓問子桑伯子者仲弓即冉雍也問孔子曰有人名子桑伯子此是何人也云子曰可也簡老可猶可謂也簡謂疎大無細行也孔子荅曰伯子之身所行可謂踈簡也云仲弓曰云云者孔子荅曰伯子所行可謂疎簡故仲弓更諮孔子評伯子之簡不合禮也將説其簡不合於禮故此先説於合禮之簡也言人若居身有敬而寛簡以臨下民能如此者乃為合禮故云不亦可乎言其可也云居簡云云者此説伯子之簡不合禮也而伯子身無故而以簡自居又行簡對物物皆無敬而簡如此不乃大簡乎言其簡過甚也云子曰雍之言然者雍論簡既是故孔子然許之也虞喜曰説苑曰孔子見伯子伯子不衣冠而處弟子曰夫子何為見此人乎曰其質美而無文繁吾欲説而文之孔子去子桑伯子門人不悦曰何為見孔子乎曰其質美而文繁吾欲説而去其文故曰文質修者謂之君子有質而無文謂之易野子桑伯子易野欲同人道於牛馬故仲尼曰大簡無文繁吾欲説而文之註王肅曰伯子書傳無見也言書傳不見有子桑伯子也註以其能簡故曰可也言伯子能為簡略之行故云可也哀公問曰弟子孰為好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也註凡人任情喜怒違理顔淵任道怒不過分遷者移也怒當其理不移易也不貳過者有不善未嘗復行也疏哀公問至者也云哀公問曰弟子孰為好學者哀公問孔子諸弟子之中誰為好學者云孔子對曰有顔回者好學者荅曰弟子之中唯有顔回好學云不遷怒者此舉顔淵好學分滿所得之功也凡夫識昧有所瞋怒不當道理唯顔回學至庶㡬而行藏同於孔子故識照以道怒不乖中故云不遷遷猶移也怒必是理不遷移也云不貳過者但不能照機機非已所得故於己成過凡情有過必文是為再過而回當機時不見已乃有過機後即知知則不復文飾以行之是不貳也故易云顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行是也然學至庶幾其美非一今獨舉怒過二條者葢有以也為當時哀公濫怒貳過欲因荅寄箴者也云不幸短命死矣者凡應死而生曰幸應生而死曰不幸若顔子之徳非應死而今死故曰不幸也命者禀天所得以生如受天教命也天何言哉設言之耳但命有短長顔生所得短者也不幸而死由於短命故曰不幸短命死矣云今也則亡者亡無也言顔淵既已死則無復好學者也然游夏文學著於四科而不稱之便謂無者何也游夏非體之人不能庶㡬尚有遷有貳非關喪子唯顔生鄰亞故曰無也云未聞好學者也者好學庶㡬曠世唯一此士難重得故曰未聞也註凡人至行也云凡人任情喜怒違理者未得坐忘故任情不能無偏故違理也云顔淵任道怒不過分者過猶失也顔子與道同行捨不自任已故曰任道也以道照物物豈逃形應可怒者皆得其實故無失分也云遷者移也怒當其理不移易也者照之故當理當理而怒之不移易也云不貳過者有不善未嘗復行也者即用易繫為解也未嘗復行謂不文飾也子華使於齊冉子為其母請粟子曰與之釡註馬融曰子華弟子公西華赤字也六斗四升曰釡也請益曰與之庾註苞氏曰十六斗為庾也冉子與之粟五秉註馬融曰十六斛為秉五秉合八十斛也子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼富註鄭𤣥曰非冉求與之太多也疏子華使至繼富云子華使於齊者子華弟子公西赤字也姓公西名赤有容儀故為使往齊國也但不知時為魯君之使為孔子之使耳云冉子為其母請粟者冉子冉求也其母子華母也請粟就孔子請粟也時子華既出使而母在家冉有由朋友之情故為子華之母就孔子請粟也云子曰與之釡者孔子得冉求之請故命與粟一釡釡容六斗四升也云請益者冉求嫌一釡之少故更就孔子請益也云曰與之庾者冉子既請益故孔子令與之庾也庾十六斗也然初請唯得六斗四升請益而得十六斗是益多於初如為不次政恐益足前釡以成十六斗也云冉子與之粟五秉者十六斛曰秉五秉八十斛也孔子與粟既竟故冉子又自以已粟八十斛與之也云子曰赤之適齊也乗肥馬衣輕裘者孔子説我所以與少又説冉求不應與多意也肥馬馬之食穀者也輕裘裘之皮精毛軟及新綿為著者也若家貧則馬不食穀而瘦裘用麤皮毛强而故絮為著緼袍是也今子華往使於齊去時所乗馬肥其所衣裘輕軟則是家富其母不乏也云吾聞之也君子周急不繼富者孔子曰吾聞舊語夫君子施但周贍人之急者耳不係繼足人為富蓄也註六斗四升曰釡也春秋傳昭公三年冬晏子曰齊舊四量豆區釡鍾四升為豆各自加其四以登於釡釡十則鍾案如兹説是四升為豆四豆為區區斗六升也四區為釡釡六斗四升如馬注也若鍾則六斛四斗也註苞氏曰十六斗為庾也然案苞注十六斗為庾與賈氏注國語同而不合周禮周禮旊人職云豆實三而成觳鄭云豆實四升則觳實一斗二升也又陶人職云庾實二觳案如陶旊二文則庾二斗四升矣而苞氏注曰十六斗為庾即是聘禮之籔也聘禮十六斗曰籔不知苞賈當别有所出耳註馬融曰十六斛為秉五秉合八十斛也聘禮云十斗曰斛十六斗曰籔十籔曰秉是馬注與聘禮之籔同也註鄭𤣥曰非冉求與之太多也非猶譏也孔子此語是譏冉求與子華母粟之太多也然舊説疑之子華之母為當定乏為當定不乏若實乏而子華肥輕則為不孝孔子不多與是為不仁若不乏而冉求與之則為不智誰為得失舊通者云三人皆得宜也子華中人豈容已乗肥馬衣輕裘而令母乏必不能然矣且夫子明言不繼富則知其家富也實富而冉求為請與多者明朋友之親有同已親既一人不在則一人宜相共恤故也今不先直以已粟與之而先請於孔子者已若直與則人嫌子華母有乏故先請孔子孔子再與猶不至多明不繼富也已故多與欲招不繼富之責是知華母不乏也華母不乏而已與之為於朋友之義故也不乏尚與况乏者也原思為之宰註苞氏曰弟子原憲也思字也孔子為魯司冠以原憲為家邑宰也與之粟九百辭註孔安國曰九百九百斗也辭讓不受也子曰毋註孔安國曰祿法所當受無以讓也以與爾鄰里鄉黨乎註鄭𤣥曰五家為鄰五鄰為里萬二千五百家為鄉五百家為黨也疏原思至黨乎云原思為之宰者弟子原憲也孔子為魯司冦有采邑故使原思為邑宰也云與之粟九百者九百九百斗也原憲既為邑宰邑宰宜得祿故孔子以粟九百與之也云辭者原性亷讓辭不受粟也云子曰毋者原辭不肯受故孔子止之也毋毋辭也云以與爾鄰里鄉黨乎者又恐原憲不肯受故又説云汝莫辭但受之若無用當還分與爾鄰里鄉黨也此是示賢人仕官潤澤州鄉之教也云鄰里鄉黨者内外互言之耳鄰里在百里之外鄉黨在百里之内也註孔子為魯司冦余見鄭注本云孔子初仕魯為中都宰從中都宰為司空從司空為司冦也註孔安國曰九百九百斗也漫云九百而孔必知九百斗者孔政當嫌九百升為少九百斛為多故應是年也宜與粟五秉亦相類也子謂仲弓曰犁牛之子騂且角雖欲勿用山川其舍諸註犁雜文也騂赤色也角者角周正中犧牲也雖欲以其所生犁而不用山川寜有舍之乎言父雖不善不害於其子之美也疏子謂至舍諸此明不以父無徳而廢子之賢也云子謂仲弓者仲弓父劣當是于時為仲弓父劣而不用仲弓故孔子明言之也范甯曰謂非必對言也云曰犁牛之子騂且角者為設譬也犁文也雜文曰犁或音狸狸雜文也或音梨犁謂耕犁也騂赤色也周家所貴也角角周正長短尺寸合禮也言假今犁牛而生好子色角合禮也云雖欲勿用山川其舍諸者勿猶不也舍猶棄也言犁牛生好子子既色角悉正而時人或言此牛出不佳之母急欲舍棄此牛而不用特祭於鬼神則山川百神豈薄此牛母惡而棄舍其子遂不歆饗此祭乎必不舍矣譬如仲弓之賢其父雖劣若遭明王聖主豈為仲弓父劣而舍仲弓之賢不用為諸侯乎明必用也故鯀則殛死禹乃嗣興是也案周禮牧人職云凡陽祀用騂牲毛之陰祀用黝牲毛之望祀各以其方之色牲毛之鄭云陽祀祭天於南郊及宗廟也隂祀祭地北郊及社稷也望祀五嶽四鎮四瀆也然今云山川者趣舉言之也若南方則用赤是有其方色也且既云山川則宗廟亦可知亦互言之也子曰回也其心三月不違仁其餘則日月至焉而已矣註言餘人暫有至仁時唯回移時而不變也疏子曰至已矣云回也其心三月不違仁者仁是行盛非體仁則不能不能者心必違之能不違者唯顔回耳既不違則應終身而止舉三月者三月一時為天氣一變一變尚能行之則他時能可知也亦欲引汲故不言多時也故苞述云顔子不違仁豈但一時將以勖羣子之志故不絶其階耳云其餘則日月至焉而已矣者其餘謂他弟子也為仁並不能一時或至一日或至一月故云日月至焉而已矣註言餘至變也既言三月不違不違故知移時也季康子問仲由可使從政也與子曰由也果註苞氏曰果謂果敢決斷也於從政乎何有曰賜也可使從政也與子曰賜也達註孔安國曰達謂通於物理也於從政乎何有曰求也可使從政也與子曰求也藝註孔安國曰藝謂多才能也於從政乎何有疏季康子問至何有云季康子問仲由可使從政也與者仲由子路也魯卿季康子問孔子曰子路可使從政為官長諸侯不也云子曰由也果者荅康子説子路才行可為政也言子路才性果敢能决斷也云於從政乎何有者既解決斷則必能從政也何有言不足有也故衞瓘曰何有者有餘力也云曰賜也可使從政也與者又問孔子曰子貢可使從政不也云子曰賜也達者亦荅才能也言賜能逹於物理也云於從政乎何有者既達物理故亦云何有也云曰求也可使從政也與者又問孔子曰冉求何如云子曰求也藝者又荅才能也言求多才能也云於從政乎何有者有才能故亦云何有也季氏使閔子騫為費宰註孔安國曰費季氏邑也季氏不臣而其邑宰數叛聞閔子騫賢故欲用也閔子騫曰善為我辭焉註孔安國曰不欲為季氏宰語使者曰善為我作辭說令不復召我也知有復我者註孔安國曰復我者重来召我也則吾必在汶上矣註孔安國曰去之汶水上欲北如齊也疏季氏至上矣云季氏使閔子騫為費宰者弟子閔損也費季氏采邑也時季氏邑宰叛聞閔子騫賢故遣使召之為費宰也云閔子騫曰善為我辭焉者子騫賢不願與惡人為宰故謂季氏之使者曰汝還可善好為我作辭辭于季氏道我不欲為宰之意也云如有復我者者復又也子騫曰汝若不能為我作善辭而令有使又来召我者語在下也云則吾必在汶上矣者汶水名也在魯北齊南子騫時在魯謂使者云若又来召我我當北渡汶水之上往入齊也註孔安國曰至數叛云季氏不臣者强僭于魯故曰不臣也云而其邑宰數叛者其邑宰即公山弗擾也亦賢人也見季氏惡故叛也所以後引云公山弗擾以費叛召子欲往是也伯牛有疾註馬融曰伯牛弟子冉耕也子問之自牖執其手註苞氏曰牛有惡疾不欲見人故孔子從牖執其手也曰亡之註孔安國曰亡喪也疾甚故持其手曰喪也命矣夫斯人也而有斯疾也斯人也而有斯疾也註苞氏曰再言之者痛惜之甚也疏伯牛至疾也云伯牛有疾者伯牛弟子冉耕字也魯人有疾有惡疾也云子問之者孔子往問伯牛之疾差不也云自牖執其手者牖南窗也君子有疾寐於北壁下東首今師來故遷出南窗下亦東首令師從户入於牀北得面南也孔子恐其惡疾不欲見人故不入户但於窗上而執其手也云曰亡之者亡喪也孔子執牛手而曰喪之言牛必死也云命矣夫者亦是不幸之流也言如汝才徳實不應死而今喪之豈非禀命之得矣夫夫助語也云斯人云云者斯此也言有此善人而嬰此惡疾疾與人反故歎之也再言之者痛惜之深也子曰賢哉回也一簞食一瓢飲註孔安國曰簞笥也瓢瓠也在陋巷人不堪其憂回也不改其樂賢哉回也註孔安國曰顔淵樂道雖簞食在陋巷不改其所樂也疏子曰至回也云賢哉回也者美顔淵之賢行故先言賢哉回也云一簞食一瓢飲者簞竹筥之屬也用貯飯瓢瓠片也匏持盛飲也言顔淵食不重餚及無雕鏤之器唯有一簞食一瓢飲而已也云在陋巷者不願爽塏而居處之在窮陋之巷中也云人不堪其憂者凡人以此為憂而不能處故云不堪其憂也云回也不改其樂者顔淵以此為樂久而不變故云不改其樂也云賢哉回也者美其樂道情篤故始末言賢也註孔安國曰簞笥也以竹為之如箱篋之屬也孔安國曰至樂也所樂則謂道也冉求曰非不悦子之道力不足也子曰力不足者中道而廢今汝畫註孔安國曰畫止也力不足者當中道而廢今汝自止耳非力極也疏冉求曰至汝畫云冉求曰非不悦子之道力不足者者冉求諮孔子曰求之心誠非不喜悦夫子之道而欲行之只才力不足無如之何也云子曰力不足者中道而廢者孔子抑冉求無企慕之心也言汝但學不行之矣若行之而力不足者當中道而廢耳莫發初自誠不能行也云今汝畫者畫止也汝今云力不足矣是汝自欲止耳子謂子夏曰女為君子儒無為小人儒註馬融曰君子為儒將以明其道小人為儒則矜其名也疏子謂至人儒儒者濡也夫習學事久則濡潤身中故謂久習者為儒也但君子所習者道道是君子儒也小人所習者矜誇矜誇是小人儒也孔子語子夏曰當為君子儒不得習為小人儒也子游為武城宰註苞氏曰武城魯下邑也子曰女得人焉耳乎哉註孔安國曰焉耳乎哉皆辭也曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也註苞氏曰澹臺姓滅明名也字子羽言其公且方也疏子游至室也云子游為武城宰者子游弟子言偃字也時為武城邑宰也云子曰汝得人焉耳乎哉者孔子問子游言汝作武城宰而武城邑民有好徳行之人為汝所得者不乎故云汝得人焉耳乎哉故袁氏云謂得其邦之賢才不也云曰有澹臺滅明者行不由徑者荅為宰而所得邑中之人也澹臺滅明亦孔子弟子也言滅明每事方正故行出皆不邪徑於小路也一云滅明徳行方正不為邪徑小路行也云非公事未嘗至於偃之室也者公事其家課税也偃子游名也偃之室謂子游所住邑之廨舍也子游又言滅明既方正若非常公税之事則不嘗無事至偃住處也舉其明不託狎倚勢於朋友也註孔安國曰焉耳乎哉皆辭也皆是送句之辭也註苞氏曰至方也公謂非公事不至偃室方謂不由徑子曰孟之反不伐註孔安國曰魯大夫孟之側也與齊戰軍大敗不伐者不自伐其功也奔而殿將入門䇿其馬曰非敢後也馬不進也註馬融曰殿在軍後者也前曰啓後曰殿孟之反賢而有勇軍大奔獨在後為殿人迎為功之不欲獨有其名故云我非敢在後距敵也馬不能前進耳疏子曰至進也云孟之反不伐者魯臣也不伐謂有功不自稱也云奔而殿者此不伐之事也軍前曰啓軍後曰殿于時魯與齊戰魯軍大敗退奔而孟之側獨住軍後為殿以捍衛奔者故曰奔而殿也云將入門䇿其馬者門魯國門也䇿杖也初敗奔時在郊去國門逺孟之側在後及還將至入國門而孟之側杖馬令在奔者前也然六籍唯用馬乗車無騎馬之文唯曲禮云前有車騎是騎馬耳令云䇿其馬不知為騎馬為乘車也云曰非敢後也馬不進也者其既在後而國人皆迎之謂已有功已不欲獨受其功故將入門杖馬而云我非敢在後距敵政是馬行不進故在後耳所以杖馬示馬從來不進也註孔安國曰至功也此不伐之源魯哀公十一年魯師及齊師戰于郊之事也見春秋傳也余見鄭注本姓孟名之側字之反也馬融曰至進耳云孟之反賢而有勇軍大奔獨在後為殿者故停軍後為捍敵也云人迎為功之者在國人迎軍見其在後而謂為之有功故云功之也云馬不能前進耳者前猶進也子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣註孔安國曰佞口才也祝鮀衛大夫名子魚也時世貴之宋朝宋國之美人也而善淫言當如祝鮀之佞而及如宋朝之美難矣免於今世之害也疏子曰至世矣祝鮀能作佞也宋朝宋國之美人善能淫欲者也當于爾時貴佞重滛此二人竝有其事故得寵幸而免患難故孔子曰言人若不有祝鮀佞反宜有宋朝美若二者並無則難免今世之患難也故范甯曰祝鮀以佞諂被寵於靈公宋朝以美色見愛於南子無道之世並以取容孔子惡時民濁亂唯佞色是尚忠正之人不容其身故發難乎之談將以激亂俗亦欲發明君子全身逺害也註孔安國曰至害也云時世貴之者貴其能佞也云宋朝宋國之美人也而善滛者于時在衞通靈公夫人南子也云及如宋朝之美者一本云反如宋朝之美也通者云佞與淫異故云反也子曰誰能出不由户者何莫由斯道也註孔安國曰言人之立身成功當由道譬由人出入要當從户也疏子曰至道也道先王之道也人生得在世皆由於先王道理而通而世人多違理背道故孔子為譬以示解時惑也言人之在室出入由户而通亦如在世由道理而生而人皆知出室由户而未知在世由道故云誰能出不由户何莫由斯道也莫無也斯此也故范甯云人咸知由户而行莫知由學而成也子曰質勝文則野註苞氏曰野如野人言鄙略也文勝質則史註苞氏曰史者文多而質少也文質彬彬然後君子註苞氏曰彬彬文質相半之貎也疏子曰至君子云質勝文則野者謂凡行禮及言語之儀也質實也勝多也文華也言若實多而文飾少則如野人野人鄙略大樸也云文勝質則史者史記書史也史書多虚華無實妄語欺詐言人若為事多飾少實則如書史也云文質彬彬然後君子者彬彬文質相半也若文與質等半則為㑹時之君子也子曰人生也直註馬融曰言人之所以生於世而自終者以其正直之道也罔之生也幸而免註苞氏曰誣罔正直之道而亦生是幸而免也疏子曰至而免云人生也直者言人得全生居世者必由直行故也故李充曰人生之道唯其身直乎云罔之生也幸而免者罔謂為邪曲誣罔者也應死而生曰幸生即由直若有誣罔之人亦得生世者是獲幸而免死耳故李充曰失平生之道者則動之死地矣必或免之善由於幸耳故君子無幸而有不幸小人有幸而無不幸也註馬融曰至道也自終謂用道故不横夭殤也子曰知之者不如好之者好之者不如樂之者註苞氏曰學問知之者不如好之者篤好之者又不如樂之者深也疏子曰至樂之者云知之者不如好之者者謂學者深淺也知之謂知學問有益者也好之謂欲好學之以為好者也夫知有益而學之則不如欲學之以為好者也故李充曰雖知學之為益或有計而後知學利在其中故不如好之者篤也云好之者不如樂之者者樂謂歡樂之也好有盈厭故不如性歡而樂之如顔淵樂在其中也故李充曰好有盛衰不如樂之者深也子曰中人以上可以語上也中人以下不可以語上也註王肅曰上謂上智之人所知也兩舉中人以其可上可下也疏子曰至上也此謂為教化法也師説云就人之品識大判有三謂上中下也細而分之則有九也有上上上中上下也又有中上中中中下也又有下上下中下下也凡有九品上上則是聖人聖人不須教也下下則是愚人愚人不移亦不須教也而可教者謂上中以下下中以上凡七品之人也今云中人以上可以語上即以上道語於上分也中人以下不可以語上雖不可語上猶可語之以中及語之以下何者夫教之為法恒導引分前也聖人無須於教故以聖人之道可以教顔以顔之道可以教閔斯則中人以上可以語上也又以閔道可以教中品之上此則中人亦可語上也又以中品之上道教中品之中又以中品之中道教中品之下斯即中人亦有可以語之以中也又以中品之下道教下品之上斯即中人以下可以語中人以下品之上道教下品之中斯即中人以下可以語下也此云中人以上中人以下大略言之耳既有九品則第五為正中人也以下即六七八也以上即四三二也註王肅曰至可也云上謂上智之人所知也者謂聖人之道可教顔閔者也云兩擧中人以其可上可下也者若分九品則第五以上可以語上第五以下不可語上今但應云中人以上可以語上以下不可語上而復云中人以下是再舉中人也所以爾者明中人之大分有可上可下也若中人之上可以語上中人之下不可語上故再言中人也又一云中人若遇善師則可上若遇惡人則可下故再舉中人明可上可下也樊遲問智子曰務民之義註王肅曰務所以化導民之義也敬鬼神而逺之可謂智矣註苞氏曰敬鬼神而不瀆也問仁子曰仁者先難而後獲可謂仁矣註孔安國曰先勞苦乃後得功此所以為仁也疏樊遲問至仁矣云樊遲問智者問孔子為智之道也云子曰務民之義者荅曰若欲為智當務在化導民之義也云敬鬼神而逺之者鬼神不可慢故曰敬鬼神也可敬不可近故宜逺之也云可謂智矣者如上二事則可為智也云問仁者樊遲又問為仁也云子曰云云者獲得也言臣必先歴為難事而後乃可得祿受報則是仁也若不先勞事而食則為不仁故范甯曰艱難之事則為物先獲功之事而處物後則為仁矣註苞氏曰敬鬼神而不瀆也瀆猶數近也子曰智者樂水註苞氏曰智者樂運其才智以治世如水流而不知己也仁者樂山註仁者樂如山之安固自然不動而萬物生焉智者動註苞氏曰自進故動也仁者静註孔安國曰無欲故静也智者樂註鄭𤣥曰智者自役得其志故樂也仁者夀註苞氏曰性静故夀考也疏子曰至者壽陸特進曰此章極辨智仁之分凡分為三段自智者樂水仁者樂山為第一明智仁之性又智者動仁者静為第二明智仁之用先既有性性必有用也又智者樂仁者夀為第三明智仁之功己有用用宜有功也云智者樂水者今第一明智仁之性此明智性也智者識用之義也樂者貪樂之稱也水者流動不息之物也智者樂運其智化物如流水之不息故樂水也云仁者樂山者此即明仁者之性仁者惻隠之義山者不動之物也仁人之性願四方安静如山之不動故云樂山也云智者動者此第二明用也智者何故如水耶政自欲動進其識故云智者動也云仁者静者仁者何故如山耶其心寜静故也云智者樂者第三明功也樂懽也智者得運其識故得從心而暢故懽樂也云仁者壽者性静如山之安固故壽考也然則仁既壽不樂而智樂不必夀緣所役用多故也子曰齊一變至於魯魯一變至於道註苞氏曰言齊魯有太公周公之餘化也太公大賢周公聖人今其政教雖衰若有明君興之者齊可使如魯魯可使如大道行之時也疏子曰至於道太公封於營丘之地為齊國周公封於曲阜之地為魯國周公大聖太公大賢賢聖既有優劣雖同致太平而其化不得不微異故末代二國齊有景公之昬闇魯有定公之寡徳然其國猶有望旦之遺風故禮記云孔子曰吾捨魯何適耶明魯猶勝餘國也今孔子歎其君之並惡故有此言也言若齊有明君一變便得如魯太平之日魯有明君一變便如大道之時也此是引汲之教耳實理則不然矣若明君興之政當得各如其初何容得還淳反本耶子曰觚不觚註馬融曰觚禮器也一升曰爵三升曰觚也觚哉觚哉註觚哉觚哉言非觚也以喻為政不得其道則不成也疏子曰至觚哉云觚不觚者觚禮酒器也禮云觚酌酒一獻之禮賓主百拜此則明有觚之用也當于爾時用觚酌酒而沈湎無度故孔子曰觚不觚也故王肅曰當時沈湎于酒故曰觚不觚猶言君臣不君臣耳云觚哉觚哉者言用觚之失道也故重曰觚哉觚哉註觚哉至成也云觚哉觚哉言非觚也者何此注亦得同王蔡之釋也云以喻為政不得其道則不成也者如何此注則與王蔡小異也何意言用觚不得其道則非復觚徳譬如人所為不得其道者則事亦不成也若欲知氣味何説則特前觚不觚如王蔡之釋後云觚哉觚哉自因前以寄後喻事不乖王蔡而有兼得之美也故禇仲都曰作觚而不用觚法觚終不成猶為政而不用政法豈成哉疾世為政不用政法故再言焉宰我問曰仁者雖告之曰井有仁者焉其從之與註孔安國曰宰我以為仁者必濟人於患難故問有仁人墮井將自投下從而出之否乎欲極觀仁人憂樂之所至也子曰何為其然也君子可逝也不可陷也註苞氏曰逝往也言君子可使往視之耳不肯自投救之也可欺也不可罔也註馬融曰可欺者可使往也不可罔者不可得誣罔令自投下也疏宰我問至罔也云宰我問云云者宰我欲極觀仁者之懐故假斯以問也言有人告於仁者云彼處有仁者墮井而仁者常救人於急難當自投入井救取之不耶云子曰何為其然也者孔子距之故云何為其然也言仁者雖復救濟若審有人墮井當為方計出之豈容自投從之云君子可逝也不可陷也者逝往也陷没也言聞有人墮井乃可往看之耳不遂投井取之也云可欺也不可罔也者欺者謂遥相語也罔者謂面相誣也初彼來見告云井中有仁人我往視之是可欺也既至井實無人不可變通而自投入井是不可罔也或問曰仁人救物一切無偏何不但云井中有人而必云有仁者耶若唯救仁者則非仁人墮井則仁人所不救乎荅曰仁者能好人能惡人其雖惻隠濟物若聞惡人墮井亦不往也又李充曰欲極言仁設云救井為仁便當從不耶故夫子荅云何為其然也言何至如此是君子之人若於道理宜爾身猶可亡故云可逝逝往也若理有不可不肯陷於不知故云不可誣罔令投下也君子不逆詐故可以闇昧欺大徳居正故不可以非道罔也子曰君子博學於文約之以禮亦可以弗畔矣夫註鄭𤣥曰弗畔不違道也疏子曰至矣夫博廣也約束也畔違也背也言君子廣學六籍之文又用禮自約束能如此者亦可得不違背於道理也子見南子子路不悦夫子矢之曰予所否者天厭之天厭之註孔安國曰等以為南子者衛靈公夫人也淫亂而靈公惑之孔子見之者欲因以説靈公使行治道也矢誓也子路不悦故夫子誓之曰行道既非婦人之事而弟子不悦與之咒誓義可疑也疏子見至厭之云子見南子者南子衛靈公夫人也淫亂而孔子入衛欲與之相見也所以欲相見者靈公唯婦言是用孔子欲因南子説靈公使行正道也故繆播曰應物而不擇者道也兼濟而不辭者聖也靈公無道蒸庶困窮鍾救於夫子物困不可以不救理鍾不可以不應應救之道必明有路路由南子故尼父見之涅而不緇則處汚不辱無可無不可故兼濟而不辭以道觀之未有可猜也云子路不悦者子路于時隨夫子在衛見夫子與淫亂婦人相見故不悦也繆播曰賢者守節怪之宜也或以亦發孔子之荅以曉衆也王弼曰案本傳孔子不得已而見南子猶文王拘羑里蓋天命之窮會也子路以君子宜防患辱是以不悦也云夫子云云者矢誓也予我也否不也厭塞也子路既不悦而孔子與之兀誓也言我見南子若有不善之事則天當厭塞我道也繆播曰否不也言體聖而不為聖者之事天其厭塞此道耶王弼曰否泰有命我之所屈不用於世者乃天命厭之言非人事所免也重言之者所以誓其言也蔡謨曰矢陳也尚書叙曰臯陶矢厥謀也春秋經曰公矢魚于棠皆是也夫子為子路矢陳天命非誓也李充曰男女之别國之大節聖明義教正内外者也而乃廢常違禮見淫亂之婦人者必以權道有由而然子路不悦固其宜也夫道消運否則聖人亦否故曰子所否者天厭之天厭之厭亦否也明聖人與天地同其否泰耳豈區區自明於子路而己子曰中庸之為徳也其至矣乎民鮮能久矣註庸常也中和可常行之徳也世亂先王之道廢民鮮能行此道久矣非適今也疏子曰至久矣中中和也庸常也鮮少也言中和可常行之徳是先王之道其理甚至善而民少有行此者也已久言可歎之深也子貢曰如能博施於民而能濟衆者何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸註孔安國曰若能廣施恩恵濟民於患難堯舜至聖猶病其難也夫仁者己欲立而立人己欲達而達人能近取譬可謂仁之方也己註孔安國曰更為子貢説仁者之行也方道也但能近取譬於己皆恕己所不欲而勿施人也疏子貢曰至也巳云子貢曰云云者子貢問言若有人所能廣施恩惠於民又能救濟衆民之患難能如此者何如可得謂為仁人否乎云子曰何事於仁必也聖乎者孔子荅曰若能如此者何事是仁乎乃是聖人之行也云堯舜其猫病諸者堯舜古聖天子也病猶患也諸之也又言前所能之事乃是聖人之行而聖人猶病患其事之難行也云夫仁者云云者既云前事不啻是仁為聖所難故此更荅為仁之道也言己若欲自立自達則必先立達他人則是有仁之者也云能近云云者能近取譬諸身逺取諸物己所不欲勿施於人能如此者可謂為仁之方也方猶道也論語集解義疏卷三
